<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport"  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="apple-touch-icon" href="icon5.jpg">
<!-- 让 Safari 以“App 模式”打开 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Time Lapse">
<title>Time Lapse</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f6f3;
  --glass:rgba(255,255,255,0.58);
  --glass2:rgba(255,255,255,0.42);
  --glass3:rgba(255,255,255,0.28);
  --border:rgba(165,155,145,0.16);
  --border2:rgba(165,155,145,0.10);
  --text:#37342f;
  --text2:#5f5852;
  --text3:#7d746c;
  --text4:#a59990;
  --lav:rgba(178,158,210,0.22);
  --mint:rgba(138,210,178,0.18);
  --rose:rgba(218,158,168,0.18);
  --lav-s:rgba(105,72,155,0.88);
  --mint-s:rgba(42,128,90,0.85);
  --rose-s:rgba(165,72,85,0.8);
  --green:#68a878;--yellow:#c2a24a;--orange:#cc7e4e;--red:#c05858;
  --font-jp:'Noto Serif TC',serif;
  --font-en:'Cormorant Garamond',serif;
  --sbw:140px;--sbw-c:34px;
}
html{font-size:13px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:var(--font-jp);font-weight:300;color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 8% 0%,var(--lav),transparent 48%),
    radial-gradient(ellipse at 92% 95%,var(--mint),transparent 45%),
    radial-gradient(ellipse at 48% 48%,var(--rose),transparent 55%);
  background-attachment:fixed;
}
input,select,textarea,button{font-family:inherit;font-weight:300;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}

/* ═══ SIDEBAR ═══ */
#sidebar{
  position:fixed;left:0;top:0;z-index:40;height:100vh;
  width:var(--sbw);
  border-right:1px solid var(--border2);
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  display:flex;flex-direction:column;
  transition:width .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#sidebar.collapsed{width:var(--sbw-c)}
#sidebar.collapsed .sb-head{padding:10px 4px 6px;border-bottom:none}
#sidebar.collapsed .sb-head-row{justify-content:center;margin-bottom:0}
#sidebar.collapsed .sb-title,
#sidebar.collapsed .sb-tabs,
#sidebar.collapsed .sb-toggle,
#sidebar.collapsed .sb-items{opacity:0;pointer-events:none;transform:translateX(-10px)}
.sb-head{padding:10px 10px 6px;border-bottom:1px solid var(--border2)}
.sb-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;transition:.24s}
.sb-title{font-size:8px;letter-spacing:.24em;color:var(--text4);text-transform:uppercase;font-family:var(--font-en)}
.sb-tabs{display:flex;flex-direction:column;gap:2px;transition:.22s}
.sb-tab{
  border:1px solid transparent;border-radius:8px;padding:4px 7px;
  text-align:left;cursor:pointer;background:transparent;color:var(--text3);transition:.2s;
}
.sb-tab .t-num{font-size:8px;color:var(--text4);font-family:var(--font-en);font-weight:400}
.sb-tab .t-lbl{font-size:10.5px;margin-top:1px;line-height:1.3}
.sb-tab.on{background:rgba(255,255,255,0.55);border-color:var(--border);color:var(--text)}
.sb-tab:hover:not(.on){background:rgba(255,255,255,0.25)}
.collapsed .t-lbl,.collapsed .sb-tabs,.collapsed .sb-toggle,.collapsed .sb-items{display:none}
.sb-toggle{
  display:flex;gap:2px;padding:5px 8px;border-bottom:1px solid var(--border2);transition:.22s;
}
.sb-pill{
  flex:1;border:none;border-radius:14px;padding:3px 0;font-size:9.5px;
  cursor:pointer;background:transparent;color:var(--text4);transition:.2s;
}
.sb-pill.on{background:rgba(255,255,255,0.5);color:var(--text2)}
.sb-items{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:10px;transition:.22s;
}
.btn-i{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text3);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:.18s;
  flex-shrink:0;
}
.btn-i:hover{background:var(--glass);color:var(--text2)}
.btn-i svg{width:13px;height:13px}
.btn-add-flip{
  width:68px;height:68px;border-radius:18px;
  border:1.5px dashed rgba(125,116,108,0.18);background:transparent;
  color:var(--text3);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:9px;transition:.2s;
}
.btn-add-flip:hover{border-color:var(--text3);color:var(--text3);background:rgba(255,255,255,0.2)}
.btn-add-flip svg{width:14px;height:14px}

/* ═══ FLIP NOTE ═══ */
.fn-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.fn-row{display:flex;align-items:center;justify-content:center;gap:10px;width:100%}
.fn-box{width:68px;height:68px;perspective:900px;cursor:pointer;flex:0 0 auto}
.fn-inner{
  position:relative;width:100%;height:100%;
  transition:transform .52s cubic-bezier(.4,.1,.2,1);
  transform-style:preserve-3d;
}
.fn-inner.flipped{transform:rotateY(180deg)}
.fn-face{
  position:absolute;inset:0;border-radius:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:visible;
  border:none;box-shadow:none;
}
.fn-front{background:transparent;display:flex;align-items:center;justify-content:center}
.fn-front img{width:100%;height:100%;object-fit:contain;border-radius:0;display:block;image-rendering:auto}
.fn-num{font-family:var(--font-en);font-weight:600;letter-spacing:-.02em;line-height:1}
.fn-num.lg{font-size:18px}
.fn-num.sm{font-size:13px}
.fn-metric{position:relative;display:flex;align-items:center;justify-content:center;min-width:36px;height:36px;flex:0 0 36px}
.fn-metric .fn-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.fn-back{
  transform:rotateY(180deg);
  background:linear-gradient(180deg, rgba(248,246,243,0.78), rgba(248,246,243,0.58));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:14px;
  padding:6px;display:flex;flex-direction:column;justify-content:space-between;
}
.fn-info{font-size:8px;color:var(--text2);line-height:1.42}
.fn-acts{display:flex;align-items:center;justify-content:flex-end;gap:2px}
.fn-acts button{
  width:20px;height:20px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.18s;
}
.fn-acts button:hover{background:var(--glass)}
.fn-acts button svg{width:10px;height:10px}
.fn-name{
  max-width:72px;text-align:center;font-size:10px;color:var(--text2);
  line-height:1.25;overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-orange{color:var(--orange)}.c-red{color:var(--red)}

/* ═══ MAIN ═══ */
#main{
  margin-left:var(--sbw);min-height:100vh;
  transition:margin-left .32s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#sidebar.collapsed~#main{margin-left:var(--sbw-c)}
.hdr{
  position:relative;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:start;
  gap:18px;
  padding:26px 8px 12px 18px;
}
.hdr-left{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  text-align:left;
}
.hdr-clock{
  font-family:var(--font-en);font-weight:300;font-size:36px;
  letter-spacing:.05em;color:var(--text);line-height:1;
}
.hdr-date{
  font-family:var(--font-en);font-weight:400;font-size:11.5px;
  color:var(--text2);margin-top:6px;letter-spacing:.1em;
}
.hdr-title{
  font-family:var(--font-en);font-weight:500;font-size:17px;
  letter-spacing:.24em;color:var(--text3);text-transform:uppercase;margin-top:9px;
}

.hdr-end{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.44);
  background:rgba(255,255,255,0.34);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(90,82,75,.72);transition:.22s;box-shadow:0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.55);
  justify-self:end;margin-right:0;
}
.hdr-end:hover{background:rgba(255,255,255,0.52);color:var(--text2);transform:translateY(-1px)}
.hdr-end svg{width:12px;height:12px}
.fab-stack{position:fixed;right:8px;bottom:14px;z-index:50;display:flex;flex-direction:column;gap:10px}
.fab-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.44);
  background:rgba(255,255,255,0.34);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(90,82,75,.72);transition:.22s;box-shadow:0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.55);
}
.fab-btn:hover{background:rgba(255,255,255,0.52);color:var(--text2);transform:translateY(-1px)}
.fab-btn svg{width:14px;height:14px}
.pm-box{overflow:hidden;display:flex;flex-direction:column}
.mo-box.pm-box.panel-logs{width:min(82vw,1180px);height:min(80vh,760px);max-height:min(80vh,760px)}
.mo-box.pm-box.panel-tags{width:min(62vw,860px);height:min(72vh,680px);max-height:min(72vh,680px)}
.mo-box.pm-box.panel-trends{width:min(56vw,760px);height:min(50vh,420px);max-height:min(50vh,420px)}
.mo-box.pm-box.panel-backup{width:min(42vw,520px);height:auto;max-height:min(58vh,460px)}
.panel-mo{padding:2px}
.pm-body{padding:0 18px 18px;overflow:auto;flex:1;min-height:0}
.log-browser-wrap{overflow:auto;padding-bottom:4px}
.pm-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pm-tab{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.46);cursor:pointer;font-size:11px;color:var(--text3)}
.pm-tab.on{background:rgba(255,255,255,0.74);color:var(--text);border-color:rgba(155,125,195,.24)}
.tag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}
.tag-row-manage{display:grid;grid-template-columns:minmax(0,1fr) 70px auto;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--border2);border-radius:12px;background:rgba(255,255,255,0.46)}
.tag-name-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.72);font-size:11.5px}
.tag-count{font-size:10.5px;color:var(--text3);text-align:right}
.pm-inline-acts{display:flex;gap:6px;justify-content:flex-end}
.pm-mini{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--glass2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3)}
.pm-mini svg{width:11px;height:11px}
.pm-topfilters{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.pm-topfilters .ff{min-width:130px}
.log-groups{display:flex;flex-direction:column;gap:14px}
.log-day{border:1px solid var(--border2);border-radius:16px;background:rgba(255,255,255,0.42);overflow:hidden}
.log-day+.log-day{margin-top:14px}
.log-day-head{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:12px;color:var(--text2);background:rgba(255,255,255,0.3);font-weight:400}
.log-cat-head{padding:7px 14px;font-size:9.5px;letter-spacing:.14em;color:var(--text4);text-transform:uppercase;background:rgba(255,255,255,0.14);border-top:1px solid var(--border2);margin-top:0}
.log-cat-head:first-child{border-top:none}
.log-scroll{overflow-x:auto;overflow-y:visible;scrollbar-width:thin;margin-bottom:6px}
.log-table-inner{display:table;width:100%;border-collapse:collapse;font-size:12px}
.log-table-inner th,.log-table-inner td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
.log-table-inner th{font-size:10px;color:var(--text4);letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,0.22);font-weight:400}
.log-table-inner tr:last-child td{border-bottom:none}
.log-table-inner tfoot td{font-size:11px;color:var(--text2);background:rgba(255,255,255,0.18);border-top:1.5px solid rgba(165,155,145,.14);border-bottom:none;font-family:var(--font-en)}
.log-table-inner td{color:var(--text2)}
.log-table-inner .log-act-cell{white-space:nowrap;text-align:right}
.log-item-title{color:var(--text)}
.log-item-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
.log-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:nowrap}
.pm-placeholder{padding:26px 18px;border:1px dashed var(--border);border-radius:18px;background:rgba(255,255,255,0.34);font-size:12px;color:var(--text3);line-height:1.8}
@media (max-width:760px){
  .log-table-inner th,.log-table-inner td{padding:6px 8px;font-size:11px}
  .fab-stack{right:10px;bottom:12px}
}

/* ═══ TABS ═══ */
.rtabs{display:flex;justify-content:center;gap:1px;padding:0 20px 14px}
.rtab{
  padding:5px 15px;border-radius:18px;border:1px solid transparent;
  background:transparent;color:var(--text2);font-size:11px;
  cursor:pointer;transition:.2s;letter-spacing:.06em;
}
.rtab.on{background:var(--glass);border-color:var(--border);color:var(--text)}
.rtab:hover:not(.on){color:var(--text2)}
.rcontent{flex:1;padding:0 32px 32px;max-width:700px;margin:0 auto;width:100%}

/* ═══ FORM ═══ */
.fsec{margin-bottom:20px}
.fsec-t{
  font-size:9.5px;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;
  margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border2);
}
.frow{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end}
.ff{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px}
.ff.narrow{flex:0 0 auto;min-width:70px}
.fl{font-size:9.5px;color:var(--text3);letter-spacing:.04em}
.fi{
  width:100%;padding:5px 9px;
  border:1px solid var(--border);border-radius:5px;
  background:rgba(255,255,255,0.55);color:var(--text);font-size:12px;
  outline:none;transition:border .2s,box-shadow .2s;
}
.fi:focus{border-color:var(--lav-s);box-shadow:0 0 0 2px rgba(155,125,195,0.08)}
.fi::placeholder{color:var(--text4)}
select.fi{
  -webkit-appearance:none;appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%23a09a94' stroke-width='1' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 7px center;padding-right:20px;
}
textarea.fi{resize:vertical;min-height:42px}
/* datetime-local fix */
input[type="datetime-local"].fi,input[type="date"].fi,input[type="month"].fi,input[type="time"].fi{
  color:var(--text);
}
.btn-s{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 14px;border-radius:16px;
  border:1px solid var(--border);background:var(--glass2);
  color:var(--text2);font-size:10.5px;cursor:pointer;transition:.2s;
  margin-top:4px;
}
.btn-s:hover{background:var(--glass);color:var(--text)}
.btn-s svg{width:12px;height:12px}
.mtog{display:flex;flex-wrap:wrap;gap:4px}
.mtog button{
  padding:3px 9px;border-radius:14px;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-size:10.5px;
  cursor:pointer;transition:.2s;
}
.mtog button.on{background:rgba(255,255,255,0.55);border-color:var(--lav-s);color:var(--text)}

/* ═══ QUICK BTNS ═══ */
.qbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.qbtn{
  display:flex;align-items:center;gap:7px;
  padding:10px 16px;border-radius:14px;
  border:1px solid var(--border);background:var(--glass);
  cursor:pointer;transition:.22s;color:var(--text2);
}
.qbtn:hover{background:rgba(255,255,255,0.7);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.03)}
.qbtn:active{transform:translateY(0)}
.qbtn svg{width:15px;height:15px;color:var(--text3);flex-shrink:0}
.qbtn .ql{font-size:12px}
.qbtn .qt{font-size:9.5px;color:var(--text3);font-family:var(--font-en)}

/* ═══ LOG TIMELINE ═══ */
.lf{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.lf select,.lf input{
  padding:4px 7px;border:1px solid var(--border);border-radius:5px;
  background:rgba(255,255,255,0.5);font-size:10.5px;color:var(--text);outline:none;
}
.lt{position:relative;padding-left:18px}
.lt::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--border)}
.le{position:relative;padding:3px 0 9px;font-size:11px;line-height:1.5}
.le::before{
  content:'';position:absolute;left:-15.5px;top:8px;
  width:5px;height:5px;border-radius:50%;background:var(--text4);
}
.le .lt-time{font-family:var(--font-en);font-size:10px;color:var(--text3);letter-spacing:.03em;min-width:38px;display:inline-block}
.le .lt-cat{color:var(--text2);font-weight:400;margin:0 3px;font-size:10px}
.le .lt-det{color:var(--text3);font-size:10.5px}
.le .lt-note{color:var(--text4);font-size:9.5px;font-style:italic;margin-left:4px}
.le-acts{display:inline-flex;gap:2px;margin-left:5px;opacity:0;transition:opacity .18s}
.le:hover .le-acts{opacity:1}
.le-acts button{
  width:16px;height:16px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.18s;
}
.le-acts button:hover{background:var(--glass);color:var(--text2)}
.le-acts button svg{width:9px;height:9px}
.le-empty{text-align:center;padding:28px 0;color:var(--text4);font-size:11.5px}

/* ═══ MODAL ═══ */
.mo{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.12);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.mo.hidden{display:none}
.mo-box{
  width:100%;max-width:400px;border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  box-shadow:0 16px 48px rgba(0,0,0,0.07);
}
.mo-box.pm-box{
  width:min(74vw,1040px);
  max-width:min(74vw,1040px);
  height:min(72vh,760px);
  max-height:min(72vh,760px);
  border-radius:24px;
}
.mo-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.mo-title{font-size:13px;font-weight:400;color:var(--text)}
.mo-body{padding:0 14px 14px}
.mo-body .ff{margin-bottom:7px}
.mo-acts{display:flex;justify-content:flex-end;gap:5px;margin-top:10px}
.mo-acts button{
  padding:5px 14px;border-radius:16px;font-size:11px;cursor:pointer;
  border:1px solid var(--border);transition:.2s;
}

/* ═══ SLEEP ASSIST ═══ */
.sleep-overlay{
  position:fixed;inset:0;z-index:120;
  color:#fff;overflow:hidden;
}
.sleep-bg{
  position:absolute;inset:0;
  transition:background 1.3s cubic-bezier(.4,0,.2,1), filter .9s ease, transform 1.2s ease;
}
.sleep-bg::before,.sleep-bg::after{
  content:'';position:absolute;inset:-8%;
  pointer-events:none;
}
.sleep-bg::before{
  background:
    radial-gradient(circle at 18% 16%, rgba(255,255,255,.15), transparent 0 22%),
    radial-gradient(circle at 78% 22%, rgba(255,244,220,.10), transparent 0 18%),
    radial-gradient(circle at 55% 78%, rgba(214,228,255,.10), transparent 0 24%);
  filter:blur(30px);
  opacity:.85;
}
.sleep-bg::after{
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0) 24%, rgba(0,0,0,.08) 100%),
    repeating-linear-gradient(115deg, rgba(255,255,255,.03) 0 2px, transparent 2px 14px);
  mix-blend-mode:screen;
  opacity:.34;
}
.sleep-shell{
  position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
  transition:transform .7s cubic-bezier(.22,1,.36,1), opacity .7s ease, filter .7s ease;
}
.sleep-shell.stage-enter-up{animation:stageEnterUp .72s cubic-bezier(.16,1,.3,1)}
.sleep-shell.stage-enter-down{animation:stageEnterDown .72s cubic-bezier(.16,1,.3,1)}
@keyframes stageEnterUp{
  0%{opacity:0;transform:translateY(40px) scale(.99);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
@keyframes stageEnterDown{
  0%{opacity:0;transform:translateY(-40px) scale(.99);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
.sleep-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 24px 0;color:rgba(255,255,255,.7);
  font-size:11px;letter-spacing:.22em;
}
.sleep-chip{
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:999px;padding:8px 14px;
}
.sleep-close{
  width:auto;height:auto;padding:8px 14px;border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);color:#fff;cursor:pointer;
}
.sleep-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;position:relative}
.sleep-now{font-family:var(--font-en);font-size:78px;line-height:1;letter-spacing:-.06em;text-shadow:0 0 28px rgba(255,255,255,.14)}
.sleep-sub{margin-top:16px;font-size:14px;color:rgba(255,255,255,.72)}
.sleep-card{
  width:min(92vw,460px);margin-top:24px;padding:16px;border-radius:28px;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  box-shadow:0 20px 70px rgba(0,0,0,.24);
}
.sleep-input,.sleep-textarea{
  width:100%;border:1px solid rgba(255,255,255,.12);outline:none;
  background:rgba(255,255,255,.06);color:#fff;border-radius:20px;
}
.sleep-input{height:46px;padding:0 16px}
.sleep-textarea{min-height:90px;padding:12px 16px;resize:vertical}
.sleep-input::placeholder,.sleep-textarea::placeholder{color:rgba(255,255,255,.38)}
.sleep-row{display:flex;gap:10px}
.sleep-btn{
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.12);
  color:#fff;border-radius:999px;padding:12px 18px;cursor:pointer;transition:.2s;
}
.sleep-btn:hover{background:rgba(255,255,255,.18)}
.sleep-btn.ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.82)}
.sleep-btn:disabled{opacity:.36;cursor:not-allowed}
.sleep-bottom{padding:0 24px 28px}
.sleep-actions{display:flex;gap:12px;justify-content:center;max-width:460px;margin:0 auto}
.sleep-note{margin-top:12px;font-size:12px;color:rgba(255,255,255,.34);text-align:center}
.sleep-gesture-hint{
  margin-top:10px;font-size:11px;letter-spacing:.14em;
  color:rgba(255,255,255,.34);text-align:center;
}
.sleep-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;transition:opacity .7s ease,transform .7s ease}
.sleep-star{
  position:absolute;cursor:pointer;pointer-events:auto;
  border-radius:999px;
  background:radial-gradient(circle, rgba(215,225,255,0.95) 0%, rgba(180,200,255,0.35) 45%, transparent 72%);
  animation:star-enter .8s ease both, star-breathe var(--dur,4s) ease-in-out var(--delay,0s) infinite;
  min-width:12px;min-height:12px;
}
@keyframes star-breathe{0%,100%{opacity:.22;transform:scale(.72)}50%{opacity:.96;transform:scale(1.24)}}
@keyframes star-enter{from{opacity:0;transform:translateY(16px) scale(.4)}to{opacity:1;transform:translateY(0) scale(1)}}
.star-tip{
  position:absolute;left:50%;top:100%;z-index:20;
  transform:translateX(-50%) translateY(10px);
  max-width:220px;width:max-content;
  border-radius:14px;border:1px solid rgba(255,255,255,.16);
  background:rgba(20,20,30,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:10px 14px;font-size:11.5px;color:rgba(255,255,255,.85);line-height:1.5;
  pointer-events:none;opacity:0;transition:opacity .28s ease,transform .28s ease;
}
.sleep-star.show-tip .star-tip{opacity:1;transform:translateX(-50%) translateY(4px)}
@keyframes fade-in-soft{from{opacity:0;transform:translateY(16px);filter:blur(10px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
.sleep-disc{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:320px;height:320px;border-radius:50%;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  animation:breathe 4.8s ease-in-out infinite;
}
.sleep-disc::before,.sleep-disc::after{
  content:'';position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.08)
}
.sleep-disc::before{inset:16px}.sleep-disc::after{inset:34px}
@keyframes breathe{0%,100%{opacity:.75;transform:scale(.985)}50%{opacity:.98;transform:scale(1.02)}}
.sleep-disc.small{width:320px;height:320px;background:rgba(255,255,255,.08)}
.sleep-kicker{margin-bottom:14px;font-size:11px;letter-spacing:.34em;color:rgba(255,255,255,.44)}
.sleep-elapsed{font-family:var(--font-en);font-size:58px;line-height:1;letter-spacing:-.06em}
.sleep-modal{
  position:absolute;inset:0;z-index:5;background:rgba(0,0,0,.22);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.sleep-modal-box{
  width:min(92vw,460px);padding:20px;border-radius:28px;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.10);color:#fff;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.weather-grid button{
  border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.06);color:#fff;

/* ═══ MORNING PREP — FLOATING SOAP BUBBLES ═══ */
.mp-canvas{
  position:absolute;inset:0;pointer-events:none;z-index:3;overflow:hidden;
}
.mp-bub{
  position:absolute;pointer-events:auto;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:50%;
  background:
    radial-gradient(circle at 28% 24%, rgba(255,255,255,.62) 0%, transparent 42%),
    radial-gradient(circle at 72% 74%, rgba(210,195,225,.18) 0%, transparent 38%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.10) 0%, rgba(255,255,255,.03) 100%);
  border:1px solid rgba(255,255,255,.42);
  box-shadow:
    0 8px 32px rgba(0,0,0,.06),
    inset 0 -8px 22px rgba(255,255,255,.12),
    inset 0 2px 8px rgba(255,255,255,.35);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:transform .22s ease, box-shadow .22s ease;
}
.mp-bub::before{
  content:'';position:absolute;top:12%;left:18%;width:32%;height:22%;
  border-radius:50%;
  background:linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,0));
  filter:blur(2px);pointer-events:none;
}
.mp-bub::after{
  content:'';position:absolute;bottom:14%;right:16%;width:18%;height:14%;
  border-radius:50%;
  background:radial-gradient(circle, rgba(240,220,250,.28), transparent);
  filter:blur(3px);pointer-events:none;
}
.mp-bub:hover{
  transform:scale(1.1);
  box-shadow:
    0 12px 44px rgba(0,0,0,.09),
    inset 0 -8px 22px rgba(255,255,255,.16),
    inset 0 2px 8px rgba(255,255,255,.42);
}
.mp-bub-emoji{width:30px;height:30px;line-height:1;position:relative;z-index:1}
.mp-bub-label{
  font-size:10px;color:rgba(100,70,40,.45);letter-spacing:.06em;
  margin-top:4px;position:relative;z-index:1;white-space:nowrap;
}
@keyframes mp-float-0{
  0%{transform:translate(0,0) scale(1)}
  14%{transform:translate(18px,-28px) scale(1.02)}
  28%{transform:translate(-14px,-42px) scale(.98)}
  42%{transform:translate(-32px,-12px) scale(1.01)}
  57%{transform:translate(-8px,24px) scale(.99)}

  100%{transform:translate(0,0) scale(1)}
}

  0%{transform:translate(0,0) scale(1)}
  12%{transform:translate(-22px,16px) scale(.98)}
  25%{transform:translate(-36px,-8px) scale(1.01)}
  38%{transform:translate(-12px,-34px) scale(.99)}
  50%{transform:translate(20px,-18px) scale(1.02)}
  62%{transform:translate(34px,8px) scale(.98)}
  75%{transform:translate(16px,28px) scale(1.01)}
  88%{transform:translate(-8px,12px) scale(.99)}
  100%{transform:translate(0,0) scale(1)}
}
@keyframes mp-float-2{
  0%{transform:translate(0,0) scale(1)}
  20%{transform:translate(28px,18px) scale(1.02)}
  40%{transform:translate(8px,-26px) scale(.98)}
  60%{transform:translate(-24px,-8px) scale(1.01)}
  80%{transform:translate(-16px,22px) scale(.99)}
  100%{transform:translate(0,0) scale(1)}
}
@keyframes mp-float-3{
  0%{transform:translate(0,0) scale(1)}
  16%{transform:translate(-18px,-32px) scale(1.01)}
  33%{transform:translate(22px,-16px) scale(.98)}
  50%{transform:translate(32px,14px) scale(1.02)}
  66%{transform:translate(6px,30px) scale(.99)}
  83%{transform:translate(-26px,12px) scale(1.01)}
  100%{transform:translate(0,0) scale(1)}
}
@keyframes mp-float-4{
  0%{transform:translate(0,0) scale(1)}
  18%{transform:translate(16px,26px) scale(.98)}
  36%{transform:translate(34px,-6px) scale(1.02)}
  54%{transform:translate(10px,-28px) scale(.99)}
  72%{transform:translate(-22px,-14px) scale(1.01)}
  90%{transform:translate(-14px,16px) scale(.98)}
  100%{transform:translate(0,0) scale(1)}
}
@keyframes mp-float-5{
  0%{transform:translate(0,0) scale(1)}
  15%{transform:translate(-20px,22px) scale(1.01)}
  30%{transform:translate(12px,36px) scale(.98)}
  45%{transform:translate(30px,10px) scale(1.02)}
  60%{transform:translate(18px,-20px) scale(.99)}
  75%{transform:translate(-10px,-28px) scale(1.01)}
  90%{transform:translate(-26px,-4px) scale(.98)}
  100%{transform:translate(0,0) scale(1)}
}
@keyframes mp-pop{
  0%{transform:scale(1);opacity:1}
  20%{transform:scale(1.3);opacity:.8}
  100%{transform:scale(0);opacity:0}
}
@keyframes mp-enter{
  from{opacity:0;transform:scale(.3) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}
function pad(n){return String(n).padStart(2,'0')}
function fmt(d){if(!d)return'-';const o=new Date(d);if(isNaN(o))return'-';return`${o.getFullYear()}-${pad(o.getMonth()+1)}-${pad(o.getDate())} ${pad(o.getHours())}:${pad(o.getMinutes())}`}
function fmtT(d){const o=new Date(d);return`${pad(o.getHours())}:${pad(o.getMinutes())}`}
function toL(d){const o=new Date(d||Date.now());return`${o.getFullYear()}-${pad(o.getMonth()+1)}-${pad(o.getDate())}T${pad(o.getHours())}:${pad(o.getMinutes())}`}
function dayD(a,b){return Math.floor((a-b)/864e5)}
function hourD(a,b){return Math.floor((a-b)/36e5)}
function sameD(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function weekS(d){const o=new Date(d);const w=o.getDay();o.setDate(o.getDate()-(w===0?6:w-1));o.setHours(0,0,0,0);return o}
function weekE(d){const o=weekS(d);o.setDate(o.getDate()+7);return o}
const DEFAULT_LOGICAL_DAY_START_HOUR=6;
function getLogicalDayStartHour(){return DEFAULT_LOGICAL_DAY_START_HOUR}
function calendarDayKey(input){const d=new Date(input);return Number.isNaN(d.getTime())?'':d.toISOString().slice(0,10)}
function previousCalendarDayKey(day){const d=new Date(day+'T00:00:00');d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)}
function getGetupLogsSorted(){return (S?.logs||[]).filter(l=>l.category==='getup').map(l=>new Date(l.createdAt)).filter(d=>!Number.isNaN(d.getTime())).sort((a,b)=>a-b)}
function getNextGetupAfter(date){const t=new Date(date).getTime();return getGetupLogsSorted().find(d=>d.getTime()>t)||null}
function logLogicalDayKey(input){
  const d=new Date(input); if(Number.isNaN(d.getTime())) return '';
  const getups=getGetupLogsSorted();
  let last=null;
  for(const g of getups){ if(g<=d) last=g; else break; }
  if(last) return calendarDayKey(last);
  const o=new Date(d);
  if(o.getHours()<DEFAULT_LOGICAL_DAY_START_HOUR) o.setDate(o.getDate()-1);
  return o.toISOString().slice(0,10);
}
function logicalDayKey(input){return logLogicalDayKey(input)}
function getDayBounds(day){
  const key=typeof day==='string'?day:calendarDayKey(day);
  const startGetup=getGetupLogsSorted().find(g=>calendarDayKey(g)===key);
  if(startGetup){
    const next=getNextGetupAfter(startGetup);
    return {start:new Date(startGetup),end:next?new Date(next):new Date(new Date(startGetup).getTime()+24*60*60*1000)};
  }
  const prevKey=previousCalendarDayKey(key);
  const prevGetup=getGetupLogsSorted().find(g=>calendarDayKey(g)===prevKey);
  const fallbackStart=new Date(key+'T00:00:00');
  fallbackStart.setHours(DEFAULT_LOGICAL_DAY_START_HOUR,0,0,0);
  if(prevGetup){
    const next=getNextGetupAfter(prevGetup);
    if(next && calendarDayKey(next)===key) return {start:new Date(prevGetup),end:new Date(next)};
  }
  return {start:fallbackStart,end:new Date(fallbackStart.getTime()+24*60*60*1000)};
}
function logicalDayStart(day){return getDayBounds(day).start}
function logicalDayEnd(day){return getDayBounds(day).end}
function timeToInputValue(v){if(!v)return '';const d=new Date(v);return toL(d).slice(0,16)}
function h(tag,at,...ch){
  const e=document.createElement(tag);
  if(at)for(const[k,v]of Object.entries(at)){
    if(k==='cn')e.className=v;
    else if(k==='st'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='id')e.id=v;
    else if(typeof v==='boolean'){
      if(v)e.setAttribute(k,'');
      else if(k in e)e[k]=false;
    }
    else e.setAttribute(k,v);
  }
  for(const c of ch.flat(Infinity)){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  }
  return e;
}

const SK='tl_v2';
const TL_DB_NAME='time_lapse_rebuild';
const TL_DB_VERSION=1;
const TL_STORE='kv';
let tlDBPromise=null;
let persistTimer=null;
let tlHydrated=false;
function openTLDB(){
  if(tlDBPromise) return tlDBPromise;
  tlDBPromise=new Promise((resolve,reject)=>{
    const req=indexedDB.open(TL_DB_NAME,TL_DB_VERSION);
    req.onupgradeneeded=()=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(TL_STORE)) db.createObjectStore(TL_STORE);
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return tlDBPromise;
}
async function idbGet(key){
  try{
    const db=await openTLDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(TL_STORE,'readonly');
      const rq=tx.objectStore(TL_STORE).get(key);
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error);
    });
  }catch{return null}
}
async function idbSet(key,val){
  const db=await openTLDB();
  return await new Promise((resolve,reject)=>{
    const tx=db.transaction(TL_STORE,'readwrite');
    tx.objectStore(TL_STORE).put(val,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  });
}
async function migrateLegacyLocalStorage(){
  try{
    const existing=await idbGet(SK);
    if(existing) return existing;
    const legacy=localStorage.getItem(SK);
    if(legacy){
      const parsed=JSON.parse(legacy);
      await idbSet(SK,parsed);
      const stars=localStorage.getItem('tl_sleep_stars');
      if(stars){ try{ await idbSet('tl_sleep_stars',JSON.parse(stars)); }catch{} }
      const page=localStorage.getItem('tl_page_state');
      if(page){ try{ await idbSet('tl_page_state',JSON.parse(page)); }catch{} }
      return parsed;
    }
  }catch{}
  return null;
}

function save(){ queuePersist() }
function queuePersist(){
  if(!tlHydrated) return;
  clearTimeout(persistTimer);
  persistTimer=setTimeout(()=>{ saveAll(); },120);
}
async function hydrateFromDB(){
  try{
    let sv=await migrateLegacyLocalStorage();
    if(!sv) sv=await idbGet(SK);
    if(sv){
      if(sv.items&&typeof sv.items==='object') S.items=sv.items;
      if(Array.isArray(sv.logs)) S.logs=sv.logs;
      if(sv.mealProfiles&&typeof sv.mealProfiles==='object') S.mealProfiles=sv.mealProfiles;
      if(sv.tags&&typeof sv.tags==='object'){
        S.tags={...S.tags,...sv.tags};
        for(const k in TAG_DEFAULTS){ if(!Array.isArray(S.tags[k])) S.tags[k]=[...TAG_DEFAULTS[k]]; }
      }
      if(sv.workspace&&typeof sv.workspace==='object'){
        S.workspace={...S.workspace,...sv.workspace};
        if(!S.workspace.files) S.workspace.files={};
        if(!Array.isArray(S.workspace.plans)) S.workspace.plans=[];
        if(!Array.isArray(S.workspace.quickFileIds)) S.workspace.quickFileIds=[];
        if(!Array.isArray(S.workspace.workSessions)) S.workspace.workSessions=[];
        if(!S.workspace.planNotebook||typeof S.workspace.planNotebook!=='object') S.workspace.planNotebook={};
      }
      ensureDefaultCards();
      ensureWorkspaceExtras();
      ensureDefaultMoodPalette();
    }
    const stars=await idbGet('tl_sleep_stars');
    if(Array.isArray(stars)){ window.__TL_SLEEP_STARS__=stars; S.sleepUI.stars=stars; }
    const pageState=await idbGet('tl_page_state');
    if(pageState){
      if(pageState.mainView) S.mainView=pageState.mainView;
      if(pageState.sleepOpen) S.sleepUI.open=true;
      if(pageState.sleepMode) S.sleepUI.mode=pageState.sleepMode;
      if(pageState.sleepStartedAt) S.sleepUI.sleepStartedAt=pageState.sleepStartedAt;
      if(pageState.isNap) S.sleepUI.isNap=true;
      if(pageState.wakeModeStartedAt) S.sleepUI.wakeModeStartedAt=pageState.wakeModeStartedAt;
      if(pageState.workMode){
        S.workspace.workMode={fileId:pageState.workMode.fileId,startedAt:Date.now(),elapsed:pageState.workMode.elapsed||0,paused:true,draft:pageState.workMode.draft||'',lastSavedAt:Date.now(),uiVisible:false,tocOpen:false};
        S.workspace._workModeResume=true;
      }
    }
  }catch(err){ console.warn('hydrateFromDB failed:',err); }
  tlHydrated=true;
}

function exS(it,now){const exp=new Date(it.expiryDate),w=new Date(it.warningDate);return{left:dayD(exp,now),st:now>exp?'red':now>=w?'orange':'green'}}
function cyS(it,now){const l=new Date(it.lastDoneAt);const d=it.periodUnit==='hours'?hourD(now,l):dayD(now,l);return{d,num:d<it.cycleX?it.cycleX-d:d,st:d>=it.warnZ?'red':d>=it.cycleX?'orange':d>=it.remindY?'yellow':'green'}}
function garbageS(it,now){
  const last=new Date(it.lastDoneAt);
  const elapsed=dayD(now,last);
  const T=Math.max(1,Number(it.cycleDays||0)||1);
  const count=Number(it.count||0);
  const X=Number(it.limitX||0),Y=Number(it.remindY||0),Z=Number(it.warnZ||0);
  const onCycle = elapsed % T === 0;
  const faded = !onCycle;
  let st='green';
  if(count>=Z) st='red';
  else if(count>=Y) st='orange';
  else if(count>=X) st='yellow';
  const daysLeft = elapsed % T === 0 ? 0 : T - (elapsed % T);
  const nextNum = elapsed % T === 0 && elapsed>0 ? T : daysLeft;
  let ringProgress=0, ringMarker=0;
  if(count < X){ ringProgress = X? Math.min(1,count/X):0; ringMarker = 1; }
  else {
    const den=Math.max(1,Z-X);
    ringProgress = Math.min(1,(count-X)/den);
    ringMarker = Math.max(0,Math.min(1,(Y-X)/den));
  }
  return {elapsed,T,count,X,Y,Z,st,faded,nextNum,ringProgress,ringMarker,onCycle};
}

function reminderItems(now=new Date()){
  const colorMap={green:'var(--green)',yellow:'var(--yellow)',orange:'var(--orange)',red:'var(--red)'};
  const out=[];
  Object.entries(S.items||{}).forEach(([tab,arr])=>{
    (arr||[]).forEach(it=>{
      if(it.archived) return;
      let status=null, meta='';
      if(it.type==='expiry'){
        status=exS(it,now);
        if(status.st==='orange' || status.st==='red') meta=status.left<0?`已超過 ${Math.abs(status.left)} 天`:`剩餘 ${status.left} 天`;
      }else if(it.type==='cycle'){
        status=cyS(it,now);
        if(status.st==='yellow' || status.st==='orange' || status.st==='red'){
          meta=it.periodUnit==='hours'?`已經過 ${status.d} 小時`:`已經過 ${status.d} 天`;
        }
      }else if(it.type==='garbage'){
        status=garbageS(it,now);
        if(status.st==='yellow' || status.st==='orange' || status.st==='red') meta=`目前 ${status.count} / 提醒 ${status.Y} / 警告 ${status.Z}`;
      }
      if(status && ['yellow','orange','red'].includes(status.st)){
        out.push({id:it.id,tab,name:it.name,type:it.type,st:status.st,color:colorMap[status.st],meta});
      }
    });
  });
  const priority={red:0,orange:1,yellow:2,green:3};
  return out.sort((a,b)=>(priority[a.st]-priority[b.st]) || a.name.localeCompare(b.name,'zh-Hant'));
}

function bSum(e){
  const p=e.payload;const j=(...a)=>a.filter(Boolean).join(' · ');
  switch(e.category){
    case'sleep':case'wake':case'getup':return fmtT(e.createdAt);
    case'weight':return p.value?p.value+'kg':'';
    case'weather':return p.value||'';
    case'meal':return j(p.mode,p.kind,p.store,p.name);
    case'drink':return j(p.type,p.name,p.amount?p.amount+'ml':'');
    case'supplement':return j(p.type,p.name,p.dose?(p.dose+(p.unit||'')):'');
    case'expense':{
      let base=j(p.type,p.target,p.amount?p.amount+'円':'',p.method);
      const eDay=new Date(e.createdAt);
      const purchases=S.logs.filter(l=>l.category==='purchase'&&sameD(new Date(l.createdAt),eDay));
      if(purchases.length>0){
        const pn=purchases.map(x=>x.payload.items).filter(Boolean).join(' + ');
        if(pn){
          const existNote=p.note?p.note+' | ':'';
          return base+(existNote||pn?' ── '+(existNote)+pn:'');
        }
      }
      return base;
    }
    case'income':return j(p.type,p.amount?p.amount+'円':'',p.method);
    case'bowel':return j(p.volume,p.texture,...(p.feelings||[]));
    case'stomach':case'symptom':return j(p.type,p.note);
    case'cycle':return j(p.action,p.bleedingType,p.amount,...(p.flags||[]));
    case'cleaning':return j(...(p.items||[]),p.note);
    case'skincare':return j(p.type,...(p.items||[]));
    case'exercise':return j(p.name,p.duration,p.feeling);
    case'masturbation':return j(p.duration,p.feeling);
    case'chore':return p.name||'';
    case'purchase':return p.items||'';
    case'wake_summary':return j(...(p.quality||[]),p.dreamNote);
    default:return'';
  }
}
function timelineText(e){
  const p=e.payload||{};
  switch(e.category){
    case'sleep':return '進入睡眠';
    case'wake':{const dur=p.sleepDuration||'';return '醒來'+(dur?' 〈睡眠時長：'+dur+'〉':'');}
    case'getup':{const dur=p.lazeTime||'';return '起床'+(dur?' 〈賴床時長：'+dur+'〉':'');}
    case'meal':{

      const ctx=[];if(p.mode)ctx.push(p.mode);if(p.store)ctx.push(p.store);
      return verb+' '+( p.name||'')+(ctx.length?' 〈'+ctx.join(' · ')+'〉':'');

function attachSleepGestures(target){
  if(!target || target.dataset.gestureBound==='1') return;
  target.dataset.gestureBound='1';
  target.addEventListener('touchstart',e=>{
    if(e.touches && e.touches[0]) S.sleepUI.touchStartY=e.touches[0].clientY;
  },{passive:true});
  target.addEventListener('touchend',e=>{
    const start=S.sleepUI.touchStartY;
    const end=e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : null;
    if(start==null || end==null) return;
    const dy=end-start;
    if(Math.abs(dy)>60) handleSleepGesture(dy<0?'up':'down');
    S.sleepUI.touchStartY=null;
  });
  target.addEventListener('wheel',e=>{
    if(S.sleepUI.wheelLock) return;
    if(Math.abs(e.deltaY)<28) return;
    S.sleepUI.wheelLock=true;
    handleSleepGesture(e.deltaY>0?'up':'down');
    setTimeout(()=>{S.sleepUI.wheelLock=false},520);
  },{passive:true});
}

function openSleepAssist(isNap=false,startInTimer=false){
  const startedAt=(isNap&&startInTimer)?new Date().toISOString():null;
  S.sleepUI={open:true,mode:(isNap&&startInTimer)?'sleep_mode':'pre_sleep',memoInput:'',moodInput:'',selectedMood:'',weather:'',moodHistory:[...(S.tags.mood||[])],stars:loadSleepStars(),sleepStartedAt:startedAt,wokeAt:null,wakeModeStartedAt:null,allNighter:false,lineIndex:0,lastLineTick:Date.now(),isNap:!!isNap,sleepQuality:[],dreamNote:''};
  if(isNap&&startInTimer) addL('sleep',{mode:'nap'});
  R();
}
function backToMainFromNapSummary(){S.sleepUI.open=false;R();}
function closeSleepAssist(){S.sleepUI.open=false;R()}
function addSleepStar(){
  const text=(S.sleepUI.memoInput||'').trim();
  if(!text) return;
  const star={id:uid(),text,x:6+Math.random()*88,y:4+Math.random()*42,size:6+Math.random()*7,delay:Math.random()*1.8,duration:3+Math.random()*4,createdAt:new Date().toISOString()};
  S.sleepUI.stars.push(star);
  // Persist stars
  saveSleepStars();
  S.sleepUI.memoInput='';
  R();
}
function saveSleepStars(){
  try{idbSet('tl_sleep_stars',S.sleepUI.stars||[])}catch{}
}
function loadSleepStars(){ return Array.isArray(window.__TL_SLEEP_STARS__)?window.__TL_SLEEP_STARS__:[] }
function enterSleepMode(){
  S.sleepUI.sleepStartedAt=new Date().toISOString();
  S.sleepUI.allNighter=false;
  setSleepMode('sleep_mode','up');
  addL('sleep',{});
}
function handleAllNighter(){
  S.sleepUI.allNighter=true;
  S.sleepUI.sleepStartedAt=null;
  S.sleepUI.wokeAt=new Date().toISOString();
  setSleepMode('wake_summary','up');
  R();
}
function wakeUpFromSleep(){
  S.sleepUI.wokeAt=new Date().toISOString();
  addL('wake',S.sleepUI.isNap?{mode:'nap'}:{});
  if(S.sleepUI.isNap){setSleepMode('nap_summary','up'); R(); return;}
  setSleepMode('wake_summary','up');
  R();
}
function confirmWakeSummary(){
  const finalMood=S.sleepUI.selectedMood||(S.sleepUI.moodInput||'').trim();
  if(finalMood && !(S.sleepUI.moodHistory||[]).includes(finalMood)) S.sleepUI.moodHistory=[finalMood,...S.sleepUI.moodHistory].slice(0,8);
  if(finalMood) addTag('mood',finalMood);
  S.sleepUI.selectedMood=finalMood;
  S.sleepUI.wakeModeStartedAt=new Date().toISOString();
  setSleepMode('wake_mode','up');
  if(S.sleepUI.weather) addL('weather',{value:S.sleepUI.weather});
  R();
}
function finishGetUp(){
  addL('getup',{});
  S.sleepUI.mpDone=[];
  S.sleepUI.mpModal=null;
  setSleepMode('wake_complete','up');
  R();
}
function backToMainFromWakeComplete(){
  S.sleepUI.open=false;
  R();
}
function popBubble(id){
  const bubs=document.querySelectorAll('.mp-bub');
  bubs.forEach(b=>{
    if(b.dataset.mpid===id){
      b.classList.add('popping');
    }
  });
  setTimeout(()=>R(),460);
}

function rFlip(it){
  const w=h('div',{cn:'fn-wrap'});
  const row=h('div',{cn:'fn-row'});
  const box=h('div',{cn:'fn-box'});
  const inner=h('div',{cn:'fn-inner',id:'fn-'+it.id});

  const fr=h('div',{cn:'fn-face fn-front'});
  fr.appendChild(h('img',{src:it.image||DEMO,alt:it.name}));
  inner.appendChild(fr);

  const bk=h('div',{cn:'fn-face fn-back'});
  bk.appendChild(h('div',{cn:'fn-info'}, it.type==='expiry'?fmtT(it.purchasedAt):fmtT(it.lastDoneAt)));
  const acts=h('div',{cn:'fn-acts'});
  if(it.archived){
    acts.appendChild(h('button',{html:I.restore,title:'恢復',onClick:e=>{e.stopPropagation();S.mo={open:true,mode:'restore',tab:S.stab,item:it,form:null};R()}}));
    acts.appendChild(h('button',{html:I.edit,title:'編輯',onClick:e=>{e.stopPropagation();S.mo={open:true,mode:'edit',tab:S.stab,item:it,form:null};R()}}));
    if(!it.protected){
      acts.appendChild(h('button',{html:I.trash,title:'刪除',onClick:e=>{e.stopPropagation();S.items[S.stab]=(S.items[S.stab]||[]).filter(x=>x.id!==it.id);save();R()}}));
    }
  }else{
    if(it.type==='expiry'&&it.totalQty){
      acts.appendChild(h('button',{html:I.plus,title:'+1消耗',onClick:e=>{e.stopPropagation();S.items[S.stab]=S.items[S.stab].map(x=>x.id===it.id?{...x,usedQty:Math.min((x.usedQty||0)+1,x.totalQty||0)}:x);save();R()}}));
    }
    if(it.type==='cycle'){
      acts.appendChild(h('button',{html:I.check,title:'完成',onClick:e=>{e.stopPropagation();const now=new Date().toISOString();S.items[S.stab]=S.items[S.stab].map(x=>x.id===it.id?{...x,lastDoneAt:now}:x);save();R()}}));
    }
    if(it.type==='garbage'){
      acts.appendChild(h('button',{html:I.plus,title:'+1',onClick:e=>{e.stopPropagation();S.items[S.stab]=S.items[S.stab].map(x=>x.id===it.id?{...x,count:Number(x.count||0)+1}:x);save();R()}}));
      acts.appendChild(h('button',{html:I.check,title:'完成',onClick:e=>{e.stopPropagation();const now=new Date().toISOString();S.items[S.stab]=S.items[S.stab].map(x=>x.id===it.id?{...x,lastDoneAt:now,count:0}:x);save();R()}}));
    }
    acts.appendChild(h('button',{html:I.archive,title:'歸檔',onClick:e=>{e.stopPropagation();S.items[S.stab]=S.items[S.stab].map(x=>x.id===it.id?{...x,archived:true}:x);save();R()}}));
  }
  bk.appendChild(acts);
  inner.appendChild(bk);

  box.addEventListener('click',()=>inner.classList.toggle('flipped'));
  box.appendChild(inner);
  row.appendChild(box);

  if(!it.archived){
    let info=null;
    const metric=h('div',{cn:'fn-metric'});
    if(it.type==='expiry'){
      info=exS(it,S.now);
      if(it.totalQty){
        const prog=Math.min(1,(it.usedQty||0)/it.totalQty);
        metric.appendChild(mkRing(prog,info.st));
      }
      metric.appendChild(h('div',{cn:'fn-num '+(it.totalQty?'sm':'lg')+' c-'+info.st},String(info.left)));
    }else if(it.type==='cycle'){
      info=cyS(it,S.now);
      metric.appendChild(h('div',{cn:'fn-num lg c-'+info.st},String(info.num)));
    }else if(it.type==='garbage'){
      info=garbageS(it,S.now);
      metric.appendChild(mkRing(info.ringProgress,info.st,{faded:info.faded,marker:info.ringMarker}));
      metric.appendChild(h('div',{cn:'fn-num sm c-'+info.st,st:{opacity:info.faded?'.46':'1'}},String(info.nextNum)));
    }
    row.appendChild(metric);
  }

  w.appendChild(row);
  w.appendChild(h('div',{cn:'fn-name'},it.name));
  return w;
}

function mkRing(p,st,opts={}){
  const r=13,c=2*Math.PI*r,d=c*Math.max(0,Math.min(1,p));
  const faded=opts.faded?0.32:0.88;
  const marker=typeof opts.marker==='number'?Math.max(0,Math.min(1,opts.marker)):null;
  const cl={green:`rgba(104,168,120,${faded})`,yellow:`rgba(194,162,74,${faded})`,orange:`rgba(204,126,78,${faded})`,red:`rgba(192,88,88,${faded})`};
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 32 32');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)';
  let markerMarkup='';
  if(marker!==null){
    const a=(-90 + marker*360) * Math.PI / 180;
    const cx=16 + r*Math.cos(a), cy=16 + r*Math.sin(a);
    markerMarkup=`<circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="1.6" fill="rgba(120,110,104,.58)"/>`;
  }
  svg.innerHTML=`<circle cx="16" cy="16" r="${r}" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1.8"/><circle cx="16" cy="16" r="${r}" fill="none" stroke="${cl[st]||cl.green}" stroke-width="2" stroke-linecap="round" stroke-dasharray="${d} ${c-d}"/>${markerMarkup}`;
  return svg;
}

function getLogSchemaForEntries(entries, tab){
  const fieldMap={
    meal:[{key:'mode',label:'方式'},{key:'store',label:'店名'},{key:'kind',label:'餐別'},{key:'name',label:'品名'},{key:'calories',label:'熱量'},{key:'protein',label:'蛋白質'},{key:'fiber',label:'膳食纖維'},{key:'sugar',label:'糖分'},{key:'fatType',label:'油脂類型'},{key:'note',label:'備註說明'}],
    drink:[{key:'type',label:'類型'},{key:'name',label:'品名'},{key:'amount',label:'飲用量 ml'},{key:'sugar',label:'糖分'},{key:'fatType',label:'脂肪'}],
    supplement:[{key:'type',label:'類型'},{key:'name',label:'名稱'},{key:'dose',label:'劑量'},{key:'unit',label:'單位'}],
    expense:[{key:'type',label:'項目'},{key:'target',label:'對象'},{key:'amount',label:'金額'},{key:'method',label:'方式'},{key:'note',label:'備註'}],
    income:[{key:'type',label:'類型'},{key:'amount',label:'金額'},{key:'method',label:'方式'},{key:'note',label:'備註'}],
    bowel:[{key:'volume',label:'量'},{key:'texture',label:'狀態'},{key:'feelings',label:'感受'}],
    stomach:[{key:'type',label:'類型'},{key:'note',label:'內容'}],
    symptom:[{key:'type',label:'類型'},{key:'note',label:'內容'}],
    cycle:[{key:'action',label:'動作'},{key:'bleedingType',label:'類型'},{key:'amount',label:'量'},{key:'flags',label:'標記'}],
    cleaning:[{key:'items',label:'項目'},{key:'note',label:'備註'}],
    skincare:[{key:'type',label:'類型'},{key:'items',label:'使用內容'}],
    exercise:[{key:'name',label:'名稱'},{key:'duration',label:'時間段'},{key:'feeling',label:'感受'}],
    masturbation:[{key:'duration',label:'時間段'},{key:'feeling',label:'感受'}],
    sleep:[], wake:[], getup:[],
    weight:[{key:'value',label:'體重 kg'}],
    weather:[{key:'value',label:'天氣'}],
    chore:[{key:'name',label:'項目'}],
    purchase:[{key:'items',label:'內容'},{key:'amount',label:'金額'},{key:'note',label:'備註'}]
  };
  if(tab && tab!=='all' && fieldMap[tab]) return {fields:fieldMap[tab]};
  const fields=[];
  const seen=new Set();
  entries.forEach(entry=>{
    (fieldMap[entry.category]||[]).forEach(f=>{ if(!seen.has(f.label)){ seen.add(f.label); fields.push(f); } });
  });
  return {fields};
}
function getEntryValuesBySchema(entry, fields){
  const p=entry.payload||{};
  return fields.map(f=>{
    const val=p[f.key];
    if(val===undefined || val===null || val==='') return '—';
    if(Array.isArray(val)) return val.length?val.join('、'):'—';
    return String(val);
  });
}

function buildHomeMetrics(day){
  const logs=logsForLogicalDay(day);
  const weightDrink=l=>{
    const t=l.payload?.type||''; const amt=Number(l.payload?.amount||0);
    if(/純飲用水/.test(t)) return amt*1;
    if(/無糖清茶/.test(t)) return amt*0.95;
    if(/果汁|軟飲|咖啡|奶茶/.test(t)) return amt*0.7;
    if(/酒精/.test(t)) return 0;
    return amt;
  };
  const sugarDrink=l=>{
    const t=l.payload?.type||''; const amt=Number(l.payload?.amount||0);
    if(/果汁|軟飲/.test(t)) return amt*0.1;
    if(/咖啡|奶茶/.test(t)) return amt*0.2;
    return 0;
  };
  const focusMin=Object.values(S.workspace.files||{}).reduce((n,f)=>n+Number(f?.todayFocusMin||0),0)+(S.workspace.workSummary?.todayMinutes||0);
  const out={water:0,expense:0,cal:0,pro:0,fib:0,sugar:0,good:0,bad:0,focusMin};
  logs.forEach(l=>{
    if(l.category==='drink'){ out.water+=weightDrink(l); out.sugar+=sugarDrink(l); }
    if(l.category==='expense') out.expense+=Number(l.payload?.amount||0);
    if(l.category==='meal'){
      out.cal+=Number(l.payload?.calories||0);
      out.pro+=Number(l.payload?.protein||0);
      out.fib+=Number(l.payload?.fiber||0);
      out.sugar+=Number(l.payload?.sugar||0);
      if(l.payload?.fatType==='優質脂肪') out.good++;
      if(l.payload?.fatType==='低質脂肪') out.bad++;
    }
  });
  return out;
}

// ── LOG TAB ──
function rLog(rc){
  const f=S.lf;const now=S.now;

  const fl=h('div',{cn:'lf'});
  const cs=h('select');
  cs.appendChild(h('option',{value:'all'},'全部'));
  Object.entries(CL).forEach(([v,l])=>cs.appendChild(h('option',{value:v,selected:f.cat===v||undefined},l)));
  cs.addEventListener('change',e=>{f.cat=e.target.value;R()});
  fl.appendChild(cs);

  const rs=h('select');
  [['today','今天'],['day','某1日'],['week','某1週'],['month','某1月'],['custom','某日～某日']].forEach(o=>{
    rs.appendChild(h('option',{value:o[0],selected:f.range===o[0]||undefined},o[1]));
  });
  rs.addEventListener('change',e=>{f.range=e.target.value;R()});
  fl.appendChild(rs);

  if(f.range==='day'||f.range==='week'){
    const di=h('input',{type:'date',value:f.day||now.toISOString().slice(0,10)});
    di.addEventListener('change',e=>{f.day=e.target.value;R()});
    fl.appendChild(di);
  }
  if(f.range==='month'){
    const mi=h('input',{type:'month',value:f.month||now.toISOString().slice(0,7)});
    mi.addEventListener('change',e=>{f.month=e.target.value;R()});
    fl.appendChild(mi);
  }
  if(f.range==='custom'){
    const si=h('input',{type:'date',value:f.s||now.toISOString().slice(0,10)});
    const ei=h('input',{type:'date',value:f.e||now.toISOString().slice(0,10)});
    si.addEventListener('change',e=>{f.s=e.target.value;R()});
    ei.addEventListener('change',e=>{f.e=e.target.value;R()});
    fl.appendChild(si);fl.appendChild(h('span',{st:{color:'var(--text4)',fontSize:'10px'}},'～'));fl.appendChild(ei);
  }
  rc.appendChild(fl);

  // Filter
  let list=[...S.logs];
  if(f.cat!=='all')list=list.filter(l=>l.category===f.cat);
  list=list.filter(l=>{
    const d=new Date(l.createdAt);
    if(f.range==='today'){
      // Use day bounds based on getup time
      const bounds=getDayBounds(now,S.logs);
      return d>=bounds.start&&d<=bounds.end;
    }
    if(f.range==='day'){const b=new Date(f.day||now);return sameD(d,b)}
    if(f.range==='week'){const b=new Date(f.day||now);return d>=weekS(b)&&d<weekE(b)}
    if(f.range==='month'){const[y,m]=(f.month||now.toISOString().slice(0,7)).split('-').map(Number);return d.getFullYear()===y&&d.getMonth()+1===m}
    if(f.range==='custom'){return d>=new Date((f.s||now.toISOString().slice(0,10))+'T00:00:00')&&d<=new Date((f.e||now.toISOString().slice(0,10))+'T23:59:59')}
    return true;
  });
  // Don't show purchase logs separately in the timeline — they're merged into expense display
  list=list.filter(l=>l.category!=='purchase');
  list.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));

  if(list.length===0){
    rc.appendChild(h('div',{cn:'le-empty'},'當前篩選條件下沒有記錄'));
  }else{
    const tl=h('div',{cn:'lt'});
    list.forEach(e=>tl.appendChild(rLogE(e)));
    rc.appendChild(tl);
  }
}

function compExp(pa,ty,val){

  const d=new Date(pa);d.setDate(d.getDate()+Number(val||0));return d.toISOString();
}

function findMainDayIntervalContaining(date){
  const d=new Date(date);
  if(Number.isNaN(d.getTime())) return null;
  const wakes=getMainWakeLogsSorted();
  const sleeps=getMainSleepLogsSorted();
  for(let i=wakes.length-1;i>=0;i--){
    const wake=wakes[i];
    if(wake>d) continue;
    const end=sleeps.find(s=>s>wake);

function currentActiveLogicalDayKey(){
  const now=new Date();
  const wakes=getMainWakeLogsSorted();
  const sleeps=getMainSleepLogsSorted();
  let active=null;
  for(const wake of wakes){
    if(wake>now) break;
    const sleep=sleeps.find(s=>s>wake);
    if(!sleep || now<sleep) active=wake;
  }
  return active?calendarDayKey(active):logLogicalDayKey(now);

function findOwningWakeForDate(input){
  const d=new Date(input);
  if(Number.isNaN(d.getTime())) return null;
  const logs=(S?.logs||[])
    .filter(l=>isMainWakeLog(l)||isMainSleepLog(l))
    .map(l=>({type:isMainWakeLog(l)?'wake':'sleep', at:new Date(l.createdAt)}))
    .filter(x=>!Number.isNaN(x.at.getTime()))
    .sort((a,b)=>a.at-b.at);
  let activeWake=null;
  for(const item of logs){
    if(item.at>d) break;
    if(item.type==='wake') activeWake=item.at;
    else if(item.type==='sleep'){
      if(item.at.getTime()===d.getTime()) return activeWake;
      activeWake=null;
    }
  }

function logLogicalDayKey(input){
  const d=new Date(input);

  const owningWake=findOwningWakeForDate(d);
  if(owningWake) return calendarDayKey(owningWake);
  const o=new Date(d);
  if(o.getHours()<DEFAULT_LOGICAL_DAY_START_HOUR) o.setDate(o.getDate()-1);
  return o.toISOString().slice(0,10);
}

  }
  const fallbackStart=new Date(key+'T00:00:00');
  fallbackStart.setHours(DEFAULT_LOGICAL_DAY_START_HOUR,0,0,0);

function buildFocusHeatSeries(days=84){
  const map={};
  (Array.isArray(S.workspace.workSessions)?S.workspace.workSessions:[]).forEach(sess=>{
    const start=safeDate(sess.startAt||sess.startedAt||sess.at); if(!start) return;
    const end=safeDate(sess.endAt||sess.endedAt)||start;
    const mins=Math.max(1,Math.round((end-start)/60000));
    const key=logLogicalDayKey(start); if(!key) return; map[key]=(map[key]||0)+mins;
  });
  Object.values(S.workspace.files||{}).forEach(file=>{
    (Array.isArray(file?.focusSessions)?file.focusSessions:[]).forEach(sess=>{
      const start=safeDate(sess.startAt||sess.startedAt||sess.at); if(!start) return;
      const end=safeDate(sess.endAt||sess.endedAt)||start;
      const mins=Math.max(1,Math.round((end-start)/60000));
      const key=logLogicalDayKey(start); if(!key) return; map[key]=(map[key]||0)+mins;
    });
  });
  const out=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-i);
    const key=calendarDayKey(d); const mins=Math.round(map[key]||0);
    let level=0; if(mins>=180) level=4; else if(mins>=120) level=3; else if(mins>=60) level=2; else if(mins>0) level=1;
    out.push({key,mins,level});
  }
  return out;
}

    const d=s.date; if(d.getFullYear()===y&&d.getMonth()===m) flags[s.dateKey]={...(flags[s.dateKey]||{}),step:true,overdue:!s.done&&d<new Date()};
  });
  getCalendarEvents().forEach(e=>{
    const d=safeDate(e.at); if(!d||d.getFullYear()!==y||d.getMonth()!==m) return;
    const k=calendarDayKey(d); flags[k]={...(flags[k]||{}),event:true};
  });
  return flags;
}

function buildLogSummaryRow(cat,entries,fields){
  if(!['meal','drink','expense','income'].includes(cat)||!entries.length) return null;
  const tfoot=document.createElement('tfoot');
  const row=document.createElement('tr');
  row.style.cssText='font-weight:400;color:var(--text2);border-top:1.5px solid var(--border)';
  const tdLabel=document.createElement('td'); tdLabel.textContent='合計'; row.appendChild(tdLabel);
  if(cat==='meal'){
    const sums={calories:0,protein:0,fiber:0,sugar:0,good:0,bad:0,count:0};
    entries.forEach(e=>{const p=e.payload||{};sums.calories+=Number(p.calories||0);sums.protein+=Number(p.protein||0);sums.fiber+=Number(p.fiber||0);sums.sugar+=Number(p.sugar||0);if(p.fatType==='優質脂肪')sums.good++;if(p.fatType==='低質脂肪')sums.bad++;sums.count++;});
    const extCount=entries.filter(e=>e.payload?.mode==='外食').length;
    const sumMap={mode:extCount?`外食${extCount}次`:'—',store:'—',kind:`${sums.count}餐`,name:'—',calories:`${Math.round(sums.calories)} kcal`,protein:`${Math.round(sums.protein)} g`,fiber:`${Math.round(sums.fiber)} g`,sugar:`${Math.round(sums.sugar)} g`,fatType:`${sums.good}:${sums.bad}`,note:'—'};
    fields.forEach(f=>{const td=document.createElement('td');td.textContent=sumMap[f.key]||'—';td.style.fontFamily='var(--font-en)';row.appendChild(td);});
  }else if(cat==='drink'){
    const wt=l=>{const t=l.payload?.type||'',a=Number(l.payload?.amount||0);if(/純飲用水/.test(t))return a;if(/無糖清茶/.test(t))return a*0.95;if(/果汁|軟飲|咖啡|奶茶/.test(t))return a*0.7;if(/酒精/.test(t))return 0;return a;};
    let totalRaw=0,totalWater=0,totalSugar=0,fatCount=0;
    entries.forEach(e=>{const a=Number(e.payload?.amount||0);totalRaw+=a;totalWater+=wt(e);const t=e.payload?.type||'';if(/果汁|軟飲/.test(t))totalSugar+=a*0.1;if(/咖啡|奶茶/.test(t)){totalSugar+=a*0.2;fatCount++;}});
    const sumMap={type:`水占比 ${Math.round(totalWater)}:${Math.round(totalRaw-totalWater)}`,name:'—',amount:`水分 ${Math.round(totalWater)} ml`,sugar:totalSugar?`${Math.round(totalSugar)} g`:'—',fatType:fatCount?`${fatCount}條`:'—'};
    fields.forEach(f=>{const td=document.createElement('td');td.textContent=sumMap[f.key]||'—';td.style.fontFamily='var(--font-en)';row.appendChild(td);});
  }else if(cat==='expense'||cat==='income'){
    const total=entries.reduce((n,e)=>n+Number(e.payload?.amount||0),0);
    fields.forEach(f=>{const td=document.createElement('td');td.textContent=f.key==='amount'?`${Math.round(total)}円`:'—';td.style.fontFamily='var(--font-en)';row.appendChild(td);});
  }
  const tdAct=document.createElement('td');tdAct.textContent='';row.appendChild(tdAct);
  tfoot.appendChild(row);return tfoot;
}

          const tdAct=document.createElement('td'); tdAct.className='log-act-cell';
          const acts=h('div',{cn:'log-actions'});
          acts.appendChild(h('button',{cn:'pm-mini text',title:'修改',onClick:()=>{S.emo={open:true,entry,text:JSON.stringify(entry.payload,null,2),time:toL(new Date(entry.createdAt)),fieldDrafts:null};R();}},'修改'));
          acts.appendChild(h('button',{cn:'pm-mini',html:I.trash,title:'刪除',onClick:()=>{S.logs=S.logs.filter(l=>l.id!==entry.id);save();R();}}));
          tdAct.appendChild(acts); row.appendChild(tdAct); tbody.appendChild(row);
