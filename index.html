efreshTOCLinks(); requestAnimationFrame(renderNoteMarkers);\n        return;\n      }\n      if (html) {\n        const cleaned = sanitizePastedHTML(html);\n        const tpl = document.createElement('template');\n        tpl.innerHTML = cleaned;\n        insertFragmentAtSelection(tpl.content.cloneNode(true));\n      } else {\n        const frag = document.createDocumentFragment();\n        const lines = text.replaceAll('\\r\\n', '\\n').replaceAll('\\r', '\\n').split('\\n');\n        lines.forEach((line, idx) => {\n          if (idx > 0) frag.appendChild(document.createElement('br'));\n          frag.appendChild(document.createTextNode(line));\n        });\n        insertFragmentAtSelection(frag);\n      }\n      saveSelection();\n      persistState();\n      refreshTOCLinks();\n      requestAnimationFrame(renderNoteMarkers);\n    }\n\n        function buildLineSpacingPanel() {\n      const wrap = document.createElement('div');\n      wrap.className = 'insert-list';\n      [['1.2', '1.2'], ['1.4', '1.4'], ['1.6', '1.6'], ['1.8', '1.8'], ['2.0', '2'], ['預設', '']].forEach(([label, value]) => {\n        const btn = document.createElement('button');\n        btn.className = 'insert-choice';\n        btn.textContent = label;\n        btn.addEventListener('click', () => {\n          const block = closestBlock();\n          if (!block) return;\n          if (value) block.style.lineHeight = value; else block.style.removeProperty('line-height');\n          persistState();\n          closeAllFloatingPanels();\n        });\n        wrap.appendChild(btn);\n      });\n      return wrap;\n    }\n\n    function ensureSectionOutsideColumns() {\n      els.editor.querySelectorAll('.section-break').forEach(brk => {\n        const parent = brk.parentElement;\n        if (parent && parent.classList && parent.classList.contains('columns')) {\n          parent.parentNode.insertBefore(brk, parent.nextSibling);\n        }\n      });\n    }\n\n    function ensureHeadingIds() {\n      const h   closeWorkMode = function() {
    const wm = S.workspace.workMode;
    if (!wm) return;
    const file = getFile(wm.fileId);
    const payload = wm.minimalState || {};
    if (file) {
      if (typeof payload.title === 'string' && payload.title.trim()) file.name = payload.title.trim();
      if (typeof payload.content === 'string') file.content = payload.content;
      file.updatedAt = new Date().toISOString();
    }
    const totalMs = Math.max(0, Number(payload.accumulatedMs || 0));
    const totalMin = Math.max(0, Math.round(totalMs / 60000));
    S.workspace.workSessions = S.workspace.workSessions || [];
    const sessionId=uid();
    S.workspace.workSessions.push({id:sessionId,fileId:wm.fileId,startAt:wm._sessionStartedAt||new Date().toISOString(),endAt:new Date().toISOString(),mins:totalMin,durationMs:totalMs,interruptions:Number(payload.interruptCount||0),breaks:Math.max(0,Number(payload.sessionCount||1)-1)});
    S.workspace.workSummary = {sessionId,fileId:wm.fileId,duration:totalMin,durationMs:totalMs,interruptions:Number(payload.interruptCount||0),breaks:Math.max(0,Number(payload.sessionCount||1)-1),todayMinutes:totalMin};
    if (file) file.todayFocusMin = Number(file.todayFocusMin||0) + totalMin;
    document.querySelectorAll('.wm-iframe-overlay').forEach(el => el.remove());
    S.workspace.workMode = null;
    S.workspace._workModeResume = false;
    try{idbDel('tl_page_state')}catch{}

    R();
  };

  function initMinimalIframe(iframe, wm) {
    if (!iframe || !wm) return;
    const payload = Object.assign({}, ensureWMState(wm.fileId), wm.minimalState || {});
    iframe.addEventListener('load', () => {
      try {
        const cw = iframe.contentWindow;
        if (cw) {
          try {
            cw.closeEditorToHome = function() {
              try { if (typeof cw.persistState === 'function') cw.persistState(); } catch (err) {}
              let payload = {};
              try { payload = typeof cw.bridgePayload === 'function' ? cw.bridgePayload() : {}; } catch (err) {}
              try {
                cw.parent.postMessage({ source: 'minimalEditorBridge', type: 'close', payload }, '*');
              } catch (err) {}
            };
          } catch (err) { console.warn(err); }
          cw.postMessage({ source: 'parentIndexBridge', type: 'init', payload }, '*');
        }
      } catch (err) { console.warn(err); }
    }, { once: true });
  }

  rWorkMode = function() {
    const wm = S.workspace.workMode;
    const file = getFile(wm.fileId);
    const ov = h('div', { cn:'wm-iframe-overlay', st:{ position:'fixed', inset:'0', zIndex:'5000', background:'#fff' } });
    const iframe = document.createElement('iframe');
    iframe.setAttribute('title', (file?.name || 'Work Mode') + ' editor');
    iframe.setAttribute('frameborder', '0');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = '0';
    iframe.style.display = 'block';
    iframe.srcdoc = __minimalWorkModeSrc;
    initMinimalIframe(iframe, wm);
    ov.appendChild(iframe);
    return ov;
  };

  const __origR = R;
  R = function() {
    const existingOverlay = document.querySelector('.wm-iframe-overlay');
    if (S.workspace._workModeResume) S.mainView = 'home';
    __origR();
    if (S.workspace.workMode && !S.workspace._workModeResume) {
      if (!document.body.contains(existingOverlay)) {
        if (!document.querySelector('.wm-iframe-overlay')) document.body.appendChild(rWorkMode());
      } else if (!document.querySelector('.wm-iframe-overlay')) {
        document.body.appendChild(existingOverlay);
      }
    } else {
      document.querySelectorAll('.wm-iframe-overlay').forEach(el => el.remove());
    }
  };

  window.addEventListener('message', (event) => {
    const msg = event.data || {};
    if (msg.source !== 'minimalEditorBridge') return;
    const wm = S.workspace.workMode;
    if (!wm) return;
    if (msg.payload) {
      wm.minimalState = Object.assign({}, wm.minimalState || {}, msg.payload, {
        resumeSession: Number((msg.payload && msg.payload.accumulatedMs) || 0) > 0 || !!(msg.payload && msg.payload.resumeSession),
        isPaused: !!(msg.payload && msg.payload.isPaused)
      });
      const file = getFile(wm.fileId);
      if (file) {
        if (typeof msg.payload.title === 'string' && msg.payload.title.trim()) file.name = msg.payload.title.trim();
        if (typeof msg.payload.content === 'string') file.content = msg.payload.content;
        file.updatedAt = new Date().toISOString();
      }
      wsSave();
    }
    if (msg.type === 'close') {
      const file = getFile(wm.fileId);
      const payload = Object.assign({}, wm.minimalState || {}, msg.payload || {});
      const totalMs = Math.max(0, Number(payload.accumulatedMs || 0));
      const totalMin = Math.max(0, Math.round(totalMs / 60000));
      S.workspace.workSessions = S.workspace.workSessions || [];
      const sessionId=uid();
      S.workspace.workSessions.push({id:sessionId,fileId:wm.fileId,startAt:wm._sessionStartedAt||new Date().toISOString(),endAt:new Date().toISOString(),mins:totalMin,durationMs:totalMs,interruptions:Number(payload.interruptCount||0),breaks:Math.max(0,Number(payload.sessionCount||1)-1)});
      S.workspace.workSummary = {
        sessionId,
        fileId: wm.fileId,
        duration: totalMin,
        durationMs: totalMs,
        interruptions: Number(payload.interruptCount || 0),
        breaks: Math.max(0, Number(payload.sessionCount || 1) - 1),
        todayMinutes: totalMin
      };
      if (file) {
        file.todayFocusMin = Number(file.todayFocusMin || 0) + totalMin;
      }
      document.querySelectorAll('.wm-iframe-overlay').forEach(el => el.remove());
      S.workspace.workMode = null;
      S.workspace._workModeResume = false;
      S.mainView = 'files';
      try { idbDel('tl_page_state'); } catch (err) {}
      wsSave();
      setTimeout(() => { R(); }, 0);
    }
  });

  function syncWorkModeRecoveryFlags(){
    const wm = S.workspace && S.workspace.workMode;
    if (!wm) return;
    const ms = wm.minimalState || {};
    if (wm && (ms.resumeSession || ms.isPaused || Number(ms.accumulatedMs||0) >= 0)) {
      S.workspace._workModeResume = true;
    }
  }
  function enforceResumeLanding(){
    syncWorkModeRecoveryFlags();
    if (S.workspace && S.workspace._workModeResume) {
      S.mainView = 'home';
      document.querySelectorAll('.wm-iframe-overlay').forEach(el => el.remove());
    }
    if (S.workspace && S.workspace.workSummary) {
      document.querySelectorAll('.wm-iframe-overlay').forEach(el => el.remove());
    }
  }
  enforceResumeLanding();
  window.addEventListener('load', () => { enforceResumeLanding(); R(); });
  setTimeout(() => { enforceResumeLanding(); R(); }, 0);
  setTimeout(() => { enforceResumeLanding(); R(); }, 120);
})();
</script>

    return __oldUpsertPlan(fixed);

  savePageState = function(evt){
    const ps={mainView:S.mainView};
    if(S.workspace.workMode){
      const wm=S.workspace.workMode;
      const ms=Object.assign({}, wm.minimalState || {});
      const isUnloadEvent = !!(evt && typeof evt === 'object' && (evt.type === 'beforeunload' || evt.type === 'pagehide'));
      // On unload: mark as needing resume and count the page-close as one interrupt.
      // On normal saves (visibilitychange etc): save faithfully, no mutations.
      const saved = isUnloadEvent
        ? Object.assign({}, ms, {
            interruptCount: Number(ms.interruptCount || 0) + 1,
            resumeSession: true
          })
        : ms;
      ps.workMode={
        fileId:wm.fileId,
        _sessionStartedAt:wm._sessionStartedAt||null,
        minimalState:saved
      };
    }
    if(!(evt && typeof evt === 'object' && (evt.type === 'beforeunload' || evt.type === 'pagehide'))){
      try{idbSet('tl_page_state',ps)}catch{}
    }
  };
  if(window.__tlSavePageStateHandler){
    window.removeEventListener('beforeunload', window.__tlSavePageStateHandler);
    window.removeEventListener('pagehide', window.__tlSavePageStateHandler);
  }
  window.__tlSavePageStateHandler = (evt) => {
    const isUnload = !!(evt && (evt.type === 'beforeunload' || evt.type === 'pagehide'));
    if(!isUnload) flushSaveNow();
    savePageState(evt);
  };
  window.addEventListener('beforeunload', window.__tlSavePageStateHandler);
  window.addEventListener('pagehide', window.__tlSavePageStateHandler);
  restorePageState = function(){
    try{
      const ps=window.__TL_PAGE_STATE__||null;
      if(!ps) return;
      const hasPendingWorkMode = !!ps.workMode;
      if(ps.mainView && !hasPendingWorkMode) S.mainView=ps.mainView;
      if(ps.sleepOpen){
      }

        S.workspace._workModeResume=true;
      }
    }catch{}
  };

function recSave(){save('records','rtags','sleepFlow','logs')}
function escH(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
// ── Single source read/write ──
function logsFor(pid){return(S.logs||[]).filter(l=>l.panelId===pid)}
function logById(id){return(S.logs||[]).find(l=>l.id===id)}
function addLog(pid,data){
  const entry={...data,panelId:pid};
  S.logs.push(entry);
  try{autoRestoreSelfCookCard(entry)}catch(e){}
  recSave();
  try{if(typeof R==='function')R()}catch{}
}
// Auto-manage the self-cooking flipnote card whenever a food log with
// way='自炊' is added. The card ('洗碗-灶台清潔') lives in the kitchen
// category and acts as a 2-day cleanup reminder tied to self-cooking.
// Behaviour:
//   • If the card exists and is active → leave alone (user already sees it)
//   • If the card exists and is archived → restore with fresh timers
//   • If the card doesn't exist at all → create it in kitchen (first 自炊 log)
// The card is flagged with protected:true + defaultRestore:'selfCookMeal'
// so future delete-all flows or archive/restore logic can recognise it.
function autoRestoreSelfCookCard(entry){
  if(!entry||entry.panelId!=='food'||entry.way!=='自炊')return;
  const isSelfCookCard=(it)=>it&&(
    it.id==='l-default-selfcook'||
    (it.protected===true&&it.defaultRestore==='selfCookMeal')||
    (typeof it.name==='string'&&it.name.indexOf('洗碗-灶台')>=0)
  );
  // Search across all categories (shouldn't be anywhere but kitchen, but defensive)
  let target=null;
  const cats=['kitchen','fresh','pantry','living','garbage'];
  for(const cat of cats){
    const list=(S&&S.items&&S.items[cat])||[];
    const hit=list.find(isSelfCookCard);
    if(hit){target=hit;break}
  }
  if(target&&!target.archived)return; // already visible — do nothing
  const at=entry.executiveTime?new Date(entry.executiveTime):new Date(entry.createdAt||Date.now());
  if(isNaN(at))return;
  const expiry=new Date(at);expiry.setDate(expiry.getDate()+2);
  const warn=new Date(at.getTime()+8*3600*1000);
  const cardPatch={
    archived:false,
    purchasedAt:at.toISOString(),
    unit:'次',
    expiryType:'days',
    expiryDays:2,
    expiryDate:expiry.toISOString(),
    warningDate:warn.toISOString()
  };
  if(target){
    Object.assign(target,cardPatch);
  }else{
    // Auto-create on first 自炊 log
    if(!S.items)S.items={};
    if(!Array.isArray(S.items.kitchen))S.items.kitchen=[];
    S.items.kitchen.push({
      id:'l-default-selfcook',
      type:'expiry',
      name:'洗碗-灶台清潔',
      image:(typeof DEMO==='string'?DEMO:''),
      protected:true,
      defaultRestore:'selfCookMeal',
      ...cardPatch
    });
  }
  if(typeof itemsSave==='function')itemsSave();
}
function deleteLog(id){S.logs=S.logs.filter(l=>l.id!==id);recSave();try{if(typeof RM==='function')RM()}catch{}}
function updateLog(id,patch){const i=S.logs.findIndex(l=>l.id===id);if(i>=0)S.logs[i]={...S.logs[i],...patch};recSave();try{if(typeof RM==='function')RM()}catch{}}

// ── Tag helpers ──
function recBuildTags(persisted){
  const t={...persisted};
  REC_PANELS.forEach(p=>p.fields.forEach(f=>{
    if(!f.tagGroup)return;
    const d=f.defaultTags||[];
    const e=Array.isArray(t[f.tagGroup])?t[f.tagGroup]:[];
    t[f.tagGroup]=[...new Set([...d,...e])];
  }));
  return t;
}
function recEnsureTag(g,v){
  v=String(v||'').trim();if(!g||!v)return;
  if(!S.rtags[g])S.rtags[g]=[];
  if(!S.rtags[g].includes(v)){S.rtags[g].push(v);S.rtags[g].sort((a,b)=>a.localeCompare(b,'zh-Hant'))}
}
function recAddTagsFromRecord(panel,data){
  panel.fields.forEach(f=>{if(!f.tagGroup)return;const v=data[f.key];if(v==null||v==='')return;if(Array.isArray(v))v.forEach(x=>{if(x!=null&&x!=='')recEnsureTag(f.tagGroup,x)});else recEnsureTag(f.tagGroup,v)});
}
S.rtags=recBuildTags(S.rtags||{});

// ── Form rendering ──
function recRenderField(pid,f,data,ctx){
  if(f.conditional&&!f.conditional(data))return'';
  const ba=`data-rp="${pid}" data-rk="${f.key}" data-rc="${ctx}"`;
  const lbl=`<label>${escH(f.label)}</label>`;
  const wide=['textarea','multicheck','tag2multi','tag2single'].includes(f.type);
  let inp='';
  if(f.type==='select'){
    inp=`<select ${ba}><option value="">請選擇</option>${f.options.map(o=>`<option value="${escH(o)}"${data[f.key]===o?' selected':''}>${escH(o)}</option>`).join('')}</select>`;
  }else if(f.type==='tag1'){
    const dl=`dl_${ctx}_${pid}_${f.key}`;
    const ops=(S.rtags[f.tagGroup]||[]).map(o=>`<option value="${escH(o)}">`).join('');
    inp=`<input type="text" ${ba} list="${dl}" value="${escH(data[f.key]||'')}" placeholder="${escH(f.placeholder||'')}"/><datalist id="${dl}">${ops}</datalist>`;
  }else if(f.type==='number'){
    inp=`<input type="number" ${ba} value="${escH(data[f.key]==null?'':data[f.key])}" placeholder="0"/>${f.unit?`<div class="unit-h">${escH(f.unit)}</div>`:''}`;
  }else if(f.type==='textarea'){
    inp=`<textarea ${ba} placeholder="${escH(f.placeholder||'')}">${escH(data[f.key]||'')}</textarea>`;
  }else if(f.type==='multicheck'){
    inp=`<div class="tg">${f.options.map(o=>`<label><input type="checkbox" ${ba} value="${escH(o)}"${(data[f.key]||[]).includes(o)?' checked':''}><span>${escH(o)}</span></label>`).join('')}</div>`;
  }else if(f.type==='tag2multi'||f.type==='tag2single'){
    const sel=Array.isArray(data[f.key])?data[f.key]:[data[f.key]].filter(Boolean);
    const ops=S.rtags[f.tagGroup]||[];
    const tp=f.type==='tag2single'?'radio':'checkbox';
    inp=`<div class="tg">${ops.map(o=>`<label><input type="${tp}" name="r_${pid}_${f.key}_${ctx}" ${ba} value="${escH(o)}"${sel.includes(o)?' checked':''}><span>${escH(o)}</span></label>`).join('')}</div><div class="newtag"><input type="text" data-rp="${pid}" data-rk="${f.key}__newtag" data-rc="${ctx}" placeholder="新增標籤"/><button type="button" data-radd="${pid}" data-rtk="${f.key}" data-rc="${ctx}">＋</button></div>`;
  }else if(f.type==='duration'){
    const d=data[f.key]||{};
    inp=`<div class="ig"><input type="number" min="0" ${ba} data-dp="hours" value="${escH(d.hours==null?'':d.hours)}" placeholder="H" style="width:60px"/><input type="number" min="0" max="59" ${ba} data-dp="minutes" value="${escH(d.minutes==null?'':d.minutes)}" placeholder="Min" style="width:60px"/></div>`;
  }
  return `<div class="${wide?'span2':''}" data-fw="${f.key}">${lbl}${inp}</div>`;
}

function recGetValues(pid,ctx,root){
  const panel=REC_PANELS.find(p=>p.id===pid);const data={};
  panel.fields.forEach(f=>{
    if(f.type==='multicheck'||f.type==='tag2multi'){
      data[f.key]=[...root.querySelectorAll(`[data-rp="${pid}"][data-rk="${f.key}"][data-rc="${ctx}"]:checked`)].map(e=>e.value);
    }else if(f.type==='tag2single'){
      const el=root.querySelector(`[data-rp="${pid}"][data-rk="${f.key}"][data-rc="${ctx}"]:checked`);
      data[f.key]=el?el.value:'';
    }else if(f.type==='duration'){
      const hs=root.querySelector(`[data-rp="${pid}"][data-rk="${f.key}"][data-rc="${ctx}"][data-dp="hours"]`);
      const ms=root.querySelector(`[data-rp="${pid}"][data-rk="${f.key}"][data-rc="${ctx}"][data-dp="minutes"]`);
      data[f.key]={hours:hs?hs.value:'',minutes:ms?ms.value:''};
    }else{
      const el=root.querySelector(`[data-rp="${pid}"][data-rk="${f.key}"][data-rc="${ctx}"]`);
      data[f.key]=el?el.value.trim():'';
    }
  });
  return data;
}

function recFormatVal(v){
  if(Array.isArray(v))return v.join('｜')||'–';
  if(v===''||v==null)return'–';
  if(typeof v==='object'&&v&&('hours'in v||'minutes'in v))return(Number(v.hours||0))+'h '+(Number(v.minutes||0))+'m';
  return String(v);
}

function recNowStamp(){
  const n=new Date();
  return{isoDate:computeLogicalDay(n),isoDateTime:n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate())+'T'+pad(n.getHours())+':'+pad(n.getMinutes()),label:n.getFullYear()+'/'+pad(n.getMonth()+1)+'/'+pad(n.getDate())+' '+pad(n.getHours())+':'+pad(n.getMinutes())};
}

let _recOv=null;

function recOpenRecord(pid){
  recDismiss();
  const panel=REC_PANELS.find(p=>p.id===pid);if(!panel)return;
  const ov=document.createElement('div');ov.className='rec-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});
  const box=document.createElement('div');box.className='rec-mo-box';
  box.innerHTML=`<div class="rec-mo-title"><span>${escH(panel.title)}</span><button class="rec-close" data-rx>×</button></div>

  ov.appendChild(box);document.body.appendChild(ov);_recOv=ov;
  box.querySelectorAll('[data-rx]').forEach(b=>b.onclick=recDismiss);
  recBindTagAdd(pid,'m',box);

    try{if(typeof R==='function')R()}catch{}
  };
}

function recBindTagAdd(pid,ctx,root){
  root.querySelectorAll(`[data-radd="${pid}"][data-rc="${ctx}"]`).forEach(btn=>{
    btn.onclick=()=>{
      const key=btn.dataset.rtk;
      const f=REC_PANELS.find(p=>p.id===pid).fields.find(x=>x.key===key);
      const inp=root.querySelector(`[data-rp="${pid}"][data-rk="${key}__newtag"][data-rc="${ctx}"]`);
      const v=(inp?inp.value:'').trim();if(!v)return;
      recEnsureTag(f.tagGroup,v);recSave();
      const snap=recGetValues(pid,ctx,root);
      if(f.type==='tag2single')snap[key]=v;else snap[key]=[...new Set([...(snap[key]||[]),v])];
      const fg=root.querySelector('.rec-fg')||root.querySelector('#recForm')||root.querySelector('#recEditForm')||root.querySelector('#morningSubForm')||(root.closest&&root.closest('form'));
      if(fg){fg.innerHTML=REC_PANELS.find(p=>p.id===pid).fields.map(x=>recRenderField(pid,x,snap,ctx)).join('');recBindTagAdd(pid,ctx,root);recBindConditional(pid,ctx,root)}
    };
  });
  root.querySelectorAll(`[data-rk$="__newtag"][data-rc="${ctx}"]`).forEach(inp=>{
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();const k=inp.dataset.rk.replace('__newtag','');const b=root.querySelector(`[data-radd="${pid}"][data-rtk="${k}"][data-rc="${ctx}"]`);if(b)b.click()}};
  });
}

function recBindConditional(pid,ctx,root){
  const panel=REC_PANELS.find(p=>p.id===pid);
  panel.fields.filter(f=>panel.fields.some(x=>x.conditional)&&!['multicheck','duration','tag2multi','tag2single'].includes(f.type)).forEach(f=>{
    root.querySelectorAll(`[data-rp="${pid}"][data-rk="${f.key}"][data-rc="${ctx}"]`).forEach(el=>{
      el.onchange=()=>{
        const snap=recGetValues(pid,ctx,root);
        const fg=root.querySelector('.rec-fg')||root.querySelector('#recForm')||root.querySelector('#recEditForm')||root.querySelector('#morningSubForm')||(root.closest&&root.closest('form'));
        if(fg){fg.innerHTML=panel.fields.map(x=>recRenderField(pid,x,snap,ctx)).join('');recBindTagAdd(pid,ctx,root);recBindConditional(pid,ctx,root)}
      };
    });
  });
}

  // Position offscreen but in document flow so it renders with computed styles
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-99999px;top:0;width:'+Math.max(live.offsetWidth,720)+'px;padding:32px 36px;background:linear-gradient(180deg,#f6f8fc 0%,#eef1f7 100%);font-family:'+getComputedStyle(document.body).fontFamily;
  // Inject card styles for sections + table cleanup
  const styleEl=document.createElement('style');
  styleEl.textContent=`
    .rec-log-section{background:#ffffff;border:1px solid #e5eaef;border-radius:16px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
    .rec-log-section h4{margin:0 0 12px;font-size:14px;font-weight:600;color:#2a3450;letter-spacing:.04em}
    .rec-log-section table.rec-tbl{width:100%;border-collapse:collapse;font-size:12px}
    .rec-log-section table.rec-tbl th{text-align:left;font-weight:400;color:#7a8499;background:#f1f4fa;padding:8px 12px;border:1px solid #e5eaef}
    .rec-log-section table.rec-tbl td{padding:8px 12px;border:1px solid #e5eaef;color:#333;vertical-align:top}
  `;
  wrap.appendChild(styleEl);
  // Add title bar (Daily Log + date)
  const header=document.createElement('div');
  header.style.cssText='display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding:0 4px';
  const titleText=_logTab==='all'?'Daily Log':`Daily Log · ${escH(tabLabel)}`;
  header.innerHTML=`<div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;color:#2a3450;letter-spacing:.04em">${titleText}</div><div style="font-size:11px;color:#8a92a8;letter-spacing:.06em">${escH(dateLabel.replace('_',' ～ '))}</div>`;
  wrap.appendChild(header);
  wrap.appendChild(clone);
  document.body.appendChild(wrap);

  try{
    const canvas=await html2canvas(wrap,{backgroundColor:'#ffffff',scale:2,logging:false,useCORS:true});
    canvas.toBlob(blob=>{
      if(!blob){alert('導出失敗');return}
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`time-lapse-log_${tabLabel}_${dateLabel}.png`.replace(/\s+/g,'_');
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    },'image/png');
  }catch(e){
    console.error('export image failed',e);
    alert('導出失敗：'+(e&&e.message||e));
  }finally{
    setTimeout(()=>wrap.remove(),100);
  }
}

    <div class="rec-log-tabs" id="recLogTabs">${tabs.map(t=>`<button class="${t.id===_logTab?'on':''}" data-rlt="${t.id}">${escH(t.label)}</button>`).join('')}</div>

function recRenderLogBody(){
  const body=document.getElementById('recLogBody');if(!body)return;
  const today=getActiveLogicalDay();
  const isNewTab=['inventory','housework','work'].includes(_logTab);
  const showPanels=_logTab==='all'?REC_PANELS:(_logTab==='sleep'||isNewTab?[]:REC_PANELS.filter(p=>p.id===_logTab));
  const showSleep=_logTab==='all'||_logTab==='sleep';
  const showInventory=_logTab==='all'||_logTab==='inventory';
  const showHousework=_logTab==='all'||_logTab==='housework';
  const showWork=_logTab==='all'||_logTab==='work';
  const isAll=_logTab==='all';

  // ── Unified filter for "全部" mode ──
  const gf=S.recFilters._all||(S.recFilters._all={mode:'day',day:today});
  if(gf.mode==='day'&&!gf.day)gf.day=today;

  // Filter for standalone inventory/housework/work tabs
  let nf=null;
  if(isNewTab){
    nf=S.recFilters[_logTab]||(S.recFilters[_logTab]={mode:'day',day:today});
    if(nf.mode==='day'&&!nf.day)nf.day=today;
  }

  let html='';
  if(isAll){
    html+=`<div class="rec-log-filter" style="margin-bottom:12px;padding:6px 0;border-bottom:1px solid var(--border)">
      <select id="recAllMode"><option value="day"${gf.mode==='day'?' selected':''}>單日</option><option value="range"${gf.mode==='range'?' selected':''}>區間</option></select>
      <span id="recAllDay" ${gf.mode!=='day'?'style="display:none"':''}><input type="date" id="recAllDayVal" value="${gf.day||today}"/></span>
      <span id="recAllRange" ${gf.mode!=='range'?'style="display:none"':''}><input type="date" id="recAllFrom" value="${gf.from||today}"/> ～ <input type="date" id="recAllTo" value="${gf.to||today}"/></span></div>`;
  } else if(isNewTab){
    html+=`<div class="rec-log-filter" style="margin-bottom:12px;padding:6px 0;border-bottom:1px solid var(--border)">
      <select id="recNewMode"><option value="day"${nf.mode==='day'?' selected':''}>單日</option><option value="range"${nf.mode==='range'?' selected':''}>區間</option></select>
      <span id="recNewDay" ${nf.mode!=='day'?'style="display:none"':''}><input type="date" id="recNewDayVal" value="${nf.day||today}"/></span>
      <span id="recNewRange" ${nf.mode!=='range'?'style="display:none"':''}><input type="date" id="recNewFrom" value="${nf.from||today}"/> ～ <input type="date" id="recNewTo" value="${nf.to||today}"/></span></div>`;
  }

  // Sleep first
  if(showSleep) html+=`<div class="rec-log-section"><h4>睡眠</h4><div id="recSleepWrap"></div></div>`;
  // Then regular panels
  showPanels.forEach(p=>{
    if(isAll){
      // No per-panel filter in "全部" mode
      html+=`<div class="rec-log-section"><h4>${escH(p.title)}</h4><div data-rtw="${p.id}"></div></div>`;
    } else {
      const fk=S.recFilters[p.id]||(S.recFilters[p.id]={mode:'day',day:today});
      if(fk.mode==='day'&&!fk.day)fk.day=today;
      html+=`<div class="rec-log-section"><h4>${escH(p.title)}</h4>
        <div class="rec-log-filter"><select data-rfm="${p.id}"><option value="day"${fk.mode==='day'?' selected':''}>單日</option><option value="range"${fk.mode==='range'?' selected':''}>區間</option></select>
        <span data-rfd="${p.id}" ${fk.mode!=='day'?'style="display:none"':''}><input type="date" data-rfday="${p.id}" value="${fk.day||today}"/></span>
        <span data-rfr="${p.id}" ${fk.mode!=='range'?'style="display:none"':''}><input type="date" data-rffrom="${p.id}" value="${fk.from||today}"/> ～ <input type="date" data-rfto="${p.id}" value="${fk.to||today}"/></span></div>
        <div data-rtw="${p.id}"></div></div>`;
    }
  });
  // Inventory / housework / work at the end
  if(showInventory) html+=`<div class="rec-log-section"><h4>在庫管理</h4><div id="recInventoryWrap"></div></div>`;
  if(showHousework) html+=`<div class="rec-log-section"><h4>家務記錄</h4><div id="recHouseworkWrap"></div></div>`;
  if(showWork) html+=`<div class="rec-log-section"><h4>工作記錄</h4><div id="recWorkWrap"></div></div>`;
  body.innerHTML=html;

  // ── Bind unified filter ──
  if(isAll){
    const syncAllFilter=()=>{
      showPanels.forEach(p=>{
        S.recFilters[p.id]=Object.assign(S.recFilters[p.id]||{},{mode:gf.mode,day:gf.day,from:gf.from,to:gf.to});
        recRenderTable(p.id);
      });
      const sleepDay=gf.mode==='day'?gf.day:today;
      if(showSleep) recRenderSleepSection(body.querySelector('#recSleepWrap'),sleepDay);
      if(showInventory) recRenderInventorySection(body.querySelector('#recInventoryWrap'),sleepDay);
      if(showHousework) recRenderHouseworkSection(body.querySelector('#recHouseworkWrap'),sleepDay);
      if(showWork) recRenderWorkSection(body.querySelector('#recWorkWrap'),sleepDay,gf.mode,gf.from,gf.to);
    };
    const modeEl=body.querySelector('#recAllMode');
    const dayEl=body.querySelector('#recAllDayVal');
    const fromEl=body.querySelector('#recAllFrom');
    const toEl=body.querySelector('#recAllTo');
    if(modeEl)modeEl.onchange=()=>{gf.mode=modeEl.value;body.querySelector('#recAllDay').style.display=gf.mode==='day'?'':'none';body.querySelector('#recAllRange').style.display=gf.mode==='range'?'':'none';syncAllFilter()};
    if(dayEl)dayEl.onchange=()=>{gf.day=dayEl.value;syncAllFilter()};
    if(fromEl)fromEl.onchange=()=>{gf.from=fromEl.value;syncAllFilter()};
    if(toEl)toEl.onchange=()=>{gf.to=toEl.value;syncAllFilter()};
    syncAllFilter();
  } else if(isNewTab){
    const syncNewFilter=()=>{
      const targetDay=nf.mode==='day'?(nf.day||today):(nf.from||today);
      if(showInventory) recRenderInventorySection(body.querySelector('#recInventoryWrap'),targetDay);
      if(showHousework) recRenderHouseworkSection(body.querySelector('#recHouseworkWrap'),targetDay);
      if(showWork) recRenderWorkSection(body.querySelector('#recWorkWrap'),targetDay,nf.mode,nf.from,nf.to);
    };
    const modeEl=body.querySelector('#recNewMode');
    const dayEl=body.querySelector('#recNewDayVal');
    const fromEl=body.querySelector('#recNewFrom');
    const toEl=body.querySelector('#recNewTo');
    if(modeEl)modeEl.onchange=()=>{nf.mode=modeEl.value;body.querySelector('#recNewDay').style.display=nf.mode==='day'?'':'none';body.querySelector('#recNewRange').style.display=nf.mode==='range'?'':'none';syncNewFilter()};
    if(dayEl)dayEl.onchange=()=>{nf.day=dayEl.value;syncNewFilter()};
    if(fromEl)fromEl.onchange=()=>{nf.from=fromEl.value;syncNewFilter()};
    if(toEl)toEl.onchange=()=>{nf.to=toEl.value;syncNewFilter()};
    syncNewFilter();
  } else {
    // Individual panel filter bindings
    showPanels.forEach(p=>{
      const fk=S.recFilters[p.id];
      const modeEl=body.querySelector(`[data-rfm="${p.id}"]`);
      const dayEl=body.querySelector(`[data-rfday="${p.id}"]`);
      const fromEl=body.querySelector(`[data-rffrom="${p.id}"]`);
      const toEl=body.querySelector(`[data-rfto="${p.id}"]`);
      if(modeEl)modeEl.onchange=()=>{fk.mode=modeEl.value;body.querySelector(`[data-rfd="${p.id}"]`).style.display=fk.mode==='day'?'':'none';body.querySelector(`[data-rfr="${p.id}"]`).style.display=fk.mode==='range'?'':'none';recRenderTable(p.id)};
      if(dayEl)dayEl.onchange=()=>{fk.day=dayEl.value;recRenderTable(p.id)};
      if(fromEl)fromEl.onchange=()=>{fk.from=fromEl.value;recRenderTable(p.id)};
      if(toEl)toEl.onchange=()=>{fk.to=toEl.value;recRenderTable(p.id)};
      recRenderTable(p.id);
    });
    if(showSleep) recRenderSleepSection(body.querySelector('#recSleepWrap'),today);
  }
}

const SLEEP_KINDS_ARR=[{value:'sleep',label:'睡眠'},{value:'stayed_up',label:'熬穿了'},{value:'lazy',label:'賴床'},{value:'nap',label:'小睡'}];

function recRenderSleepSection(wrap,today){
  if(!wrap)return;
  // Cross-day sleep dedup: belongs to the day its endAt falls in (wake-up day).
  // For entries without endAt, fall back to startAt's logical day.
  const entries=logsFor('sleep').filter(e=>{
    if(e.endAt){return computeLogicalDay(e.endAt)===today}
    if(e.startAt){return computeLogicalDay(e.startAt)===today}
    return e.executiveDate===today||e.logicalDay===today;
  }).slice().sort((a,b)=>{
    const ta=a.startAt||a.executiveTime||'',tb=b.startAt||b.executiveTime||'';
    return ta<tb?-1:ta>tb?1:0;
  });
  const wEntry=logsFor('weather').find(w=>w.executiveDate===today||w.logicalDay===today);
  const wDisplay=wEntry?(wEntry.value||wEntry.weather||'＋'):'＋';
  const KINDS={sleep:'睡眠',stayed_up:'熬穿了',lazy:'賴床',nap:'小睡'};

  let header=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px">
    <button data-sleep-add style="border:1px solid var(--border);background:transparent;border-radius:6px;padding:4px 10px;cursor:pointer;font:inherit;font-size:12px;color:var(--text2)">＋ 補登</button>
    <button data-weather-edit style="border:1px solid var(--border);background:transparent;border-radius:6px;padding:4px 10px;cursor:pointer;font:inherit;font-size:14px">天氣 ${escH(wDisplay)}</button>
  </div>`;

  let tbl;
  if(!entries.length){
    tbl='<div style="color:var(--text4);font-size:12px;padding:8px 0">今日暫無睡眠紀錄</div>';
  }else{
    tbl='<table class="rec-tbl"><thead><tr><th>類型</th><th>時間</th><th>時長</th><th>品質</th><th>備註</th><th></th></tr></thead><tbody>';
    entries.forEach(e=>{
      const kind=KINDS[e.kind]||e.kind||'睡眠';
      const t1=e.startAt?markNextDay(fmtT(new Date(e.startAt)),e.startAt,today):'';
      const t2=e.endAt?markNextDay(fmtT(new Date(e.endAt)),e.endAt,today):'';
      const range=t1&&t2?t1+'～'+t2:e.executiveTimeLabel||'';
      const mins=e.startAt&&e.endAt?Math.round((new Date(e.endAt)-new Date(e.startAt))/60000):0;
      const dur=mins>0?Math.floor(mins/60)+'h'+pad(mins%60)+'m':'—';
      const hasNotes=e.kind==='sleep'||e.kind==='stayed_up'||!e.kind;
      const notesText=hasNotes&&e.notes?escH(e.notes):'—';
      tbl+=`<tr><td>${escH(kind)}</td><td>${escH(range)}</td><td>${escH(dur)}</td><td>${escH(e.quality||'—')}</td><td style="max-width:200px;white-space:normal;word-break:break-word">${notesText}</td>
        <td><div class="row-acts">
          <button data-sedit="${e.id}" title="編輯"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button>
          <button data-sdel="${e.id}" title="刪除"><svg viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 7l1 12h6l1-12"/></svg></button>
        </div></td></tr>`;
    });
    tbl+='</tbody></table>';
  }
  wrap.innerHTML=header+tbl;
  const addBtn=wrap.querySelector('[data-sleep-add]');if(addBtn)addBtn.onclick=()=>recOpenSleepEdit(null,today);
  const wxBtn=wrap.querySelector('[data-weather-edit]');if(wxBtn)wxBtn.onclick=()=>recOpenWeatherEdit(today);
  wrap.querySelectorAll('[data-sedit]').forEach(b=>b.onclick=()=>recOpenSleepEdit(b.dataset.sedit,today));
  wrap.querySelectorAll('[data-sdel]').forEach(b=>b.onclick=()=>{deleteLog(b.dataset.sdel);recRenderLogBody()});
}

function recOpenSleepEdit(entryId,day){
  recDismiss();
  const existing=entryId?S.logs.find(l=>l.id===entryId):null;
  const data=existing?{...existing}:{kind:'sleep',startAt:new Date().toISOString(),endAt:new Date().toISOString(),quality:'',notes:''};
  const fmtDtL=iso=>{if(!iso)return'';const d=new Date(iso);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())};
  const ov=document.createElement('div');ov.className='rec-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});
  const box=document.createElement('div');box.className='rec-mo-box';

  const captureInputs=()=>{
    const s=document.getElementById('sleep_start');
    const en=document.getElementById('sleep_end');
    const q=document.getElementById('sleep_quality');
    const n=document.getElementById('sleep_notes');
    if(s&&s.value){try{data.startAt=new Date(s.value).toISOString()}catch{}}
    if(en&&en.value){try{data.endAt=new Date(en.value).toISOString()}catch{}}
    if(q)data.quality=q.value;
    if(n)data.notes=n.value;
  };

  const buildBody=()=>{
    const hasQuality=data.kind==='sleep';
    const hasNotes=data.kind==='sleep'||data.kind==='stayed_up';
    const dateFieldStyle='display:flex;flex-direction:column;gap:4px';
    const dateLabelStyle='text-align:left;padding:0;font-size:12px;color:var(--text3)';
    return `<div class="rec-mo-title"><span>${existing?'編輯睡眠紀錄':'新增睡眠紀錄'}</span><button class="rec-close" data-rx>×</button></div>
      <form class="rec-fg" id="sleepEditForm">
        <div class="span2"><label>項目</label><select id="sleep_kind">${SLEEP_KINDS_ARR.map(k=>`<option value="${k.value}"${data.kind===k.value?' selected':''}>${k.label}</option>`).join('')}</select></div>
        ${data.kind!=='stayed_up'?`<div class="span2" style="${dateFieldStyle}"><label style="${dateLabelStyle}">開始時間</label><input type="datetime-local" id="sleep_start" value="${fmtDtL(data.startAt)}" style="width:100%"/></div>`:''}
        <div class="span2" style="${dateFieldStyle}"><label style="${dateLabelStyle}">${data.kind==='stayed_up'?'放棄時間':'結束時間'}</label><input type="datetime-local" id="sleep_end" value="${fmtDtL(data.endAt)}" style="width:100%"/></div>
        ${hasQuality?`<div class="span2"><label>睡眠質量</label><select id="sleep_quality"><option value="">（未選）</option>${SLEEP_QUALITY_OPTIONS.map(q=>`<option value="${q}"${data.quality===q?' selected':''}>${q}</option>`).join('')}</select></div>`:''}
        ${hasNotes?`<div class="span2"><label>備註</label><textarea id="sleep_notes" rows="3" placeholder="夢境、感受、任何想記的事">${escH(data.notes||'')}</textarea></div>`:''}
      </form>
      <div class="rec-acts">
        ${existing?'<button type="button" data-sx-del>刪除</button>':''}
        <button type="button" data-rx>取消</button>
        <button type="button" class="pri" data-sx-save>保存</button>
      </div>`;
  };

  const wireForm=()=>{
    box.querySelectorAll('[data-rx]').forEach(b=>b.onclick=recDismiss);
    const kindSel=document.getElementById('sleep_kind');
    if(kindSel)kindSel.onchange=()=>{captureInputs();data.kind=kindSel.value;box.innerHTML=buildBody();wireForm()};
    const delBtn=box.querySelector('[data-sx-del]');
    if(delBtn)delBtn.onclick=()=>{deleteLog(existing.id);recDismiss();recRenderLogBody()};
    box.querySelector('[data-sx-save]').onclick=()=>{
      captureInputs();
      const kind=data.kind;
      const startDate=(kind==='stayed_up')?null:(data.startAt?new Date(data.startAt):new Date());
      const endDate=data.endAt?new Date(data.endAt):new Date();
      const logicalDay=calendarDayKey(endDate);
      const payload={
        id:existing?existing.id:uid(),
        kind,
        startAt:startDate?startDate.toISOString():null,
        endAt:endDate.toISOString(),
        quality:(kind==='sleep')?(data.quality||''):'',
        notes:(kind==='sleep'||kind==='stayed_up')?(data.notes||''):'',
        logicalDay,
        executiveDate:logicalDay,
        executiveTime:fmtDtL(endDate.toISOString()),
        executiveTimeLabel:fmt(endDate),
        createdAt:existing?existing.createdAt:Date.now()
      };
      if(existing){updateLog(existing.id,payload)}
      else{addLog('sleep',payload)}
      recDismiss();
      recRenderLogBody();
    };
  };

  box.innerHTML=buildBody();
  ov.appendChild(box);document.body.appendChild(ov);_recOv=ov;
  wireForm();
}

function recOpenWeatherEdit(day){
  recDismiss();
  const targetDay=day||getActiveLogicalDay();
  const wEntry=logsFor('weather').find(w=>w.executiveDate===targetDay||w.logicalDay===targetDay);
  const current=wEntry?(wEntry.value||wEntry.weather||''):'';
  const STICKERS=(typeof WEATHER_STICKERS!=='undefined')?WEATHER_STICKERS:['☀️','⛅️','☁️','🍃','🌬','🌦','🌧','⛈️'];
  const ov=document.createElement('div');ov.className='rec-mo';
  ov.addEventListener('click',e=>{if(e.target===ov)recDismiss()});
  const box=document.createElement('div');box.className='rec-mo-box';
  box.innerHTML=`<div class="rec-mo-title"><span>選擇天氣 · ${escH(targetDay)}</span><button class="rec-close" data-rx>×</button></div>
    <div class="rec-fg" style="padding:14px 0">
      <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">
        ${STICKERS.map(s=>`<button type="button" data-w="${escH(s)}" style="font-size:24px;padding:10px 14px;border:1px solid ${s===current?'var(--accent)':'var(--border)'};background:${s===current?'rgba(178,158,210,0.15)':'transparent'};border-radius:12px;cursor:pointer">${escH(s)}</button>`).join('')}
      </div>
    </div>
    <div class="rec-acts">
      ${current?'<button type="button" data-w-clear>清除天氣</button>':''}
      <button type="button" data-rx>取消</button>
    </div>`;
  ov.appendChild(box);document.body.appendChild(ov);_recOv=ov;
  box.querySelectorAll('[data-rx]').forEach(b=>b.onclick=recDismiss);
  box.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>{
    const v=b.dataset.w;
    if(wEntry){updateLog(wEntry.id,{value:v,weather:v})}

    recDismiss();
    recRenderLogBody();
  });

    <div class="rec-fg" style="padding:10px 0">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">開始時間</div>
      <input type="datetime-local" id="wsStart" value="${curStart}" style="width:100%;box-sizing:border-box"/>
      <div style="font-size:12px;color:var(--text3);margin:12px 0 6px">結束時間</div>
      <input type="datetime-local" id="wsEnd" value="${curEnd}" style="width:100%;box-sizing:border-box"/>

      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="wsH" min="0" value="${curH}" style="width:60px"/> 小時
        <input type="number" id="wsM" min="0" max="59" value="${curM}" style="width:60px"/> 分
        <input type="number" id="wsS" min="0" max="59" value="${curS}" style="width:60px"/> 秒
      </div>
      <div style="font-size:12px;color:var(--text3);margin:12px 0 6px">推進進度 (${escH(unit||'單位')})</div>
      <input type="number" id="wsProg" value="${Number(ws.progressDelta||0)}" style="width:100%;box-sizing:border-box"/>
      <div style="font-size:12px;color:var(--text3);margin:12px 0 6px">工作心情</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;width:100%">
        ${MOODS.map(m=>`<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:999px;cursor:pointer;white-space:nowrap;width:auto;flex:0 0 auto"><input type="checkbox" data-mood value="${escH(m)}" ${curMoods.includes(m)?'checked':''} style="margin:0;width:auto"/><span style="white-space:nowrap">${escH(m)}</span></label>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--text3);margin:12px 0 6px">中斷次數</div>
      <input type="number" id="wsInt" min="0" value="${Number(ws.interruptions||0)}" style="width:100%;box-sizing:border-box"/>
    </div>
    <div class="rec-acts">
      <button type="button" data-del style="color:#c44">刪除</button>
      <button type="button" data-rx>取消</button>
      <button type="button" data-save class="rec-primary">保存</button>
    </div>`;
  ov.appendChild(box);document.body.appendChild(ov);_recOv=ov;
  box.querySelectorAll('[data-rx]').forEach(b=>b.onclick=recDismiss);
  box.querySelector('[data-del]').onclick=()=>{
    if(!confirm('刪除這筆工作紀錄？（不會影響工作文件本身）'))return;
    S.workspace.workSessions=(S.workspace.workSessions||[]).filter(s=>s.id!==sessionId);
    if(typeof wsSave==='function')wsSave();
    recDismiss();
    recRenderLogBody();
  };
  box.querySelector('[data-save]').onclick=()=>{
    const hh=Number(document.getElementById('wsH').value||0);
    const mm=Number(document.getElementById('wsM').value||0);
    const ss=Number(document.getElementById('wsS').value||0);
    const newMs=Math.max(0,hh*3600000+mm*60000+ss*1000);
    const progDelta=Number(document.getElementById('wsProg').value||0);
    const interrupts=Number(document.getElementById('wsInt').value||0);
    const newMoods=[...box.querySelectorAll('[data-mood]:checked')].map(el=>el.value);
    const startVal=document.getElementById('wsStart').value;
    const endVal=document.getElementById('wsEnd').value;
    const newStartAt=startVal?new Date(startVal).toISOString():null;
    const newEndAt=endVal?new Date(endVal).toISOString():null;
    S.workspace.workSessions=(S.workspace.workSessions||[]).map(s=>{
      if(s.id!==sessionId)return s;
      const patch={...s,durationMs:newMs,mins:Math.round(newMs/60000),mood:newMoods,interruptions:interrupts};
      if(newStartAt)patch.startAt=newStartAt;
      if(newEndAt)patch.endAt=newEndAt;
      if(Number.isFinite(progDelta))patch.progressDelta=progDelta;
      return patch;
    });
    if(typeof wsSave==='function')wsSave();
    recDismiss();
    recRenderLogBody();
  };
}

// ── Inventory log (food only: fresh + pantry) ──
function recRenderInventorySection(wrap,today){
  if(!wrap)return;
  const now=new Date();
  const catLabel={fresh:'生鮮果蔬',pantry:'存糧調料'};
  const items=[];
  ['fresh','pantry'].forEach(cat=>{
    (S.items[cat]||[]).filter(it=>!it.archived&&it.type==='expiry').forEach(it=>{
      items.push({...it,_cat:cat});
    });
  });
  const groups={today:[],normal:[],warning:[],expired:[]};
  items.forEach(it=>{
    const isToday=it.purchasedAt&&computeLogicalDay(it.purchasedAt)===today;
    const status=exS(it,now);
    let g;
    if(isToday)g='today';
    else if(status.st==='red')g='expired';
    else if(status.st==='orange')g='warning';
    else g='normal';
    groups[g].push({...it,_status:status});
  });
  groups.today.sort((a,b)=>new Date(b.purchasedAt||0)-new Date(a.purchasedAt||0));
  groups.normal.sort((a,b)=>new Date(a.expiryDate||0)-new Date(b.expiryDate||0));
  groups.warning.sort((a,b)=>new Date(a.expiryDate||0)-new Date(b.expiryDate||0));
  groups.expired.sort((a,b)=>new Date(b.expiryDate||0)-new Date(a.expiryDate||0));

  const allRows=[
    ...groups.today.map(it=>({...it,_g:'今日新增',_color:''})),
    ...groups.normal.map(it=>({...it,_g:'正常在庫',_color:''})),
    ...groups.warning.map(it=>({...it,_g:'臨近過期',_color:'#c89000'})),
    ...groups.expired.map(it=>({...it,_g:'已經過期',_color:'#c44'}))
  ];
  if(!allRows.length){wrap.innerHTML='<div style="color:var(--text4);font-size:12px;padding:8px 0">暫無在庫項目</div>';return}
  let tbl='<table class="rec-tbl"><thead><tr><th>狀態</th><th>名稱</th><th>類型</th><th>狀態</th></tr></thead><tbody>';
  allRows.forEach(r=>{
    const remaining=r._status.left;
    let timeText;
    if(remaining>0)timeText=`還有 ${remaining} 天`;
    else if(remaining===0)timeText='今日到期';
    else timeText=`過期 ${-remaining} 天`;
    const cs=r._color?`color:${r._color};font-weight:500`:'';
    tbl+=`<tr style="${cs}"><td>${escH(r._g)}</td><td>${escH(r.name||'')}</td><td>${escH(catLabel[r._cat]||'')}</td><td>${escH(timeText)}</td></tr>`;
  });
  tbl+='</tbody></table>';
  wrap.innerHTML=tbl;
}

// ── Housework log (kitchen + living + garbage) ──
function recRenderHouseworkSection(wrap,today){
  if(!wrap)return;
  const now=new Date();
  const catLabel={kitchen:'廚房衛浴',living:'居室生活',garbage:'垃圾分類'};
  const allHw=[];
  ['kitchen','living','garbage'].forEach(cat=>{
    (S.items[cat]||[]).forEach(it=>{
      // Include archived cards too — seedcards archive on completion but should still show in housework log
      allHw.push({...it,_cat:cat});
    });
  });

  // ── Table 1: completed today ──
  const completedToday=allHw.filter(it=>it.lastDoneAt&&computeLogicalDay(it.lastDoneAt)===today);
  completedToday.sort((a,b)=>new Date(a.lastDoneAt)-new Date(b.lastDoneAt));
  const wEntry=logsFor('window_open').find(w=>w.executiveDate===today||w.logicalDay===today);
  const wRawTime=wEntry?(wEntry.executiveTimeLabel||wEntry.executiveTime||''):'';
  const wTimeText=wEntry?markNextDay(wRawTime||'今日',wEntry.executiveTime,today):'';
  const wDoneStatus=wEntry?'已開窗通風':'<span style="color:var(--text4)">尚未開窗</span>';

  let html='<div style="font-size:12px;color:var(--text3);margin-bottom:6px">當日完成的項目（當天有完成動作的項目）</div>';
  html+='<table class="rec-tbl"><thead><tr><th>時間</th><th>完成項目</th><th></th></tr></thead><tbody>';
  // Fixed row 1: window open (similar to weight in selfcleaning)
  const wActs=wEntry?`<div class="row-acts"><button data-hw-edit-window="${today}" title="編輯時間"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button></div>`:'';
  html+=`<tr style="background:rgba(178,158,210,0.06)"><td>${escH(wTimeText)||'—'}</td><td>${wDoneStatus}</td><td>${wActs}</td></tr>`;
  completedToday.forEach(it=>{
    const t=markNextDay(fmtT(new Date(it.lastDoneAt)),it.lastDoneAt,today);
    const canUndo=it._undoBefore?'':'disabled style="opacity:.35;pointer-events:none"';
    const acts=`<div class="row-acts">
      <button data-hw-edit="${it._cat}|${it.id}" title="編輯時間"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button>
      <button data-hw-undo="${it._cat}|${it.id}" title="撤銷完成" ${canUndo}><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg></button>
    </div>`;
    html+=`<tr><td>${escH(t)}</td><td>${escH((catLabel[it._cat]||'')+'：'+(it.name||''))}</td><td>${acts}</td></tr>`;
  });
  html+='</tbody></table>';

  // ── Table 2: accumulated (yellow/orange/red) ──
  const accumulated=[];
  allHw.forEach(it=>{
    if(it.archived)return;
    let status,delayText,ultText;
    if(it.type==='cycle'){
      status=cyS(it,now);
      if(!['yellow','orange','red'].includes(status.st))return;
      const unit=it.periodUnit==='hours'?'小時':'天';
      const d=status.d;
      const cycleX=Number(it.cycleX||0);
      const warnZ=Number(it.warnZ||0);
      const overdue=Math.max(0,d-cycleX);
      delayText=`${overdue} ${unit}`+(overdue===0?'（接近）':'');
      const toRed=warnZ-d;
      ultText=toRed>0?`還有 ${toRed} ${unit}`:'已逾期';
    }else if(it.type==='garbage'){
      status=garbageS(it,now);
      if(!['yellow','orange','red'].includes(status.st))return;
      const X=Number(it.limitX||0);
      const Z=Number(it.warnZ||0);
      const cnt=Number(it.count||0);
      const T=Math.max(1,Number(it.cycleDays||0)||1);
      // Delay time: from when count crossed X. Tracked in xReachedAt.
      let daysSinceX,cycleIdx;
      if(it.xReachedAt){
        daysSinceX=Math.max(0,dayD(now,new Date(it.xReachedAt)));
        cycleIdx=Math.floor(daysSinceX/T)+1;
        delayText=`${daysSinceX} 天（正在第 ${cycleIdx} 個週期）`;
      }else{
        // No tracking — fall back to elapsed since lastDoneAt as approximation
        const last=new Date(it.lastDoneAt);
        const elapsed=Math.max(0,dayD(now,last));
        delayText=`${elapsed} 天`;
      }
      // Last warning: distance to Z (red threshold)
      const remainingToZ=Math.max(0,Z-cnt);
      // Distance to next valid cycle day (when you can do the task)
      const last=new Date(it.lastDoneAt);
      const elapsed=Math.max(0,dayD(now,last));
      const toNext=elapsed%T===0?0:T-(elapsed%T);
      ultText=`還有 ${remainingToZ} 個 ｜ 距離下個執行日還有 ${toNext} 天`;
    }else return;
    accumulated.push({it,status,delayText,ultText});
  });
  const sevOrder={red:0,orange:1,yellow:2};
  accumulated.sort((a,b)=>(sevOrder[a.status.st]||9)-(sevOrder[b.status.st]||9));

  html+='<div style="font-size:12px;color:var(--text3);margin:14px 0 6px">堆積項目（已經進入橙色提醒的項目）</div>';
  if(!accumulated.length){
    html+='<div style="color:var(--text4);font-size:12px;padding:8px 0">暫無堆積項目</div>';
  }else{
    html+='<table class="rec-tbl"><thead><tr><th>堆積項目</th><th>拖延時間</th><th>最後通牒</th></tr></thead><tbody>';
    accumulated.forEach(r=>{
      const cs=r.status.st==='red'?'color:#c44':r.status.st==='orange'?'color:#c89000':'';
      html+=`<tr style="${cs}"><td>${escH((catLabel[r.it._cat]||'')+'：'+(r.it.name||''))}</td><td>${escH(r.delayText)}</td><td>${escH(r.ultText)}</td></tr>`;
    });
    html+='</tbody></table>';
  }
  wrap.innerHTML=html;
  // Wire action buttons
  wrap.querySelectorAll('[data-hw-edit-window]').forEach(b=>{
    b.onclick=(ev)=>{ev.stopPropagation();recOpenWindowTimeEdit(b.dataset.hwEditWindow||today);};
  });
  wrap.querySelectorAll('[data-hw-edit]').forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      const [cat,id]=String(b.dataset.hwEdit).split('|');
      recOpenHwTimeEdit(cat,id);
    };
  });
  wrap.querySelectorAll('[data-hw-undo]').forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      const [cat,id]=String(b.dataset.hwUndo).split('|');
      const it=(S.items[cat]||[]).find(x=>x.id===id);
      if(!it||!it._undoBefore)return;
      const before=it._undoBefore;
      S.items[cat]=S.items[cat].map(x=>{
        if(x.id!==id)return x;
        const restored={...x};
        if('lastDoneAt' in before)restored.lastDoneAt=before.lastDoneAt;
        if('count' in before)restored.count=before.count;
        if('xReachedAt' in before)restored.xReachedAt=before.xReachedAt;
        delete restored._undoBefore;
        return restored;
      });
      itemsSave();
      recRenderLogBody();
    };
  });
}

// ── Work log (sessions + projects) ──
function recRenderWorkSection(wrap,today,filterMode,fromDay,toDay){
  if(!wrap)return;
  const now=new Date();

  // ── Table 1: work sessions for today (or filter range) ──
  const sessions=(S.workspace.workSessions||[]).filter(s=>{
    const k=computeLogicalDay(s.startAt||s.endAt);
    if(filterMode==='range')return k>=(fromDay||'')&&k<=(toDay||'9');
    return k===today;
  });
  sessions.sort((a,b)=>new Date(a.startAt||0)-new Date(b.startAt||0));

  let html='<div style="font-size:12px;color:var(--text3);margin-bottom:6px">總統計 1 張表</div>';
  html+='<table class="rec-tbl"><thead><tr><th>時間</th><th>工作文件</th><th>專注時間</th><th>推進進度</th><th>中斷次數</th><th>工作心情</th><th></th></tr></thead><tbody>';
  let totalMs=0;
  if(!sessions.length){
    html+='<tr><td colspan="7" style="color:var(--text4);font-size:12px;text-align:center;padding:10px">當日暫無工作紀錄</td></tr>';
  }else{
    sessions.forEach(s=>{
      const f=getFile(s.fileId);
      const fname=f?.name||'（已刪除）';
      const t1=s.startAt?markNextDay(fmtT(new Date(s.startAt)),s.startAt,today):'';
      const t2=s.endAt?markNextDay(fmtT(new Date(s.endAt)),s.endAt,today):'';
      const range=t1&&t2?t1+' ~ '+t2:'';
      const ms=s.durationMs||(s.mins||0)*60000;
      totalMs+=ms;
      const dur=ms<60000?fmtMs(ms):`${Math.floor(ms/3600000)}小時${Math.floor((ms%3600000)/60000)}分鐘`.replace(/^0小時/,'');
      let progText='—';
      if(s.workloadAtTime&&s.progressAfter!=null){
        const pct=Math.round((s.progressAfter/s.workloadAtTime)*100);
        const deltaPct=s.progressDelta?Math.round((s.progressDelta/s.workloadAtTime)*100):0;
        progText=`${pct}%${deltaPct?' (+'+deltaPct+'%)':''}`;
      }
      const moodText=Array.isArray(s.mood)&&s.mood.length?s.mood.join('、'):'—';
      const acts=`<div class="row-acts"><button data-ws-edit="${s.id}" title="編輯"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button><button data-ws-del="${s.id}" title="刪除"><svg viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 7l1 12h6l1-12"/></svg></button></div>`;
      html+=`<tr><td>${escH(range)}</td><td>${escH(fname)}</td><td>${escH(dur)}</td><td>${escH(progText)}</td><td>${Number(s.interruptions||0)}</td><td>${escH(moodText)}</td><td>${acts}</td></tr>`;
    });
    // Total row
    const totalText=totalMs<60000?fmtMs(totalMs):`${Math.floor(totalMs/3600000)}小時${Math.floor((totalMs%3600000)/60000)}分鐘`.replace(/^0小時/,'');
    const totalInt=sessions.reduce((n,s)=>n+Number(s.interruptions||0),0);
    html+=`<tr style="background:rgba(178,158,210,0.06);font-weight:500"><td>—</td><td>今日總專注時長</td><td>${escH(totalText)}</td><td>—</td><td>${totalInt}</td><td>—</td><td></td></tr>`;
  }
  html+='</tbody></table>';

  // ── Tables 2..N: per-project advancement ──
  // Show steps in window [today, today+7d) OR overdue (time < today AND not done)
  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  const cutoff=new Date(todayStart.getTime()+7*864e5);
  const stepInWindow=s=>{
    if(!s.time)return false;
    const t=new Date(s.time);
    return (t>=todayStart&&t<cutoff)||(t<todayStart&&!s.done);
  };
  const projects=(S.workspace.projects||[]).filter(p=>{
    return (p.children||[]).some(c=>(c.steps||[]).some(stepInWindow));
  });
  projects.forEach(p=>{
    const childrenWithRecentSteps=(p.children||[]).map(c=>{
      const recent=(c.steps||[]).filter(stepInWindow);
      recent.sort((a,b)=>new Date(a.time)-new Date(b.time));
      return {child:c,steps:recent};
    }).filter(x=>x.steps.length>0);
    if(!childrenWithRecentSteps.length)return;
    html+=`<div style="font-size:12px;color:var(--text3);margin:14px 0 6px">項目：${escH(p.name||'')}</div>`;
    html+='<table class="rec-tbl"><thead><tr><th>子項目</th><th>近期任務步驟</th><th>時間管理</th></tr></thead><tbody>';
    childrenWithRecentSteps.forEach(({child,steps})=>{
      steps.forEach((st,idx)=>{
        const dDays=Math.floor((new Date(st.time)-todayStart)/864e5);
        let timeText;
        if(dDays<0)timeText=`已拖延 ${-dDays} 天`;
        else if(dDays===0)timeText='今日';
        else timeText=`還有 ${dDays} 天`;
        const cellChild=idx===0?escH(child.name||''):'';
        const cellStyle=idx===0?'':'border-top:1px dashed var(--border)';
        const colorStyle=dDays<0?'color:#c44':'';
        html+=`<tr style="${colorStyle}"><td style="${cellStyle}">${cellChild}</td><td>${escH(st.name||'')}</td><td>${escH(timeText)}</td></tr>`;
      });
    });
    html+='</tbody></table>';
  });

  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-ws-edit]').forEach(b=>{
    b.onclick=(ev)=>{ev.stopPropagation();recOpenWorkSessionEdit(b.dataset.wsEdit);};
  });
  wrap.querySelectorAll('[data-ws-del]').forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      if(!confirm('刪除這筆工作紀錄？（不會影響工作文件本身）'))return;
      const sid=b.dataset.wsDel;
      S.workspace.workSessions=(S.workspace.workSessions||[]).filter(s=>s.id!==sid);
      if(typeof wsSave==='function')wsSave();
      if(typeof recRenderLogBody==='function')recRenderLogBody();
      if(typeof RM==='function')setTimeout(RM,0);
    };
  });
}

function recFilterRows(pid){
  const fk=S.recFilters[pid]||{mode:'day',day:getActiveLogicalDay()};
  const all=logsFor(pid);
  let filtered;
  if(fk.mode==='day')filtered=all.filter(r=>r.executiveDate===fk.day);
  else filtered=all.filter(r=>r.executiveDate>=(fk.from||'')&&r.executiveDate<=(fk.to||'9'));
  // Stable ascending sort: old → new. Rows without executiveTime keep original order.
  return filtered.map((r,i)=>({r,i})).sort((a,b)=>{
    const ta=a.r.executiveTime||'',tb=b.r.executiveTime||'';
    if(!ta&&!tb)return a.i-b.i;
    if(!ta)return 1;if(!tb)return -1;
    const da=a.r.executiveDate+'T'+ta,db=b.r.executiveDate+'T'+tb;
    if(da===db)return a.i-b.i;
    return da<db?-1:1;
  }).map(x=>x.r);
}

function recRenderTable(pid){

  // ── Weight row for selfcleaning ──
  let weightRowHtml='';
  if(pid==='selfcleaning'){
    const fk=S.recFilters.selfcleaning;
    if(fk&&fk.mode==='day'){
      const day=fk.day||calendarDayKey(new Date());
      const wEntry=logsFor('weight').find(w=>w.executiveDate===day||w.logicalDay===day);
      const wVal=wEntry?wEntry.value:null;

    }

  // Build summary row
  let sumCells={};
  if(pid==='food'){
    const ext=rows.filter(r=>r.way==='外食').length;
    sumCells={way:'外食 '+ext+' 次',energy:rows.reduce((s,r)=>s+pn(r.energy),0)+' Kcal',protein:rows.reduce((s,r)=>s+pn(r.protein),0)+' g',fiber:rows.reduce((s,r)=>s+pn(r.fiber),0)+' g',sugar:rows.reduce((s,r)=>s+pn(r.sugar),0)+' g'};
  }
  if(pid==='drink'){
    const eff=rows.reduce((s,r)=>s+pn(r.amount)*(r.type==='純飲用水'?1:r.type==='清淡茶飲'?0.95:0.7),0);
    sumCells={amount:Math.round(eff)+' ml'};
  }
  if(pid==='expense'||pid==='income'){
    sumCells={amount:rows.reduce((s,r)=>s+pn(r.amount),0)+' 円'};
  }
  const hasSummary=Object.keys(sumCells).length>0;
  const emptyInline=(!rows.length&&weightRowHtml)?`<tr><td colspan="${cols.length}" style="color:var(--text4);font-size:12px;padding:6px 0">暫無自我清潔紀錄</td></tr>`:'';

  wrap.innerHTML=`<table class="rec-tbl"><thead><tr>${cols.map(c=>c==='executiveTime'?'<th>時間</th>':c==='__actions'?'<th></th>':`<th>${escH(panel.fields.find(f=>f.key===c)?.label||c)}</th>`).join('')}</tr></thead>
    <tbody>${weightRowHtml}${emptyInline}${rows.map(r=>`<tr>${cols.map(c=>{
      if(c==='__actions')return`<td><div class="row-acts"><button data-redit="${pid}" data-rid="${r.id}" title="編輯"><svg viewBox="0 0 24 24"><path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"/><path d="M13.5 6.5l3.5 3.5"/></svg></button><button data-rdel="${pid}" data-rid="${r.id}" title="刪除"><svg viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M8 7l1 12h6l1-12"/></svg></button></div></td>`;
      if(c==='executiveTime')return`<td>${escH(markNextDay(r.executiveTimeLabel||r.executiveTime||'',r.executiveTime,r.executiveDate))}</td>`;
      return`<td>${escH(recFormatVal(r[c]))}</td>`;
    }).join('')}</tr>`).join('')}</tbody>
    ${hasSummary?`<tfoot><tr>${cols.map(c=>{
      if(c==='executiveTime')return'<td>合計</td>';
      if(c==='__actions')return'<td></td>';
      return`<td>${escH(sumCells[c]||'')}</td>`;

  wrap.querySelectorAll('[data-redit]').forEach(b=>b.onclick=()=>recOpenEdit(b.dataset.redit,b.dataset.rid));
  wrap.querySelectorAll('[data-rdel]').forEach(b=>b.onclick=()=>{deleteLog(b.dataset.rid);recRenderTable(b.dataset.rdel)});
  wrap.querySelectorAll('[data-wedit]').forEach(b=>b.onclick=()=>{

    if(v!==null&&v.trim()){

      else addLog('weight',{id:uid(),value:v.trim(),logicalDay:day,executiveDate:day,executiveTime:toL(new Date()),executiveTimeLabel:fmt(new Date()),createdAt:Date.now()});
      recRenderTable('selfcleaning');
    }
  });
}

    let __sleepFlowTimers = [];
    function clearSleepFlowTimers() {
      __sleepFlowTimers.forEach(t => clearInterval(t));
      __sleepFlowTimers = [];
    }

    showSleepFlow = function() {
      const overlay = document.getElementById('sleepFlowOverlay');
      if (!overlay) return;
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
      // Lock body scroll so the main page behind the overlay doesn't move.
      document.body.style.overflow = 'hidden';
      renderSleepFlow();
    }

    function hideSleepFlow() {
      const overlay = document.getElementById('sleepFlowOverlay');
      if (!overlay) return;
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      clearSleepFlowTimers();
    }

    function enterSleepFlow() {
      S.sleepFlow.phase = 'sleep_assist';
      recSave();
      showSleepFlow();
    }

    function exitSleepFlow() {
      S.sleepFlow = { phase: null, sleepStartAt: null, napStartAt: null, morningExpanded: null, morningCompleted: {} };
      recSave();
      hideSleepFlow();
      // Full re-render on exit: morning mode may have added records to any
      // of 5 panels plus weight/weather, so it's simplest to rebuild.
      R();
    }

    // Up-slide transition between phases: the current page slides up & out,
    // then the new page slides up from below. 320ms per direction, total
    // ~640ms, which feels unhurried without being sluggish.
    function transitionSleepFlow(newPhase, extraUpdates) {
      const pageEl = document.getElementById('sleepFlowPage');
      if (!pageEl) return;
      // Phase 1: old content slides up and fades out.
      pageEl.classList.add('exiting');
      setTimeout(() => {
        // Phase 2: swap state + content, start new content BELOW.
        S.sleepFlow.phase = newPhase;
        if (extraUpdates) Object.assign(S.sleepFlow, extraUpdates);
        // Wake marker: entering sleep_summary or no_sleep_summary marks the
        // start of a new logical day. All subsequent actions get attributed
        // to this wake's calendar day until the next wake event.
        if (newPhase === 'sleep_summary' || newPhase === 'no_sleep_summary') {
          const nowIso = new Date().toISOString();
          S.workspace.lastWakeAt = nowIso;
          S.sleepFlow.lazyStartAt = nowIso;
          save('workspace');
        }
        recSave();
        pageEl.classList.remove('exiting');
        pageEl.classList.add('entering');
        renderSleepFlow();
        // Force layout so the browser registers the 'entering' state
        // before we remove the class (otherwise no transition happens).
        void pageEl.offsetHeight;
        // Phase 3: remove 'entering' → transition to normal position.
        requestAnimationFrame(() => {
          requestAnimationFrame(() => pageEl.classList.remove('entering'));
        });
      }, 320);
    }

    function renderSleepFlow() {
      clearSleepFlowTimers();
      const pageEl = document.getElementById('sleepFlowPage');
      if (!pageEl) return;
      const phase = S.sleepFlow.phase;
      if (!phase) return;
      const renderers = {
        sleep_assist: renderSleepAssistPage,
        sleep_mode: renderSleepModePage,
        sleep_summary: renderSleepSummaryPage,
        no_sleep_summary: renderNoSleepSummaryPage,
        getup_assist: renderGetupAssistPage,
        morning_mode: renderMorningModePage,
        nap_mode: renderNapModePage,
        nap_summary: renderNapSummaryPage
      };
      const renderer = renderers[phase];
      if (renderer) renderer(pageEl);
      else pageEl.innerHTML = '<div>未知階段：' + escH(phase) + '</div>';
    }

    // Helpers
    function formatClockNow() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function formatElapsedSince(isoStart) {
      if (!isoStart) return '—';
      const ms = Date.now() - new Date(isoStart).getTime();
      const total = Math.max(0, Math.round(ms / 60000));
      const h = Math.floor(total / 60);
      const m = total % 60;
      if (h) return h + ' 小時 ' + m + ' 分鐘';
      return m + ' 分鐘';
    }

    // Format milliseconds as HH:MM:SS for the live sleep/nap mode display.
    // Used in sleep_mode and nap_mode to give a "ticking stopwatch" look,
    // even though it's not a real timer — it's always (Date.now() - startAt).
    // Per the PDF spec: "Sleep Timer (not a real timer, as user is likely to
    // exit the page when sleeping, so actually it always reflect a calculated
    // time length between Now and the time when user entered the Sleep-Mode)."
    function formatHMS(ms) {
      if (!ms || ms < 0) ms = 0;
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      const pad = n => String(n).padStart(2, '0');
      return pad(h) + ':' + pad(m) + ':' + pad(s);
    }

    // Small closure helper used by forms that need a weather picker with
    // toggle-on-click behavior and a captured "selected value" variable.
    function wireWeatherPicker(container) {
      let picked = '';
      const buttons = container.querySelectorAll('[data-weather]');
      buttons.forEach(btn => {
        btn.onclick = () => {
          picked = picked === btn.dataset.weather ? '' : btn.dataset.weather;
          buttons.forEach(b => b.classList.toggle('selected', b.dataset.weather === picked));
        };
      });
      return () => picked;
    }

    // ── Morning Mode (list view + sub-form view) ────────────────────────
    // Morning mode is a mini-integration screen that lets the user record
    // the 7 morning routine items before closing the sleep flow:
    //   1. 體重        (inline number input)
    //   2. 開窗通風    (inline checkbox)
    //   3-7. 進食 / 飲水 / 補劑藥品 / 自我清潔 / 容貌管理
    //        → each opens a sub-form that reuses renderField with a
    //          'morning' context. Submitting adds a record to the
    //          corresponding panel and returns to the list. The list shows
    //          today's count per panel so the user sees progress.
    //
    // morningExpanded in S.sleepFlow holds which panel's sub-form is
    // currently open (null = list view). It's persisted so a browser close
    // mid-form resumes in the same place.

    // Which panels show up as quick-log items in morning mode.
    const MORNING_PANEL_IDS = ['food', 'drink', 'nutrients', 'selfcleaning', 'skincare'];

    // Ordered spec for all 7 morning items. Each entry becomes one tile on
    // the semicircle wheel. id can be a panel id, 'weight', or 'window_open'.
    const MORNING_ITEMS_SPEC = [
      { id: 'weight',       label: '體重' },
      { id: 'window_open',  label: '開窗' },
      { id: 'food',         label: '進食' },
      { id: 'drink',        label: '飲水' },
      { id: 'nutrients',    label: '補劑' },
      { id: 'selfcleaning', label: '清潔' },
      { id: 'skincare',     label: '護膚' }
    ];

    // Figure out which items should still appear on the wheel.
    //   - weight:      shown if no weight recorded for today
    //   - window_open: shown if window not opened for today
    //   - panels:      shown if not yet completed in THIS morning session
    //                  (tracked via S.sleepFlow.morningCompleted)
    // This gives the "tap → record → item disappears" behavior the user
    // wanted, while still allowing multiple meals per day via the main page
    // after morning prep ends.
    function getActiveMorningItems(today) {
      const completed = S.sleepFlow.morningCompleted || {};
      return MORNING_ITEMS_SPEC.filter(item => {
        if (item.id === 'weight') return !getWeightForDay(today);
        if (item.id === 'window_open') return !getWindowOpenForDay(today);
        return !completed[item.id];
      });
    }

    function renderMorningModePage(pageEl) {
      const expanded = S.sleepFlow.morningExpanded;
      if (expanded) {
        renderMorningSubForm(pageEl, expanded);
      } else {
        renderMorningWheel(pageEl);
      }
    }

    // Helper: build the top-right skip button markup. Used on every morning
    // page (wheel + sub-forms) so the user can bail out at any point.
    function morningSkipBtnHtml() {
      return '<button type="button" class="morning-skip-btn" data-action="skip-morning" aria-label="跳過晨間整備" title="跳過晨間整備">×</button>';
    }

    function wireMorningSkipBtn(pageEl) {
      const skipBtn = pageEl.querySelector('[data-action="skip-morning"]');
      if (skipBtn) skipBtn.onclick = () => exitSleepFlow();
    }

    function renderMorningWheel(pageEl) {
      const today = getActiveLogicalDay();
      const items = getActiveMorningItems(today);

      // All 7 items done → show a completion page.
      if (items.length === 0) {
        pageEl.innerHTML = `
          ${morningSkipBtnHtml()}
          <div class="sleep-flow-title">整備完成</div>
          <div class="sleep-flow-subtitle">今天的晨間整備已經全部完成。好好開始這一天。</div>
          <div class="sleep-flow-buttons">
            <button type="button" class="sleep-flow-btn primary" data-action="done">回到主頁</button>
          </div>`;
        wireMorningSkipBtn(pageEl);
        pageEl.querySelector('[data-action="done"]').onclick = () => exitSleepFlow();
        return;
      }

      // Layout math: distribute items along a semicircle arc at the bottom
      // of the page. Arc spans at most 160° (from -80° to +80°). With fewer
      // items we use a tighter span (28° between neighbors) to keep them
      // from drifting too close to the edges.
      const N = items.length;
      const baseStep = 28; // desired degrees between neighbors
      const naturalSpan = (N - 1) * baseStep;
      const span = Math.min(160, naturalSpan);
      // Recompute the actual step after clamping so items stay symmetric.
      const actualStep = N > 1 ? span / (N - 1) : 0;
      const startAngle = -span / 2;
      const anglesDeg = N === 1 ? [0] : items.map((_, i) => startAngle + i * actualStep);

      // The wheel container uses --wheel-radius (set in CSS, responsive).
      // Each item uses rotate(angle) + translate(0, -R) + counter-rotate
      // to land on the arc while staying upright.
      const itemsHtml = items.map((item, i) => {
        const angle = anglesDeg[i];
        return `
          <div class="morning-wheel-radial" style="--angle:${angle}deg">
            <button type="button" class="morning-wheel-item" data-morning-item="${item.id}">
              <span class="morning-wheel-label">${escH(item.label)}</span>
            </button>
          </div>`;
      }).join('');

      pageEl.innerHTML = `
        ${morningSkipBtnHtml()}
        <div class="sleep-flow-title">晨間整備</div>
        <div class="sleep-flow-subtitle">輕觸任意一項開始記錄。完成後它會從輪盤消失。</div>
        <div class="morning-wheel-wrap">
          <div class="morning-wheel">
            ${itemsHtml}
          </div>
        </div>
        <div class="sleep-flow-buttons" style="max-width:320px">
          <button type="button" class="sleep-flow-btn ghost" data-action="done">提早結束整備</button>
        </div>`;

      wireMorningSkipBtn(pageEl);

      pageEl.querySelectorAll('[data-morning-item]').forEach(btn => {
        btn.onclick = () => {
          S.sleepFlow.morningExpanded = btn.dataset.morningItem;
          recSave();
          renderSleepFlow();
        };
      });

      pageEl.querySelectorAll('[data-action="done"]').forEach(btn => {
        btn.onclick = () => exitSleepFlow();
      });
    }

    // Dispatcher: one function that handles all sub-form types (weight,
    // window_open, and the 5 panels). Keeping them in one place makes the
    // "expanded" state machine simpler.
    function renderMorningSubForm(pageEl, itemId) {
      if (itemId === 'weight') { renderMorningWeightForm(pageEl); return; }
      if (itemId === 'window_open') { renderMorningWindowForm(pageEl); return; }
      const panel = REC_PANELS.find(p => p.id === itemId);
      if (!panel) {
        // Unknown item — bail back to the wheel safely.
        S.sleepFlow.morningExpanded = null;
        renderSleepFlow();
        return;
      }
      renderMorningPanelForm(pageEl, panel);
    }

    function renderMorningPanelForm(pageEl, panel) {
      const panelId = panel.id;
      // Layout: scrollable form area + fixed action footer (both as direct

      pageEl.innerHTML = `

      pageEl.querySelector('[data-action="morning-submit"]').onclick = () => {

        <div class="sleep-flow-timer">${escH(formatElapsedSince(startAt))}</div>
        <div class="sleep-flow-buttons">
          <button type="button" class="sleep-flow-btn primary" data-action="done">回到主頁</button>
        </div>`;
      pageEl.querySelector('[data-action="done"]').onclick = () => {
        const now = new Date();
        
        addLog('sleep',{
          id: uid(),
          kind: 'nap',
          startAt: startAt,
          endAt: now.toISOString(),
          quality: '',
          notes: '',
          // Nap doesn't reset logicalDay — use whichever wake-period endAt
          // falls into. computeLogicalDay handles this.
          logicalDay: computeLogicalDay(now),
          createdAt: Date.now()
        });
        recSave();
        exitSleepFlow();
      };
    }
    // ══════════════════════════════════════════════════════════════════════

    // ── JSON backup / restore ─────────────────────────────────────────────
    // Exports the entire persisted state (records + tags) as a JSON file
    // for the user to save locally. Imports read a file, confirm with the
    // user, replace the in-memory state, persist it, and re-render.
    //
    // Shape of the exported JSON:
    //   {
    //     version: 1,
    //     exportedAt: ISO string,
    //     records: { food: [...], drink: [...], ..., sleep: [...], weight: [...], weather: [...] },
    //     tags:    { food_name: [...], ... }
    //   }
// ── Legacy migration from separate timelapse_records IDB ──
(async function migrateRecordsIDB(){
  try{
    if(S.logs.length>0)return;
    const db=await new Promise((res,rej)=>{
      const req=indexedDB.open('timelapse_records',1);
      req.onupgradeneeded=()=>req.result.createObjectStore('kv');
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
    const data=await new Promise((res,rej)=>{
      const tx=db.transaction('kv','readonly');
      const rq=tx.objectStore('kv').get('records_v1');
      rq.onsuccess=()=>res(rq.result);
      rq.onerror=()=>rej(rq.error);
    });
    db.close();
    if(!data)return;
    if(data.records&&typeof data.records==='object'){
      const flat=[];
      Object.keys(data.records).forEach(pid=>{
        if(Array.isArray(data.records[pid])) data.records[pid].forEach(r=>flat.push({...r,panelId:pid}));
      });
      if(flat.length){S.logs=flat;recSave()}
    }
    if(data.tags&&typeof data.tags==='object'){
      S.rtags=recBuildTags({...S.rtags,...data.tags});recSave();
    }
    console.log('Records migrated from legacy timelapse_records IDB');
  }catch(e){/* no legacy data */}
})();

})();
</script>
