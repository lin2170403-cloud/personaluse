<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport"  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="apple-touch-icon" href="icon5.jpg">
<!-- 让 Safari 以“App 模式”打开 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Time Lapse">
<title>Time Lapse</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f6f3;
  --glass:rgba(255,255,255,0.58);
  --glass2:rgba(255,255,255,0.42);
  --glass3:rgba(255,255,255,0.28);
  --border:rgba(165,155,145,0.16);
  --border2:rgba(165,155,145,0.10);
  --text:#37342f;
  --text2:#5f5852;
  --text3:#7d746c;
  --text4:#a59990;
  --lav:rgba(178,158,210,0.22);
  --mint:rgba(138,210,178,0.18);
  --rose:rgba(218,158,168,0.18);
  --lav-s:rgba(105,72,155,0.88);
  --mint-s:rgba(42,128,90,0.85);
  --rose-s:rgba(165,72,85,0.8);
  --green:#68a878;--yellow:#c2a24a;--orange:#cc7e4e;--red:#c05858;
  --font-jp:'Noto Serif TC',serif;
  --font-en:'Cormorant Garamond',serif;
  --sbw:140px;--sbw-c:34px;
}
html{font-size:13px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:var(--font-jp);font-weight:300;color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 8% 0%,var(--lav),transparent 48%),
    radial-gradient(ellipse at 92% 95%,var(--mint),transparent 45%),
    radial-gradient(ellipse at 48% 48%,var(--rose),transparent 55%);
  background-attachment:fixed;
}
input,select,textarea,button{font-family:inherit;font-weight:300;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}

/* ═══ SIDEBAR ═══ */
#sidebar{
  position:fixed;left:0;top:0;z-index:40;height:100vh;
  width:var(--sbw);
  border-right:1px solid var(--border2);
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  display:flex;flex-direction:column;
  transition:width .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#sidebar.collapsed{width:var(--sbw-c)}
#sidebar.collapsed .sb-head{padding:10px 4px 6px;border-bottom:none}
#sidebar.collapsed .sb-head-row{justify-content:center;margin-bottom:0}
#sidebar.collapsed .sb-title,
#sidebar.collapsed .sb-tabs,
#sidebar.collapsed .sb-toggle,
#sidebar.collapsed .sb-items{opacity:0;pointer-events:none;transform:translateX(-10px)}
.sb-head{padding:10px 10px 6px;border-bottom:1px solid var(--border2)}
.sb-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;transition:.24s}
.sb-title{font-size:8px;letter-spacing:.24em;color:var(--text4);text-transform:uppercase;font-family:var(--font-en)}
.sb-tabs{display:flex;flex-direction:column;gap:2px;transition:.22s}
.sb-tab{
  border:1px solid transparent;border-radius:8px;padding:4px 7px;
  text-align:left;cursor:pointer;background:transparent;color:var(--text3);transition:.2s;
}
.sb-tab .t-num{font-size:8px;color:var(--text4);font-family:var(--font-en);font-weight:400}
.sb-tab .t-lbl{font-size:10.5px;margin-top:1px;line-height:1.3}
.sb-tab.on{background:rgba(255,255,255,0.55);border-color:var(--border);color:var(--text)}
.sb-tab:hover:not(.on){background:rgba(255,255,255,0.25)}
.collapsed .t-lbl,.collapsed .sb-tabs,.collapsed .sb-toggle,.collapsed .sb-items{display:none}
.sb-toggle{
  display:flex;gap:2px;padding:5px 8px;border-bottom:1px solid var(--border2);transition:.22s;
}
.sb-pill{
  flex:1;border:none;border-radius:14px;padding:3px 0;font-size:9.5px;
  cursor:pointer;background:transparent;color:var(--text4);transition:.2s;
}
.sb-pill.on{background:rgba(255,255,255,0.5);color:var(--text2)}
.sb-items{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:10px;transition:.22s;
}
.btn-i{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text3);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:.18s;
  flex-shrink:0;
}
.btn-i:hover{background:var(--glass);color:var(--text2)}
.btn-i svg{width:13px;height:13px}
.btn-add-flip{
  width:68px;height:68px;border-radius:18px;
  border:1.5px dashed rgba(125,116,108,0.18);background:transparent;
  color:var(--text3);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:9px;transition:.2s;
}
.btn-add-flip:hover{border-color:var(--text3);color:var(--text3);background:rgba(255,255,255,0.2)}
.btn-add-flip svg{width:14px;height:14px}

/* ═══ FLIP NOTE ═══ */
.fn-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.fn-row{display:flex;align-items:center;justify-content:center;gap:10px;width:100%}
.fn-box{width:68px;height:68px;perspective:900px;cursor:pointer;flex:0 0 auto}
.fn-inner{
  position:relative;width:100%;height:100%;
  transition:transform .52s cubic-bezier(.4,.1,.2,1);
  transform-style:preserve-3d;
}
.fn-inner.flipped{transform:rotateY(180deg)}
.fn-face{
  position:absolute;inset:0;border-radius:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:visible;
  border:none;box-shadow:none;
}
.fn-front{background:transparent;display:flex;align-items:center;justify-content:center}
.fn-front img{width:100%;height:100%;object-fit:contain;border-radius:0;display:block;image-rendering:auto}
.fn-num{font-family:var(--font-en);font-weight:600;letter-spacing:-.02em;line-height:1}
.fn-num.lg{font-size:18px}
.fn-num.sm{font-size:13px}
.fn-metric{position:relative;display:flex;align-items:center;justify-content:center;min-width:36px;height:36px;flex:0 0 36px}
.fn-metric .fn-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.fn-back{
  transform:rotateY(180deg);
  background:linear-gradient(180deg, rgba(248,246,243,0.78), rgba(248,246,243,0.58));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:14px;
  padding:6px;display:flex;flex-direction:column;justify-content:space-between;
}
.fn-info{font-size:8px;color:var(--text2);line-height:1.42}
.fn-acts{display:flex;align-items:center;justify-content:flex-end;gap:2px}
.fn-acts button{
  width:20px;height:20px;border-radius:50%;border:1px solid var(--border);
  background:var(--glass2);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.18s;
}
.fn-acts button:hover{background:var(--glass)}
.fn-acts button svg{width:10px;height:10px}
.fn-name{
  max-width:72px;text-align:center;font-size:10px;color:var(--text2);
  line-height:1.25;overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-orange{color:var(--orange)}.c-red{color:var(--red)}

/* ═══ MAIN ═══ */
#main{
  margin-left:var(--sbw);min-height:100vh;
  transition:margin-left .32s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#sidebar.collapsed~#main{margin-left:var(--sbw-c)}
.hdr{
  position:relative;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:start;
  gap:18px;
  padding:26px 8px 12px 18px;
}
.hdr-left{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  text-align:left;
}
.hdr-clock{
  font-family:var(--font-en);font-weight:300;font-size:36px;
  letter-spacing:.05em;color:var(--text);line-height:1;
}
.hdr-date{
  font-family:var(--font-en);font-weight:400;font-size:11.5px;
  color:var(--text2);margin-top:6px;letter-spacing:.1em;
}
.hdr-title{
  font-family:var(--font-en);font-weight:500;font-size:17px;
  letter-spacing:.24em;color:var(--text3);text-transform:uppercase;margin-top:9px;
}

.hdr-end{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.44);
  background:rgba(255,255,255,0.34);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(90,82,75,.72);transition:.22s;box-shadow:0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.55);
  justify-self:end;margin-right:0;
}
.hdr-end:hover{background:rgba(255,255,255,0.52);color:var(--text2);transform:translateY(-1px)}
.hdr-end svg{width:12px;height:12px}
.fab-stack{position:fixed;right:8px;bottom:14px;z-index:50;display:flex;flex-direction:column;gap:10px}
.fab-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.44);
  background:rgba(255,255,255,0.34);backdrop-filter:blur(22px) saturate(120%);-webkit-backdrop-filter:blur(22px) saturate(120%);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(90,82,75,.72);transition:.22s;box-shadow:0 8px 24px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.55);
}
.fab-btn:hover{background:rgba(255,255,255,0.52);color:var(--text2);transform:translateY(-1px)}
.fab-btn svg{width:14px;height:14px}
.pm-box{overflow:hidden;display:flex;flex-direction:column}
.mo-box.pm-box.panel-logs{width:min(88vw,1240px);height:min(82vh,780px);max-height:min(82vh,780px)}
.mo-box.pm-box.panel-tags{width:min(62vw,860px);height:min(72vh,680px);max-height:min(72vh,680px)}
.mo-box.pm-box.panel-trends{width:min(56vw,760px);height:min(50vh,420px);max-height:min(50vh,420px)}
.mo-box.pm-box.panel-backup{width:min(42vw,520px);height:auto;max-height:min(58vh,460px)}
.panel-mo{padding:2px}
.pm-body{padding:0 18px 18px;overflow:auto;flex:1;min-height:0}
.log-browser-wrap{overflow:auto;padding-bottom:12px;padding-right:2px}
.pm-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pm-tab{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.46);cursor:pointer;font-size:11px;color:var(--text3)}
.pm-tab.on{background:rgba(255,255,255,0.74);color:var(--text);border-color:rgba(155,125,195,.24)}
.tag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}
.tag-row-manage{display:grid;grid-template-columns:minmax(0,1fr) 70px auto;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--border2);border-radius:12px;background:rgba(255,255,255,0.46)}
.tag-name-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.72);font-size:11.5px}
.tag-count{font-size:10.5px;color:var(--text3);text-align:right}
.pm-inline-acts{display:flex;gap:6px;justify-content:flex-end}
.pm-mini{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--glass2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3)}
.pm-mini svg{width:11px;height:11px}
.pm-topfilters{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.pm-topfilters .ff{min-width:130px}
.log-groups{display:flex;flex-direction:column;gap:18px}
.log-day{border:1px solid rgba(165,155,145,.12);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.56),rgba(255,255,255,.40));overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.03)}
.log-day+.log-day{margin-top:0}
.log-day-head{padding:13px 16px;border-bottom:1px solid rgba(165,155,145,.10);font-size:12.5px;color:var(--text);background:rgba(255,255,255,0.46);font-weight:400;letter-spacing:.04em}
.log-cat-head{padding:10px 16px 8px;font-size:9.5px;letter-spacing:.18em;color:var(--text4);text-transform:uppercase;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.10));border-top:1px solid rgba(165,155,145,.10);margin-top:12px}
.log-cat-head:first-child{border-top:none;margin-top:0}
.log-scroll{overflow-x:auto;overflow-y:visible;scrollbar-width:thin;margin:0 0 10px;padding:0 10px 2px}
.log-table-inner{display:table;width:100%;border-collapse:separate;border-spacing:0;font-size:12px;table-layout:fixed}
.log-table-inner th,.log-table-inner td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(165,155,145,.10);white-space:normal;word-break:break-word;line-height:1.65;vertical-align:top}
.log-table-inner th{position:sticky;top:0;z-index:1;font-size:10px;color:var(--text4);letter-spacing:.08em;text-transform:uppercase;background:rgba(248,246,243,.96);font-weight:400}
.log-table-inner tr:last-child td{border-bottom:none}
.log-table-inner tfoot td{font-size:11px;color:var(--text2);background:rgba(255,255,255,0.28);border-top:1.5px solid rgba(165,155,145,.14);border-bottom:none;font-family:var(--font-en)}
.log-table-inner td{color:var(--text2)}
.log-table-inner td:first-child,.log-table-inner th:first-child{width:84px}
.log-table-inner .log-act-cell{white-space:nowrap;text-align:right;vertical-align:middle;width:94px}
.log-item-title{color:var(--text)}
.log-item-sub{font-size:10.5px;color:var(--text3);margin-top:2px}
.log-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:nowrap;align-items:center}
.pm-placeholder{padding:26px 18px;border:1px dashed var(--border);border-radius:18px;background:rgba(255,255,255,0.34);font-size:12px;color:var(--text3);line-height:1.8}
@media (max-width:760px){
  .log-table-inner th,.log-table-inner td{padding:6px 8px;font-size:11px}
  .fab-stack{right:10px;bottom:12px}
}

/* ═══ MODAL ═══ */
.mo{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.12);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.panel-mo{z-index:120}
.edit-mo{z-index:160}
.confirm-mo{z-index:1000!important}
.mo.hidden{display:none}
.mo-box{
  width:100%;max-width:400px;border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  box-shadow:0 16px 48px rgba(0,0,0,0.07);
}
.mo-box.pm-box{
  width:min(74vw,1040px);
  max-width:min(74vw,1040px);
  height:min(72vh,760px);
  max-height:min(72vh,760px);
  border-radius:24px;
}
.mo-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.mo-title{font-size:13px;font-weight:400;color:var(--text)}
.mo-body{padding:0 14px 14px}
.mo-body .ff{margin-bottom:7px}
.mo-acts{display:flex;justify-content:flex-end;gap:5px;margin-top:10px}
.mo-acts button{
  padding:5px 14px;border-radius:16px;font-size:11px;cursor:pointer;
  border:1px solid var(--border);transition:.2s;
}
.mo-acts .mc{background:transparent;color:var(--text3)}
.mo-acts .mk{background:var(--glass);color:var(--text)}
.mo-acts .mk:hover{background:rgba(255,255,255,0.68)}
/* edit modal */
.edit-box{width:min(72vw,760px);max-width:min(72vw,760px)}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.edit-help{font-size:10px;color:var(--text3);line-height:1.6;margin:-2px 0 10px}
@media (max-width:720px){.edit-grid{grid-template-columns:1fr}.edit-box{width:min(92vw,760px);max-width:min(92vw,760px)}.mo-box.pm-box.panel-logs,.mo-box.pm-box.panel-tags,.mo-box.pm-box.panel-trends,.mo-box.pm-box.panel-backup{width:min(94vw,1040px);max-width:min(94vw,1040px)}.mo-box.pm-box.panel-logs,.mo-box.pm-box.panel-tags{height:min(84vh,760px);max-height:min(84vh,760px)}.mo-box.pm-box.panel-trends,.mo-box.pm-box.panel-backup{height:auto;max-height:min(70vh,520px)}}

/* ═══ WORKSPACE (project & folder) ═══ */
.main-shell{max-width:1480px;margin:0 auto;padding:0 28px 36px}
.main-divider{display:flex;align-items:center;justify-content:center;gap:18px;margin:4px auto 18px;max-width:760px}
.main-divider::before,.main-divider::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(165,155,145,.22),transparent)}
.main-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;min-width:min(78vw,460px);max-width:520px;width:100%}
.main-tab{padding:9px 14px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.32);cursor:pointer;color:var(--text3);font-size:11px;letter-spacing:.08em;transition:.2s}
.main-tab.on{background:rgba(255,255,255,.76);color:var(--text);box-shadow:0 8px 22px rgba(0,0,0,.04)}
.workspace{border:1px solid var(--border2);background:rgba(255,255,255,.28);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:28px;box-shadow:0 18px 42px rgba(0,0,0,.04);overflow:clip}
.project-wrap,.folder-wrap{display:grid;min-height:640px;width:100%}.project-wrap{grid-template-columns:minmax(0,1fr) 320px}.folder-wrap{grid-template-columns:340px minmax(0,1fr)}
.project-main,.project-side,.folder-side,.folder-main{padding:22px}.project-main{border-right:1px solid var(--border2);min-width:0;overflow:hidden}.folder-main{border-left:1px solid var(--border2);min-width:0}
.section-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}.section-title{font-family:var(--font-en);font-size:18px;letter-spacing:.12em;color:var(--text2)}.soft-note{font-size:11px;color:var(--text3);line-height:1.8}
.chips,.timeline-range{display:flex;gap:8px;flex-wrap:wrap}.chip,.range-btn,.mini-btn,.ghost-btn,.solid-btn{border:1px solid var(--border);background:rgba(255,255,255,.42);color:var(--text2);border-radius:999px;padding:7px 12px;cursor:pointer;transition:.2s;font-size:11px}.chip.on,.range-btn.on{background:rgba(255,255,255,.76);color:var(--text)}
.mini-btn{padding:6px 11px}.solid-btn{background:rgba(255,255,255,.72)}.ghost-btn{background:transparent}
.timeline-today{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(204,126,78,.5);z-index:2;pointer-events:none}
.timeline-grid{position:relative;border:1px solid var(--border2);border-radius:22px;background:rgba(255,255,255,.36);padding:14px;overflow:hidden}.timeline-grid-shell{display:grid;grid-template-columns:110px minmax(0,1fr);gap:10px;align-items:start}.timeline-label-col{display:flex;flex-direction:column}.timeline-label-spacer{height:42px}.timeline-label-list{display:flex;flex-direction:column;gap:2px}.timeline-scroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:rgba(125,116,108,.22) transparent}.timeline-scroll:not(:hover){scrollbar-color:transparent transparent}.timeline-scroll::-webkit-scrollbar{height:3px}.timeline-scroll::-webkit-scrollbar-thumb{background:rgba(125,116,108,.18);border-radius:999px}.timeline-scroll:not(:hover)::-webkit-scrollbar-thumb{background:transparent}.timeline-inner{position:relative;padding-bottom:4px}.timeline-head{display:grid;gap:8px;margin-bottom:14px}.timeline-axis{display:grid;gap:8px}.axis-cell{font-size:10px;color:var(--text4);text-align:center;padding-bottom:6px;border-bottom:1px solid rgba(165,155,145,.12)}
.timeline-row{position:relative;height:32px;margin-bottom:2px}.timeline-label{height:32px;display:flex;align-items:center;font-size:11px;color:var(--text2);padding-right:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}.timeline-label.on{color:var(--lav-s);font-weight:400}.timeline-track{position:relative;height:32px;border-radius:10px;background:transparent;border:none}

function exS(it,now){const exp=new Date(it.expiryDate),w=new Date(it.warningDate);return{left:dayD(exp,now),st:now>exp?'red':now>=w?'orange':'green'}}
function cyS(it,now){const l=new Date(it.lastDoneAt);const d=it.periodUnit==='hours'?hourD(now,l):dayD(now,l);return{d,num:d<it.cycleX?it.cycleX-d:d,st:d>=it.warnZ?'red':d>=it.cycleX?'orange':d>=it.remindY?'yellow':'green'}}
function garbageS(it,now){
  const last=new Date(it.lastDoneAt);
  const elapsed=dayD(now,last);
  const T=Math.max(1,Number(it.cycleDays||0)||1);
  const count=Number(it.count||0);
  const X=Number(it.limitX||0),Y=Number(it.remindY||0),Z=Number(it.warnZ||0);
  const onCycle = elapsed % T === 0;
  const faded = !onCycle;
  let st='green';
  if(count>=Z) st='red';
  else if(count>=Y) st='orange';
  else if(count>=X) st='yellow';
  const daysLeft = elapsed % T === 0 ? 0 : T - (elapsed % T);
  const nextNum = daysLeft;
  const ringProgress = Math.min(1, elapsed / T);
  const ringMarker = X > 0 ? Math.min(1, count / Math.max(1, Z || Y || X)) : null;
  return {st, faded, nextNum, ringProgress, ringMarker};
}

// Logical day: the calendar day of the most recent wake event at or before `at`.
// Wake events come from sleep logs (kind sleep/stayed_up, endAt) and from
// S.workspace.lastWakeAt (scratch marker set on transition to sleep_summary).
// Used for action attribution (logs, records, work sessions). Plans/countdowns
// continue to use natural calendar time.
function computeLogicalDay(at){
  const atDate=at instanceof Date?at:new Date(at||Date.now());
  if(isNaN(atDate))return calendarDayKey(new Date());
  let latest=null;
  const logs=(typeof S!=='undefined'&&S&&S.logs)?S.logs:[];
  logs.forEach(l=>{
    if(l&&l.panelId==='sleep'&&(l.kind==='sleep'||l.kind==='stayed_up')&&l.endAt){
      const w=new Date(l.endAt);
      if(!isNaN(w)&&w<=atDate&&(!latest||w>latest))latest=w;
    }
  });
  if(typeof S!=='undefined'&&S&&S.workspace&&S.workspace.lastWakeAt){
    const lw=new Date(S.workspace.lastWakeAt);
    if(!isNaN(lw)&&lw<=atDate&&(!latest||lw>latest))latest=lw;

  return calendarDayKey(latest||atDate);
}

function previousCalendarDayKey(day){const d=new Date(day+'T00:00:00');d.setDate(d.getDate()-1);return localDayKeyFromDate(d)}

function h(tag,at,...ch){
  const e=document.createElement(tag);
  if(at)for(const[k,v]of Object.entries(at)){
    if(k==='cn')e.className=v;
    else if(k==='st'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='id')e.id=v;
    else if(typeof v==='boolean'){
      if(v)e.setAttribute(k,'');
      else if(k in e)e[k]=false;
    }
    else e.setAttribute(k,v);

  for(const c of ch.flat(Infinity)){

let tlDBPromise=null;
let persistTimer=null;
let tlHydrated=false;
const __dirty={items:false,tags:false,workspace:false,records:false,rtags:false,sleepFlow:false};
function openTLDB(){
  if(tlDBPromise) return tlDBPromise;
  tlDBPromise=new Promise((resolve,reject)=>{
    const req=indexedDB.open(TL_DB_NAME,TL_DB_VERSION);
    req.onupgradeneeded=()=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(TL_STORE)) db.createObjectStore(TL_STORE);
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return tlDBPromise;
}
async function idbGet(key){
  try{
    const db=await openTLDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(TL_STORE,'readonly');
      const rq=tx.objectStore(TL_STORE).get(key);
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error);
    });
  }catch{return null}
}

async function idbDel(key){
  const db=await openTLDB();
  const tx=db.transaction(TL_STORE,'readwrite');
  tx.objectStore(TL_STORE).delete(key);
  return new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=j});
}
async function idbSet(key,val){
  const db=await openTLDB();
  return await new Promise((resolve,reject)=>{
    const tx=db.transaction(TL_STORE,'readwrite');
    tx.objectStore(TL_STORE).put(val,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  });
}

async function hydrateFromDB(){
  try{
    // Try split keys first
    let [items, tags, ws] = await Promise.all([
      idbGet(SK_ITEMS), idbGet(SK_TAGS), idbGet(SK_WS)
    ]);
    // Load records zones (now flat S.logs array)
    const [recs, rtags] = await Promise.all([
      idbGet(SK_RECORDS), idbGet(SK_RTAGS)
    ]);
    if(Array.isArray(recs)) S.logs=recs;
    else if(recs && typeof recs==='object' && !Array.isArray(recs)){
      // Migrate old keyed format {food:[...], drink:[...]} → flat array
      const flat=[];
      Object.keys(recs).forEach(pid=>{
        if(Array.isArray(recs[pid])) recs[pid].forEach(r=>flat.push({...r,panelId:pid}));
      });
      S.logs=flat;
    }
    if(rtags && typeof rtags==='object') S.rtags=rtags;
    try{const sf=await idbGet('tl_sleepflow');if(sf&&sf.phase)S.sleepFlow=sf}catch(e){console.warn('hydrate sleepFlow failed',e)}

    const hasSplit = !!(items || tags || ws);

    // Legacy fallback: monolithic SK key in IDB (no localStorage)
    if(!hasSplit){
      const sv=await idbGet(SK);
      if(sv){
        items = sv.items || null;
        tags = sv.tags || null;
        ws = sv.workspace || null;
        // Write split keys for future loads
        const mig=[];
        if(items) mig.push(idbSet(SK_ITEMS,items).catch(()=>{}));
        if(tags) mig.push(idbSet(SK_TAGS,tags).catch(()=>{}));
        if(ws) mig.push(idbSet(SK_WS,ws).catch(()=>{}));
        if(mig.length) await Promise.all(mig);
      }
    }

    if(items&&typeof items==='object') S.items=items;
    if(tags&&typeof tags==='object') S.tags={...S.tags,...tags};
    if(ws&&typeof ws==='object'){
      const restoredWorkspace={...ws};
      delete restoredWorkspace.workMode;
      delete restoredWorkspace._workModeResume;
      S.workspace={...S.workspace,...restoredWorkspace};
      if(!S.workspace.files) S.workspace.files={};
      if(!Array.isArray(S.workspace.plans)) S.workspace.plans=[];
      if(!Array.isArray(S.workspace.quickFileIds)) S.workspace.quickFileIds=[];
      if(!Array.isArray(S.workspace.workSessions)) S.workspace.workSessions=[];
      if(!S.workspace.planNotebook||typeof S.workspace.planNotebook!=='object') S.workspace.planNotebook={};
    }
    ensureDefaultMoodPalette();

    const stars=await idbGet('tl_sleep_stars');
    const pageState=await idbGet('tl_page_state');
    if(pageState){
      window.__TL_PAGE_STATE__=pageState;
      if(pageState.mainView) S.mainView=pageState.mainView;
      if(pageState.workMode){
        S.mainView='home';
        S.workspace.workMode={fileId:pageState.workMode.fileId,_sessionStartedAt:pageState.workMode._sessionStartedAt||null,minimalState:pageState.workMode.minimalState||{}};
        S.workspace._workModeResume=true;
      }
    }
    // ── Seed protected system cards ──
    // The self-cook card ('洗碗-灶台清潔') is a permanent system reminder tied
    // to the food-log '自炊' mode. It lives in kitchen, archived by default,
    // and auto-unarchives with a fresh 2-day countdown whenever the user logs
    // a 自炊 meal. This seed ensures it always exists — on first run, after
    // delete-all, or after any state wipe. Matching uses id + protected marker
    // + name fallback so it won't duplicate across reinstalls/migrations.
    try{
      if(!Array.isArray(S.items.kitchen)) S.items.kitchen=[];
      const isSelfCook=it=>it&&(
        it.id==='l-default-selfcook'||
        (it.protected===true&&it.defaultRestore==='selfCookMeal')||
        (typeof it.name==='string'&&it.name.indexOf('洗碗-灶台')>=0)
      );
      const existing=S.items.kitchen.find(isSelfCook);
      let needsSave=false;
      if(!existing){
        S.items.kitchen.unshift({
          id:'l-default-selfcook',
          type:'expiry',
          name:'洗碗-灶台清潔',
          image:DEMO,
          protected:true,
          defaultRestore:'selfCookMeal',
          unit:'次',
          expiryType:'days',
          expiryDays:2,
          archived:true,
          purchasedAt:null,
          expiryDate:null,
          warningDate:null
        });
        needsSave=true;
      }else{
        // Migrate legacy card: strip totalQty/usedQty so it uses the
        // complete-button branch instead of the +1 quantity branch,
        // and ensure protected/defaultRestore markers are set.
        if('totalQty' in existing||'usedQty' in existing||!existing.protected||existing.defaultRestore!=='selfCookMeal'){
          delete existing.totalQty;
          delete existing.usedQty;
          existing.protected=true;
          existing.defaultRestore='selfCookMeal';
          needsSave=true;
        }
      }
      if(needsSave){
        try{ await idbSet(SK_ITEMS,S.items); }catch{}
      }
    }catch(err){ console.warn('seed protected cards failed',err); }
  }catch(err){ console.warn('hydrateFromDB failed:',err); }
  tlHydrated=true;
}

  if(__dirty.workspace){
    __dirty.workspace=false;
    const workspaceForPersist={...S.workspace};
    delete workspaceForPersist.workMode;
    delete workspaceForPersist._workModeResume;
    promises.push(idbSet(SK_WS,workspaceForPersist).catch(e=>console.warn('persist workspace failed',e)));
  }
  if(__dirty.records){
    __dirty.records=false;
    promises.push(idbSet(SK_RECORDS,S.logs).catch(e=>console.warn('persist records failed',e)));
  }
  if(__dirty.rtags){
    __dirty.rtags=false;
    promises.push(idbSet(SK_RTAGS,S.rtags).catch(e=>console.warn('persist rtags failed',e)));
  }
  if(__dirty.sleepFlow){
    __dirty.sleepFlow=false;
    promises.push(idbSet('tl_sleepflow',S.sleepFlow).catch(e=>console.warn('persist sleepFlow failed',e)));
  }
  if(promises.length) await Promise.all(promises);
  try{
    const pageState={};
    if(S.workspace.workMode){
      const wm=S.workspace.workMode;
      const ms=Object.assign({}, wm.minimalState || {});
      pageState.mainView='home';
      pageState.workMode={
        fileId:wm.fileId,
        _sessionStartedAt:wm._sessionStartedAt||null,
        minimalState:Object.assign({}, ms, {
          accumulatedMs:Number(ms.accumulatedMs||0),
          interruptCount:Number(ms.interruptCount||0),
          isPaused:!!ms.isPaused,
          resumeSession:true
        })
      };
    }
    await idbSet('tl_page_state',pageState);
  }catch(err){ console.warn('persist page state failed',err); }
}

// RENDER — zone-based partial updates
//
// The app div has 4 stable child containers created on first R().
// Each targeted render function (RS/RM/RO) only rebuilds its own
// container. R() rebuilds all zones — still available as a fallback
// but most call sites should use the targeted versions.

let __zones = null;
function ensureZones(){
  if(__zones) return __zones;
  const app=document.getElementById('app');
  app.innerHTML='';
  const sidebar = document.createElement('div'); sidebar.id='tl-z-sidebar';
  const main    = document.createElement('div'); main.id='tl-z-main';
  const launcher= document.createElement('div'); launcher.id='tl-z-launcher';
  const overlays= document.createElement('div'); overlays.id='tl-z-overlays';
  app.appendChild(sidebar);
  app.appendChild(main);
  app.appendChild(launcher);
  app.appendChild(overlays);
  __zones={sidebar,main,launcher,overlays,app};
  return __zones;
}

// Render sidebar zone + launcher (launcher visibility depends on S.leftOpen)

function mkRing(p,st,opts={}){
  const r=13,c=2*Math.PI*r,d=c*Math.max(0,Math.min(1,p));
  const faded=opts.faded?0.32:0.88;
  const marker=typeof opts.marker==='number'?Math.max(0,Math.min(1,opts.marker)):null;
  const cl={green:`rgba(104,168,120,${faded})`,yellow:`rgba(194,162,74,${faded})`,orange:`rgba(204,126,78,${faded})`,red:`rgba(192,88,88,${faded})`};
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 32 32');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)';
  let markerMarkup='';
  if(marker!==null){
    const a=(-90 + marker*360) * Math.PI / 180;
    const cx=16 + r*Math.cos(a), cy=16 + r*Math.sin(a);
    markerMarkup=`<circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="1.6" fill="rgba(120,110,104,.58)"/>`;
  }
  svg.innerHTML=`<circle cx="16" cy="16" r="${r}" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1.8"/><circle cx="16" cy="16" r="${r}" fill="none" stroke="${cl[st]||cl.green}" stroke-width="2" stroke-linecap="round" stroke-dasharray="${d} ${c-d}"/>${markerMarkup}`;
  return svg;
}

     const data=JSON.stringify({items:S.items,tags:S.tags,workspace:S.workspace,logs:S.logs,rtags:S.rtags},null,2);

  inp.addEventListener('change',e=>{
    const file=e.target.files&&e.target.files[0]; if(!file) return; const fr=new FileReader(); fr.onload=()=>{ try{ const d=JSON.parse(fr.result); if(d.items) S.items=d.items;  if(d.tags) S.tags=d.tags; if(d.workspace) S.workspace=d.workspace; if(d.logs) S.logs=d.logs; else if(d.records){const flat=[];Object.keys(d.records).forEach(k=>{if(Array.isArray(d.records[k]))d.records[k].forEach(r=>flat.push({...r,panelId:k}))});S.logs=flat} if(d.rtags) S.rtags=d.rtags;   __dirty.items=__dirty.tags=__dirty.workspace=__dirty.records=__dirty.rtags=true; saveAll().then(()=>{alert('導入完成');R();}); }catch(err){ alert('JSON 內容有誤'); } }; fr.readAsText(file);
  });
  impWrap.appendChild(inp); acts.appendChild(impWrap);
  acts.appendChild(h('button',{cn:'btn-s',onClick:()=>openConfirmDialog({title:'刪除所有數據',text:'這會清空目前的所有紀錄、tag、快捷文件、計畫、工作資料、翻翻樂卡片、星星memo。這個動作不能復原。系統特殊卡片會被保留。',confirmLabel:'全部刪除',onConfirm:async()=>{
    // ── Step 0: snapshot protected cards BEFORE anything else ──
    // Protected cards (protected:true) are system cards — e.g. the self-cook
    // 洗碗-灶台清潔 reminder — and must survive the wipe. We preserve their
    // identity/metadata but reset their runtime state (archived + fresh counts)
    // so they come back to a clean resting position rather than carrying
    // stale timers tied to now-deleted log entries.
    const protectedItems={};
    try{
      ['fresh','pantry','kitchen','living','garbage'].forEach(cat=>{
        const list=((S&&S.items&&S.items[cat])||[]).filter(it=>it&&it.protected===true);
        if(list.length){
          protectedItems[cat]=list.map(it=>({
            // Preserve identity
            id:it.id,
            type:it.type,
            name:it.name,
            image:it.image,
            protected:true,
            defaultRestore:it.defaultRestore,
            // Preserve static config
            unit:it.unit,
            expiryType:it.expiryType,
            expiryDays:it.expiryDays,
            cycleX:it.cycleX,
            cycleDays:it.cycleDays,
            remindY:it.remindY,
            warnZ:it.warnZ,
            limitX:it.limitX,
            periodUnit:it.periodUnit,
            totalQty:it.totalQty,
            // Reset runtime state
            archived:true,
            usedQty:0,
            count:0,
            xReachedAt:null,
            lastDoneAt:null,
            purchasedAt:null,
            expiryDate:null,
            warningDate:null
          }));
        }
      });
    }catch{}
    // ── Step 1: disable ALL save paths so nothing can write to IDB after this point ──
    // queuePersist() and flushSaveNow() both short-circuit when !tlHydrated.
    try{tlHydrated=false;}catch{}
    try{clearTimeout(persistTimer);__savePending=false;}catch{}
    // Remove unload handlers so beforeunload on reload can't fire flushSaveNow
    try{
      if(window.__tlSavePageStateHandler){
        window.removeEventListener('beforeunload',window.__tlSavePageStateHandler);
        window.removeEventListener('pagehide',window.__tlSavePageStateHandler);
      }
    }catch{}
    // ── Step 2: wait for any in-flight saveAll in the chain to settle ──
    // This is the critical race fix: an saveAll() that started BEFORE the click
    // captured the old S by reference in the idbSet(val=...) call, so it will
    // write stale data even if we reset S afterwards. Awaiting the chain makes
    // those writes land FIRST, then our IDB wipe below overwrites them.
    try{await __saveChain;}catch{}
    // ── Step 3: neutralize dirty flags + blank in-memory state as belt-and-braces ──
    try{__dirty.items=false;__dirty.tags=false;__dirty.workspace=false;__dirty.records=false;__dirty.rtags=false;__dirty.sleepFlow=false;}catch{}
    try{
      S.items={fresh:[],pantry:[],kitchen:[],living:[],garbage:[]};
      S.tags={};
      S.logs=[];
      S.rtags={};
      S.workspace={projects:[],folders:[],files:{},plans:[],workSessions:[],planNotebook:{}};
      S.sleepFlow={phase:null,sleepStartAt:null,napStartAt:null,morningExpanded:null,morningCompleted:{}};
    }catch{}
    // ── Step 4: delete the entire IndexedDB database (nuclear option) ──
    // Critical: must reset tlDBPromise cache so subsequent openTLDB() calls
    // create a FRESH connection. Otherwise deleteDatabase blocks (cached
    // promise still counts as an open handle) and all post-delete writes
    // hit a closed db instance and silently throw InvalidStateError.
    try{
      // 1. Close the cached connection if any
      try{
        if(tlDBPromise){
          const db=await tlDBPromise;
          try{db.close();}catch{}
        }
      }catch{}
      // 2. Clear the cache — this is the fix
      tlDBPromise=null;
      // 3. Delete the database by name
      await new Promise((resolve)=>{
        const req=indexedDB.deleteDatabase(TL_DB_NAME);
        let done=false;
        const finish=()=>{if(!done){done=true;resolve();}};
        req.onsuccess=finish;
        req.onerror=finish;
        req.onblocked=finish;
        setTimeout(finish,3000);
      });
      // 4. Ensure cache is still null after the delete promise resolves
      tlDBPromise=null;
    }catch{}
    // Fallback: if deleteDatabase didn't work, at least clear the store on
    // a freshly-opened connection
    try{
      tlDBPromise=null;
      const db=await openTLDB();
      const tx=db.transaction(TL_STORE,'readwrite');
      tx.objectStore(TL_STORE).clear();
      await new Promise(r=>{tx.oncomplete=r;tx.onerror=r;tx.onabort=r});
    }catch{}
    // ── Step 5: re-inject protected cards into fresh DB ──
    // Write directly to IDB (not via saveAll, which is disabled).
    if(Object.keys(protectedItems).length){
      try{
        const freshItems={fresh:[],pantry:[],kitchen:[],living:[],garbage:[]};
        Object.keys(protectedItems).forEach(cat=>{freshItems[cat]=protectedItems[cat]});
        const db=await openTLDB();
        await new Promise(r=>{
          const tx=db.transaction(TL_STORE,'readwrite');
          tx.objectStore(TL_STORE).put(freshItems,SK_ITEMS);
          tx.oncomplete=r;
          tx.onerror=r;
          tx.onabort=r;
        });
      }catch{}
    }
    // ── Step 6: hard reload ──
    location.reload();
  }})},'刪除所有數據'));
  wrap.appendChild(acts); return wrap;
}

function rPlannerWorkspace(){
  const day=S.workspace.planDay || currentActiveLogicalDayKey();
  const metrics=buildHomeMetrics();
  const wrap=h('div',{cn:'planner-wrap rebuild-home'});
  const grid=h('div',{cn:'planner-grid three-col-equal'});

  // ══ Col 1 (left): Timeline ══
  const col1=h('div',{cn:'planner-card timeline-home home-col'});

  top.appendChild(h('div',null,h('div',{cn:'plan-board-title'},'今日時間軸')));
  const controls=h('div',{cn:'plan-board-filter'});
  controls.appendChild(h('div',{cn:'ff narrow',st:{minWidth:'174px'}},h('div',{cn:'fl'},'日期'),h('input',{cn:'fi',type:'date',value:day,onChange:e=>{S.workspace.planDay=e.target.value;wsSave();RM();}})));
  top.appendChild(controls);
  col1.appendChild(top);
  const board=h('div',{cn:'plan-board-shell'});
  const timelinePane=h('div',{cn:'plan-pane'});
  timelinePane.appendChild(h('div',{cn:'plan-pane-head'},h('div',{cn:'left'},h('div',{cn:'plan-pane-title'},'Timeline')),h('div',{st:{display:'flex',gap:'6px',alignItems:'center'}},h('button',{title:'導出圖片',st:{border:'none',background:'transparent',cursor:'pointer',fontSize:'16px',padding:'2px 6px',opacity:'0.7'},onClick:e=>{e.stopPropagation();window.recExportPlanTimelineImage()}},'📷'),h('button',{cn:'plan-head-plus',title:'新增計畫',onClick:e=>{e.stopPropagation();openPlanModal();}},'+'))));
  const timeline=h('div',{cn:'plan-timeline'});
  const dayStart=logicalDayStart(day); const dayEnd=logicalDayEnd(day);
  const plans=plansForDay(day).map(p=>({kind:'plan',id:p.id,at:p.at,title:p.title,sub:p.note||'',raw:p,completed:!!p.completed}));

  // ── Build record entries (standardized per-panel format) ──
  const records=[];
  const fmtDur=(ms)=>{
    if(!ms||ms<1000)return '';
    const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);
    if(h>0)return `${h}小時${m}分鐘`;
    if(m>0)return `${m}分鐘`;
    return Math.round(ms/1000)+'秒';
  };
  // Duration field value can be a {hours,minutes} object, a string, or empty
  const fmtDurField=(v)=>{
    if(v==null)return'';
    if(typeof v==='string')return v.trim();
    if(typeof v==='object'){
      const hh=Number(v.hours||0),mm=Number(v.minutes||0);
      if(hh===0&&mm===0)return'';
      if(hh>0&&mm>0)return `${hh}小時${mm}分鐘`;
      if(hh>0)return `${hh}小時`;
      return `${mm}分鐘`;
    }
    return String(v);
  };
  // Join an array field (multicheck/tag2multi) with delimiter, returning '' for empty
  const joinArr=(v,sep)=>{
    if(!Array.isArray(v))return (typeof v==='string'?v:'');
    return v.filter(x=>x&&String(x).trim()).join(sep||'、');
  };
  // Trim empty string
  const trim=(v)=>typeof v==='string'?v.trim():(v==null?'':String(v));
  const pushRec=(id,at,title,sub)=>records.push({kind:'record',id,at,title,sub:sub||''});
  // Calendar-day-minus-one helper for sleep-start attribution
  const prevCalendarDay=(iso)=>{const d=new Date(iso);d.setDate(d.getDate()-1);return calendarDayKey(d)};

  (S.logs||[]).forEach(e=>{
    if(!e||!e.panelId)return;
    // ── Sleep panel: split entries ──
    if(e.panelId==='sleep'){
      if(e.kind==='sleep'||e.kind==='stayed_up'){
        // 入睡 / 嘗試入睡: always attributed to the calendar day BEFORE wake
        // (matches the "wake starts new logical day" model — sleep always
        // belongs to the previous logical day, and since we don't know the
        // exact previous wake for every historical sleep, we use wakeDay-1)
        if(e.startAt&&e.endAt){
          const startLD=prevCalendarDay(e.endAt);
          if(startLD===day){
            const label=e.kind==='sleep'?'入睡':'嘗試入睡';
            pushRec('slp-s-'+e.id,e.startAt,label,'');
          }
        }else if(e.startAt){
          // No endAt (incomplete log): fall back to startAt's logical day
          if(computeLogicalDay(e.startAt)===day){
            const label=e.kind==='sleep'?'入睡':'嘗試入睡';
            pushRec('slp-s-'+e.id,e.startAt,label,'');
          }
        }
        // 醒來 / 熬穿了: on the logical day of endAt (the new day)
        if(e.endAt){
          const endLD=computeLogicalDay(e.endAt);
          if(endLD===day){
            if(e.kind==='sleep'){
              const ms=e.startAt?(new Date(e.endAt)-new Date(e.startAt)):0;
              const bits=[];
              if(ms>0)bits.push('睡眠時間 '+fmtDur(ms));
              if(e.quality)bits.push(trim(e.quality));
              pushRec('slp-e-'+e.id,e.endAt,'醒來',bits.filter(Boolean).join(' ｜ '));
            }else{
              const notes=trim(e.notes);
              pushRec('slp-e-'+e.id,e.endAt,'熬穿了',notes);
            }
          }
        }
      }else if(e.kind==='nap'){
        if(e.endAt&&computeLogicalDay(e.endAt)===day){
          const ms=e.startAt?(new Date(e.endAt)-new Date(e.startAt)):0;
          pushRec('slp-n-'+e.id,e.endAt,'小睡',ms>0?fmtDur(ms):'');
        }
      }else if(e.kind==='lazy'){
        const ref=e.endAt||e.executiveTime;
        if(ref&&computeLogicalDay(ref)===day){
          const ms=e.startAt&&e.endAt?(new Date(e.endAt)-new Date(e.startAt)):0;
          pushRec('slp-l-'+e.id,ref,'起床',ms>0?('賴床時間 '+fmtDur(ms)):'');
        }
      }
      return;
    }
    // ── Skip day-marker panels ──
    if(e.panelId==='weather')return;
    // ── Logical day check for all other panels ──
    const naturalAt=e.executiveTime||e.createdAt;
    if(!naturalAt)return;
    const belongs=(e.executiveDate===day)||(e.logicalDay===day)||(computeLogicalDay(naturalAt)===day);
    if(!belongs)return;

    // ── Panel-specific formatters. Each one SKIPS (returns) if the
    //    entry has no meaningful content, so empty logs don't pollute
    //    the timeline. ──
    let title='',sub='';
    const pipe=' ｜ ';
    switch(e.panelId){
      case 'food':{
        const name=trim(e.name);
        if(!name)return;
        const metaBits=[];
        const src=trim(e.way);
        const store=trim(e.store);
        const type=trim(e.type);
        let srcPart=src;
        if(store)srcPart=srcPart?srcPart+'（'+store+'）':store;
        if(type)srcPart=srcPart?srcPart+' · '+type:type;
        if(srcPart)metaBits.push(srcPart);
        const notes=trim(e.notes);if(notes)metaBits.push(notes);
        title='吃了 '+name;
        if(metaBits.length)sub='（'+metaBits.join(pipe)+'）';
        break;
      }
      case 'drink':{
        const name=trim(e.name);
        const amount=trim(e.amount);
        if(!name&&!amount)return;
        title='喝了 '+(name||'飲品');
        if(amount)sub=amount+' ml';
        break;
      }
      case 'nutrients':{
        const names=joinArr(e.name);
        if(!names)return;
        title='服用 '+names;
        const amt=trim(e.amount);
        if(amt)sub=amt+trim(e.unit);
        break;
      }
      case 'selfcleaning':{
        const items=joinArr(e.items,' + ');
        if(!items)return;
        title='完成了 '+items;
        const notes=trim(e.notes);if(notes)sub='（'+notes+'）';
        break;
      }
      case 'skincare':{
        const type=trim(e.type);
        const prods=joinArr(e.products,' + ');
        if(!type&&!prods)return;
        title='完成了 '+(type||'容貌管理');
        if(prods)sub='（'+prods+'）';
        break;
      }
      case 'bowels':{
        const bits=[trim(e.amount),trim(e.condition),joinArr(e.feelings)].filter(Boolean);
        if(!bits.length)return;
        title='完成了排便';
        sub='（'+bits.join(pipe)+'）';
        break;
      }
      case 'exercise':{
        const name=trim(e.name);
        if(!name)return;
        const dur=fmtDurField(e.duration);
        title=name+(dur?' '+dur:'');
        const feel=trim(e.feeling);
        if(feel)sub='（'+feel+'）';
        break;
      }
      case 'masturbation':{

        const notes=trim(e.notes);
        const feel=trim(e.feeling);
        if(!dur&&!notes&&!feel)return;
        title='自慰'+(dur?' '+dur:'');
        const bits=[notes,feel].filter(Boolean);
        if(bits.length)sub='（'+bits.join(pipe)+'）';
        break;
      }
      case 'stomach':{
        const syms=joinArr(e.symptoms);
        if(!syms)return;
        title='感到 '+syms+' 的腸胃不適';
        const notes=trim(e.notes);if(notes)sub='（'+notes+'）';
        break;
      }
      case 'othersymptoms':{

        if(!syms)return;
        title='出現 '+syms;
        const notes=trim(e.notes);if(notes)sub='（'+notes+'）';

      }
      case 'expense':{

        const metaBits=[trim(e.type),trim(e.notes)].filter(Boolean);
        if(metaBits.length)sub='（'+metaBits.join(' · ')+'）';
        break;
      }
      case 'income':{
        const amount=trim(e.amount);
        if(!amount)return;
        const reason=trim(e.notes)||trim(e.type);
        title=(reason?'因為 '+reason+' ':'')+'收到 '+amount+' 日圓';
        break;

      case 'weight':{return} // state marker, not an action
      case 'period':{return} // state marker, not an action

        title='開窗通風';
        break;
      }

        return;

  const col2=h('div',{cn:'home-col'});

function getTimelineRange(){
  const scale=S.workspace.timelineScale;const now=new Date();const off=S.workspace.timelineOffset||0;
  let start,end;
  if(scale==='week'){start=weekS(now);start.setDate(start.getDate()+off*7);start.setHours(0,0,0,0);end=new Date(start);end.setDate(end.getDate()+7);end.setMilliseconds(-1);}
  else if(scale==='month'){start=new Date(now.getFullYear(),now.getMonth()+off,1,0,0,0,0);end=new Date(now.getFullYear(),now.getMonth()+off+1,1,0,0,0,0);end.setMilliseconds(-1);}
  else if(scale==='season'){const q=Math.floor(now.getMonth()/3)+off;const y=now.getFullYear()+Math.floor(q/4);const qm=(((q%4)+4)%4)*3;start=new Date(y,qm,1,0,0,0,0);end=new Date(y,qm+3,1,0,0,0,0);end.setMilliseconds(-1);}

  return{start,end,totalDays:Math.max(1,Math.ceil((end-start+1)/864e5))};

function rStepPanel(){
  const box=h('div',{cn:'step-panel'});const ch=getSelectedChild();
  box.appendChild(h('div',{cn:'section-top',st:{marginBottom:'10px'}},h('div',null,h('div',{cn:'section-title',st:{fontSize:'14px'}},ch?.name||'步驟'),h('div',{cn:'soft-note'},ch?.desc||'點擊時間軸上的子項目查看對應步驟。')),h('button',{cn:'mini-btn',onClick:()=>openStepModal()},'+ 步驟')));
  const allSteps=(ch?.steps||[]).slice();
  // Separate done / undone
  const undone=allSteps.filter(s=>!s.done && !(s.fileId && fileProgress(getFile(s.fileId))>=100));
  const done=allSteps.filter(s=>s.done || (s.fileId && fileProgress(getFile(s.fileId))>=100));
  // Sort undone by time ascending (nearest first), no-time at bottom
  undone.sort((a,b)=>{if(!a.time&&!b.time)return 0;if(!a.time)return 1;if(!b.time)return -1;return new Date(a.time)-new Date(b.time)});
  // Sort done by completion time (doneAt) ascending
  done.sort((a,b)=>new Date(a.doneAt||0)-new Date(b.doneAt||0));
  const sorted=[...undone,...done];
  sorted.forEach((stp)=>{
    const isDone=stp.done||(stp.fileId&&fileProgress(getFile(stp.fileId))>=100);
    const overdue=!isDone && stp.time && new Date(stp.time)<new Date();
    const row=h('div',{cn:'step-card'+(overdue?' overdue':'')+(isDone?' done':''),onClick:()=>openStepInfo(stp)});
    row.appendChild(h('div',{cn:'step-handle',title:'拖動調整',draggable:true,onDragstart:e=>{e.dataTransfer.setData('text/plain',stp.id)},onDragover:e=>e.preventDefault(),onDrop:e=>{e.preventDefault();editStep(stp.id);}},'⋮⋮'));

function editFolder(id){

function deleteFolder(id){
  const fd=folderList().find(f=>f.id===id);if(!fd)return;
  const fileCount=(fd.fileIds||[]).length;
  const boardCount=(fd.boards||[]).length;
  const parts=[];
  if(boardCount)parts.push(boardCount+' 個 board');
  if(fileCount)parts.push(fileCount+' 個文件');
  const detail=parts.length?`（其中的 ${parts.join('、')} 會一併刪除）`:'';
  if(!confirm(`刪除文件夾「${fd.name}」？${detail}`))return;
  (fd.fileIds||[]).forEach(fid=>{delete S.workspace.files[fid]});
  (fd.boards||[]).forEach(b=>(b.fileIds||[]).forEach(fid=>{delete S.workspace.files[fid]}));
  S.workspace.folders=folderList().filter(f=>f.id!==id);
  if(S.workspace.selectedFolderId===id)S.workspace.selectedFolderId=folderList()[0]?.id||null;
  wsSave();R();
}
function editBoard(folderId,boardId){
  const fd=folderList().find(f=>f.id===folderId);if(!fd)return;
  const b=(fd.boards||[]).find(x=>x.id===boardId);if(!b)return;
  const name=prompt('修改 Board 名稱',b.name);
  if(name===null||!name.trim())return;
  b.name=name.trim();wsSave();R();
}
function deleteBoard(folderId,boardId){
  const fd=folderList().find(f=>f.id===folderId);if(!fd)return;
  const b=(fd.boards||[]).find(x=>x.id===boardId);if(!b)return;
  const fileCount=(b.fileIds||[]).length;
  const msg=fileCount>0?`刪除 Board「${b.name}」？（其中的 ${fileCount} 個文件會回到文件夾根目錄）`:`刪除 Board「${b.name}」？`;
  if(!confirm(msg))return;
  (b.fileIds||[]).forEach(fid=>{if(!fd.fileIds.includes(fid))fd.fileIds.push(fid)});
  fd.boards=(fd.boards||[]).filter(x=>x.id!==boardId);
  if(S.workspace.boardModal?.boardId===boardId)S.workspace.boardModal=null;
  wsSave();R();
}

function compExp(pa,ty,val){
  if(ty==='date')return new Date(val).toISOString();
  const d=new Date(pa);d.setDate(d.getDate()+Number(val||0));return d.toISOString();
}

function savePageState(){
  const ps={mainView:S.mainView};
  if(S.workspace.workMode && S.workspace.workMode.minimalState){
    const wm=S.workspace.workMode;
    const ms=Object.assign({}, wm.minimalState||{});
    ps.workMode={fileId:wm.fileId,_sessionStartedAt:wm._sessionStartedAt||null,minimalState:ms};
  }
  try{idbSet('tl_page_state',ps)}catch{}
}
function restorePageState(){
  try{
    const ps=window.__TL_PAGE_STATE__||null;
    if(!ps) return;
    if(ps.mainView && !ps.workMode) S.mainView=ps.mainView;
    if(ps.workMode){
      S.mainView='home';
      S.workspace.workMode={fileId:ps.workMode.fileId,_sessionStartedAt:ps.workMode._sessionStartedAt||null,minimalState:ps.workMode.minimalState||{}};
      S.workspace._workModeResume=true;
    }
  }catch{}
}

function rSmallMonthCalendar(day){
  const base=safeDate(day+'T12:00:00')||new Date();
  const y=base.getFullYear(), m=base.getMonth();
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const grid=h('div',{cn:'mini-cal'});
  ['M','T','W','T','F','S','S'].forEach(x=>grid.appendChild(h('div',{cn:'mini-cal-head'},x)));
  const offset=(first.getDay()+6)%7;
  for(let i=0;i<offset;i++) grid.appendChild(h('div',{cn:'mini-cal-cell muted'},''));
  const planMap={};
  (S.workspace.plans||[]).forEach(p=>{ const k=(p.logicalDay||calendarDayKey(p.at)); planMap[k]=(planMap[k]||0)+1; });
  const dayFlags=getCalendarDayFlags(y,m);
  const todayKey=calendarDayKey(new Date());
  for(let d=1;d<=last.getDate();d++){
    const key=calendarDayKey(new Date(y,m,d));
    const fl=dayFlags[key]||{};
    const isPast=new Date(y,m,d+1)<new Date()&&key!==todayKey;
    const hasAny=fl.step||fl.event;
    const cell=h('button',{cn:'mini-cal-cell'+(key===day?' active':'')+(hasAny?' has-items':'')+(isPast?' past-day':''),onClick:()=>{S.workspace.planDay=key;wsSave();R();}});
    if(hasAny){
      const stripe=h('span',{cn:'mini-cal-stripe'});
      if(fl.step) stripe.appendChild(h('span',{cn:'st-step'}));
      if(fl.event) stripe.appendChild(h('span',{cn:'st-event'}));
      cell.appendChild(stripe);
    }
    cell.appendChild(h('span',{cn:'mini-cal-num'+(key===todayKey?' today-mark':'')},String(d)));
    grid.appendChild(cell);
  }
  return h('div',{cn:'mini-cal-wrap'},grid);
}



function buildFocusHeatSeries(days=84){
  const map={};
  (Array.isArray(S.workspace.workSessions)?S.workspace.workSessions:[]).forEach(sess=>{
    const start=safeDate(sess.startAt||sess.startedAt||sess.at); if(!start) return;
    const end=safeDate(sess.endAt||sess.endedAt)||start;
    const mins=sess.durationMs ? Math.max(1,Math.round(sess.durationMs/60000)) : Math.max(1,Math.round((end-start)/60000));
    const key=calendarDayKey(start); if(!key) return; map[key]=(map[key]||0)+mins;
  });
  Object.values(S.workspace.files||{}).forEach(file=>{
    (Array.isArray(file?.focusSessions)?file.focusSessions:[]).forEach(sess=>{
      const start=safeDate(sess.startAt||sess.startedAt||sess.at); if(!start) return;
      const end=safeDate(sess.endAt||sess.endedAt)||start;
      const mins=Math.max(1,Math.round((end-start)/60000));
      const key=calendarDayKey(start); if(!key) return; map[key]=(map[key]||0)+mins;
    });
  });
  const out=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-i);
    const key=calendarDayKey(d); const mins=Math.round(map[key]||0);
    let level=0; if(mins>=180) level=4; else if(mins>=120) level=3; else if(mins>=60) level=2; else if(mins>0) level=1;
    out.push({key,mins,level});
  }
  return out;
}
function rFocusHeatmap(){
  const wrap=h('div',{cn:'focus-heatmap'});
  buildFocusHeatSeries(84).forEach(item=>{
    const cell=h('div',{cn:'heat-cell',title:`${item.key}｜${item.mins} min`});
    cell.dataset.level=String(item.level);
    wrap.appendChild(cell);
  });
  return wrap;
}

// ── CALENDAR EVENTS & SCHEDULE ──
function getCalendarEvents(){return Array.isArray(S.workspace.calendarEvents)?S.workspace.calendarEvents:[]}
function ensureCalendarEvents(){if(!Array.isArray(S.workspace.calendarEvents)) S.workspace.calendarEvents=[];}
function getAllStepsWithDates(){
  const out=[];
  (S.workspace.projects||[]).forEach(proj=>{
    (proj.children||[]).forEach(ch=>{
      (ch.steps||[]).forEach(stp=>{
        if(!stp.time) return;
        const d=safeDate(stp.time); if(!d) return;
        out.push({kind:'step',date:d,dateKey:calendarDayKey(d),title:stp.name,sub:ch.name+' · '+proj.name,time:fmtT(d),raw:stp,child:ch,project:proj,done:!!stp.done,fileId:stp.fileId||null});
      });
    });
  });
  return out;
}
function getCalendarItemsForDay(day){
  const items=[];
  getAllStepsWithDates().filter(s=>s.dateKey===day).forEach(s=>items.push(s));
  getCalendarEvents().filter(e=>calendarDayKey(e.at)===day).forEach(e=>{
    const d=safeDate(e.at);
    items.push({kind:'event',date:d,dateKey:day,title:e.title,sub:e.note||'',time:d?fmtT(d):'',raw:e});
  });
  items.sort((a,b)=>(a.date||0)-(b.date||0));
  return items;
}
function getCalendarDayFlags(y,m){
  const flags={};
  getAllStepsWithDates().forEach(s=>{
    const d=s.date; if(d.getFullYear()===y&&d.getMonth()===m) flags[s.dateKey]={...(flags[s.dateKey]||{}),step:true,overdue:!s.done&&d<new Date()};
  });
  getCalendarEvents().forEach(e=>{
    const d=safeDate(e.at); if(!d||d.getFullYear()!==y||d.getMonth()!==m) return;
    const k=calendarDayKey(d); flags[k]={...(flags[k]||{}),event:true};
  });
  return flags;
}

er\" aria-label=\"展開計時器\"></div>\n          <div class=\"timer-panel\">\n            <div class=\"timer-row\">\n              <span>工作計時</span>\n              <span id=\"timerStateText\">進行中</span>\n            </div>\n            <div id=\"timerValue\" class=\"timer-value\">00:00:00</div>\n            <div class=\"timer-meta\">\n              <span>中斷 <strong id=\"interruptCountText\">0</strong></span>\n              <span>本次 <strong id=\"sessionCountText\">1</strong></span>\n            </div>\n          </div>\n        </div>\n\n        <div id=\"statsBadge\" class=\"stats-badge hidden\"></div>\n\n        <aside id=\"tocFloatCard\" class=\"toc-float-card hidden\">\n          <div class=\"toc-float-head\">\n            <div class=\"toc-float-label\">Contents</div>\n            <button id=\"tocCloseBtn\" class=\"close-x\" type=\"button\">×</button>\n          </div>\n          <div id=\"tocFloatList\" class=\"toc-list\"></div>\n        </aside>\n\n        <aside id=\"summaryFloatCard\" class=\"toc-float-card hidden summary-float-card\">\n          <div class=\"toc-float-head summary-head\">\n            <div class=\"toc-float-label\">Summary</div>\n            <div class=\"summary-head-actions\">\n              <div id=\"summaryModeSwitch\" class=\"summary-mode-switch\" aria-label=\"切換摘要模式\">\n                <button id=\"summaryTextModeBtn\" class=\"summary-mode-btn\" type=\"button\" data-type=\"text\" title=\"字色\"></button>\n                <button id=\"summaryHighlightModeBtn\" class=\"summary-mode-btn highlight-mode\" type=\"button\" data-type=\"highlight\" title=\"高亮\"></button>\n              </div>\n              <button id=\"summaryCloseBtn\" class=\"close-x\" type=\"button\">×</button>\n            </div>\n          </div>\n          <div id=\"summaryFloatList\" class=\"toc-list summary-list\"></div>\n        </aside>\n\n        <div class=\"editor-scroll\" id=\"editorScroll\">\n          <div id=\"noteMarkersLayer\" class=\"note-markers-layer\"></div>\n          <div id=\"editor\" class=\"editor\" contenteditable=\"true\" data-placeholder=\"開始輸入……\"></div>\n        </div>\n      </div>\n    </section>\n  </div>\n\n  <div id=\"overlayRoot\"></div>\n  <div id=\"floatingRoot\"></div>\n\n  <script>\n    const STORAGE_KEY = 'minimal_text_editor_workspace_v2';\n\n    const state = {\n      isEditorOpen: false,\n      toolbarVisible: true,\n      isPaused: false,\n      startAt: null,\n      accumulatedMs: 0,\n      activeInterval: null,\n      interruptCount: 0,\n      sessionCount: 1,\n      lastStopReason: null,\n      lastSummary: null,\n      pendingResumePrompt: false,\n      exitRequested: false,\n      beforeUnloadHandled: false,\n      currentFontSize: 18,\n      lastSelectionRange: null,\n      tocVisible: false,\n      summaryVisible: false,\n      summaryFilterType: 'text',\n      summaryFilterKey: null,\n      notes: []\n    };\n\n    const els = {\n      homeScreen: document.getElementById('homeScreen'),\n      editorScreen: document.getElementById('editorScreen'),\n      enterEditorBtn: document.getElementById('enterEditorBtn'),\n      toggleToolbarBtn: document.getElementById('toggleToolbarBtn'),\n      wordCountBtn: document.getElementById('wordCountBtn'),\n      undoBtn: document.getElementById('undoBtn'),\n      pauseResumeBtn: document.getElementById('pauseResumeBtn'),\n      exitEditorBtn: document.getElementById('exitEditorBtn'),\n      toolbar: document.getElementById('toolbar'),\n      editor: document.getElementById('editor'),\n      editorScroll: document.getElementById('editorScroll'),\n      titleInput: document.getElementById('titleInput'),\n      fontIncreaseBtn: document.getElementById('fontIncreaseBtn'),\n      fontDecreaseBtn: document.getElementById('fontDecreaseBtn'),\n      textColorBtn: document.getElementById('textColorBtn'),\n      highlightBtn: document.getElementById('highlightBtn'),\n      lineSpacingBtn: document.getElementById('lineSpacingBtn'),\n      hangingIndentBtn: document.getElementById('hangingIndentBtn'),\n      insertMenuBtn: document.getElementById('insertMenuBtn'),\n      tocBtn: document.getElementById('tocBtn'),\n      summaryBtn: document.getElementById('summaryBtn'),\n      noteBtn: document.getElementById('noteBtn'),\n      dividerBtn: document.getElementById('dividerBtn'),\n      sectionBtn: document.getElementById('sectionBtn'),\n      exportWordBtn: document.getElementById('exportWordBtn'),\n      pasteBtn: document.getElementById('pasteBtn'),\n      timerAnchor: document.getElementById('timerAnchor'),\n      timerValue: document.getElementById('timerValue'),\n      timerStateText: document.getElementById('timerStateText'),\n      interruptCountText: document.getElementById('interruptCountText'),\n      sessionCountText: document.getElementById('sessionCountText'),\n      statsBadge: document.getElementById('statsBadge'),\n      tocFloatCard: document.getElementById('tocFloatCard'),\n      tocFloatList: document.getElementById('tocFloatList'),\n      tocCloseBtn: document.getElementById('tocCloseBtn'),\n      summaryFloatCard: document.getElementById('summaryFloatCard'),\n      summaryFloatList: document.getElementById('summaryFloatList'),\n      summaryCloseBtn: document.getElementById('summaryCloseBtn'),\n      summaryTextModeBtn: document.getElementById('summaryTextModeBtn'),\n      summaryHighlightModeBtn: document.getElementById('summaryHighlightModeBtn'),\n      noteMarkersLayer: document.getElementById('noteMarkersLayer'),\n      overlayRoot: document.getElementById('overlayRoot'),\n      floatingRoot: document.getElementById('floatingRoot')\n    };\n\n    const textColors = [\n      '#111111','#434343','#666666','#8A8A8A','#B0B0B0',\n      '#E03E3E','#F08C00','#E2B203','#2F9E44','#0B7285',\n      '#1971C2','#5F3DC4','#9C36B5','#C2255C','#8D6E63',\n      '#FF6B6B','#FFA94D','#FFD43B','#69DB7C','#38D9A9',\n      '#4DABF7','#748FFC','#B197FC','#F783AC','#A1887F',\n      '#7F1D1D','#9A3412','#854D0E','#166534','#155E75',\n      '#1D4ED8','#3730A3','#7E22CE','#BE185D','#6D4C41',\n      '#FCE8E6','#FBF1C7','#FFF3BF','#E6FCF5','#E3FAFC',\n      '#E7F5FF','#EDF2FF','#F3F0FF','#FFF0F6','#F8F9FA',\n      '#D32F2F','#E8590C','#C0A000','#2B8A3E','#0C8599'\n    ].slice(0,50);\n\n    const highlightColors = [\n      '#FFF3BF','#FFE066','#FFD8A8','#FFC9C9','#FFD6E7',\n      '#F3D9FA','#E5DBFF','#D0EBFF','#C5F6FA','#C3FAE8',\n      '#D3F9D8','#E9FAC8','#FFF9DB','#F1F3F5','#E9ECEF',\n      '#FFE8CC','#FFD43B','#FCC2D7','#B2F2BB','#A5D8FF'\n    ];\n\n    function saveSelection() {\n      const sel = window.getSelection();\n      if (sel && sel.rangeCount > 0) state.lastSelectionRange = sel.getRangeAt(0).cloneRange();\n    }\n\n    function restoreSelection() {\n      if (!state.lastSelectionRange) return;\n      const sel = window.getSelection();\n      sel.removeAllRanges();\n      sel.addRange(state.lastSelectionRange);\n    }\n\n    function clamp(n, min, max) {\n      return Math.max(min, Math.min(max, n));\n    }\n\n    function formatMs(ms) {\n      const total = Math.floor(ms / 1000);\n      const h = Math.floor(total / 3600).toString().padStart(2, '0');\n      const m = Math.floor((total % 3600) / 60).toString().padStart(2, '0');\n      const s = (total % 60).toString().padStart(2, '0');\n      return `${h}:${m}:${s}`;\n    }\n\n    function getLiveElapsedMs() {\n      if (state.isPaused || !state.startAt) return state.accumulatedMs;\n      return state.accumulatedMs + (Date.now() - state.startAt);\n    }\n\n    function updateTimerUI() {\n      const liveMs = getLiveElapsedMs();\n      els.timerValue.textContent = formatMs(liveMs);\n      els.timerStateText.textContent = state.isPaused ? '已暫停' : '進行中';\n      els.interruptCountText.textContent = String(state.interruptCount);\n      els.sessionCountText.textContent = state.isPaused ? '暫停' : '專注';\n      els.pauseResumeBtn.textContent = state.isPaused ? '恢復' : '暫停';\n      els.pauseResumeBtn.classList.toggle('active', state.isPaused);\n      if (IS_EMBEDDED) {\n        const currentSecond = Math.floor(liveMs / 1000);\n        if (state._lastBridgeSyncSecond !== currentSecond) {\n          state._lastBridgeSyncSecond = currentSecond;\n          notifyParent('autosave', { payload: bridgePayload() });\n        }\n      }\n    }\n\n    function startTimer(fresh = false) {\n      if (fresh) {\n        state.accumulatedMs = 0;\n        state.interruptCount = 0;\n        state.sessionCount = 1;\n      }\n      state.isPaused = false;\n      state.startAt = Date.now();\n      clearInterval(state.activeInterval);\n      state.activeInterval = setInterval(updateTimerUI, 1000);\n      updateTimerUI();\n    }\n\n    function pauseTimer(reason = 'manual') {\n      if (state.isPaused) return;\n      state.accumulatedMs = getLiveElapsedMs();\n      state.isPaused = true;\n      state.startAt = null;\n      state.interruptCount += 1;\n      state.lastStopReason = reason;\n      clearInterval(state.activeInterval);\n      updateTimerUI();\n      persistState();\n    }\n\n    function resumeTimer() {\n      if (!state.isPaused) return;\n      state.isPaused = false;\n      state.startAt = Date.now();\n      state.sessionCount += 1;\n      clearInterval(state.activeInterval);\n      state.activeInterval = setInterval(updateTimerUI, 1000);\n      updateTimerUI();\n      persistState();\n    }\n\n    function finalizeWork(reason = 'exit') {\n      const totalMs = getLiveElapsedMs();\n      clearInterval(state.activeInterval);\n      state.activeInterval = null;\n      const summary = {\n        totalMs,\n        interruptCount: state.interruptCount,\n        sessionCount: 1,\n        reason,\n        endedAt: new Date().toISOString()\n      };\n      state.lastSummary = summary;\n      state.isPaused = true;\n      state.startAt = null;\n      persistState();\n      return summary;\n    }\n\n    function getEditorText() {\n      return els.editor.innerText || '';\n    }\n\n    function getStats() {\n      const text = getEditorText().replace(/\\n+/g, ' ').trim();\n      const chars = text.length;\n      const words = text ? text.split(/\\s+/).filter(Boolean).length : 0;\n      const paragraphs = els.editor.querySelectorAll('p, h1, h2, h3, blockquote, li').length;\n      return { chars, words, paragraphs };\n    }\n\n    function showStatsBadge() {\n      const { chars, words, paragraphs } = getStats();\n      const interruptRate = getLiveElapsedMs() > 0 ? (state.interruptCount / Math.max(getLiveElapsedMs() / 3600000, 0.25)).toFixed(1) : '0.0';\n      els.statsBadge.innerHTML = `字數：${chars}<br>Words：${words}<br>段落：${paragraphs}`;\n      els.statsBadge.classList.remove('hidden');\n      setTimeout(() => els.statsBadge.classList.add('hidden'), 2600);\n    }\n\n    function persistState() {\n      const payload = {\n        title: els.titleInput.value,\n        content: els.editor.innerHTML,\n        toolbarVisible: state.toolbarVisible,\n        isPaused: state.isPaused,\n        accumulatedMs: getLiveElapsedMs(),\n        interruptCount: state.interruptCount,\n        sessionCount: 1,\n        currentFontSize: state.currentFontSize,\n        tocVisible: state.tocVisible,\n        summaryVisible: state.summaryVisible,\n        summaryFilterType: state.summaryFilterType,\n        summaryFilterKey: state.summaryFilterKey,\n        notes: state.notes,\n        wasInEditor: state.isEditorOpen,\n        pendingResumePrompt: state.isEditorOpen,\n        lastSummary: state.lastSummary\n      };\n      if (!IS_EMBEDDED) localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));\n    }\n\n    function loadState() {\n      if (IS_EMBEDDED) return null;\n      try {\n        const raw = localStorage.getItem(STORAGE_KEY);\n        if (!raw) return null;\n        return JSON.parse(raw);\n      } catch {\n        return null;\n      }\n    }\n\n    function applyLoadedState(data) {\n      if (!data) return;\n      els.titleInput.value = data.title || '';\n      els.editor.innerHTML = data.content || '';\n      state.toolbarVisible = data.toolbarVisible !== false;\n      els.toolbar.classList.toggle('hidden', !state.toolbarVisible);\n      state.currentFontSize = clamp(data.currentFontSize || 18, 12, 42);\n      document.documentElement.style.setProperty('--editor-font-size', `${state.currentFontSize}px`);\n      state.accumulatedMs = data.accumulatedMs || 0;\n      state.interruptCount = data.interruptCount || 0;\n      state.sessionCount = 1;\n      state.isPaused = true;\n      state.lastSummary = data.lastSummary || null;\n      state.pendingResumePrompt = !!data.pendingResumePrompt;\n      state.tocVisible = !!data.tocVisible;\n      state.summaryVisible = !!data.summaryVisible;\n      state.summaryFilterType = data.summaryFilterType || 'text';\n      state.summaryFilterKey = data.summaryFilterKey || null;\n      state.notes = Array.isArray(data.notes) ? data.notes : [];\n      syncTOCVisibility();\n      syncSummaryVisibility();\n      requestAnimationFrame(renderNoteMarkers);\n      syncSummaryVisibility();\n      requestAnimationFrame(renderNoteMarkers);\n      updateTimerUI();\n    }\n\n    function clearResumePromptFlag() {\n      if (IS_EMBEDDED) return;\n      const data = loadState();\n      if (!data) return;\n      data.pendingResumePrompt = false;\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    }\n\n    function openEditor() {\n      state.isEditorOpen = true;\n      state.beforeUnloadHandled = false;\n      els.homeScreen.classList.add('hidden');\n      els.editorScreen.classList.remove('hidden');\n      els.toolbar.classList.toggle('hidden', !state.toolbarVisible);\n      document.documentElement.style.setProperty('--editor-font-size', `${state.currentFontSize}px`);\n      updateTimerUI();\n      setTimeout(() => els.editor.focus(), 20);\n    }\n\n    function closeEditorToHome() {\n      state.isEditorOpen = false;\n      els.editorScreen.classList.add('hidden');\n      els.homeScreen.classList.remove('hidden');\n      persistState();\n    }\n\n    function showDialog({ title, text, actions = [] }) {\n      document.body.classList.add('modal-open');\n      const overlay = document.createElement('div');\n      overlay.className = 'overlay';\n      const dialog = document.createElement('div');\n      dialog.className = 'dialog';\n      dialog.innerHTML = `\n        <div class=\"dialog-title\">${title}</div>\n        <div class=\"dialog-text\">${text}</div>\n        <div class=\"dialog-actions\"></div>\n      `;\n      const actionsWrap = dialog.querySelector('.dialog-actions');\n      actions.forEach(action => {\n        const btn = document.createElement('button');\n        btn.className = `dialog-btn ${action.primary ? 'primary' : ''}`;\n        btn.textContent = action.label;\n        btn.addEventListener('click', () => {\n          overlay.remove();\n          if (!document.querySelector('.overlay')) document.body.classList.remove('modal-open');\n          action.onClick && action.onClick();\n        });\n        actionsWrap.appendChild(btn);\n      });\n      overlay.appendChild(dialog);\n      els.overlayRoot.appendChild(overlay);\n    }\n\n    function closeAllFloatingPanels() {\n      els.floatingRoot.innerHTML = '';\n      document.querySelectorAll('.toolbar-btn.active').forEach(btn => btn.classList.remove('active'));\n    }\n\n    function showFloatingPanel(anchor, title, innerNode) {\n      closeAllFloatingPanels();\n      const rect = anchor.getBoundingClientRect();\n      const panel = document.createElement('div');\n      panel.className = 'floating-panel';\n      panel.style.top = `${rect.bottom + 8}px`;\n      panel.style.left = `${Math.max(8, rect.right - 280)}px`;\n      const header = document.createElement('div');\n      header.className = 'floating-title';\n      header.innerHTML = `<span>${title}</span>`;\n      const closeBtn = document.createElement('button');\n      closeBtn.className = 'close-x';\n      closeBtn.textContent = '×';\n      closeBtn.addEventListener('click', closeAllFloatingPanels);\n      header.appendChild(closeBtn);\n      panel.appendChild(header);\n      panel.appendChild(innerNode);\n      els.floatingRoot.appendChild(panel);\n      anchor.classList.add('active');\n      return panel;\n    }\n\n    function exec(command, value = null) {\n      restoreSelection();\n      els.editor.focus();\n      if (command === 'formatBlock') {\n        document.execCommand(command, false, value);\n      } else {\n        document.execCommand(command, false, value);\n      }\n      saveSelection();\n      persistState();\n      refreshTOCLinks();\n    }\n\n    function applyTextColor(color) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('styleWithCSS', false, true);\n      document.execCommand('foreColor', false, color);\n      persistState();\n    }\n\n    function resetTextColor() {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('removeFormat', false);\n      persistState();\n    }\n\n    function applyHighlightColor(color) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('styleWithCSS', false, true);\n      document.execCommand('hiliteColor', false, color);\n      persistState();\n    }\n\n    function resetHighlightColor() {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('styleWithCSS', false, true);\n      document.execCommand('hiliteColor', false, 'transparent');\n      persistState();\n    }\n\n    function buildColorPanel(type) {\n      const wrap = document.createElement('div');\n      const grid = document.createElement('div');\n      grid.className = type === 'text' ? 'palette-grid' : 'highlight-grid';\n      const list = type === 'text' ? textColors : highlightColors;\n      list.forEach(color => {\n        const sw = document.createElement('button');\n        sw.className = 'swatch';\n        sw.style.background = color;\n        sw.title = color;\n        sw.addEventListener('click', () => {\n          if (type === 'text') applyTextColor(color);\n          else applyHighlightColor(color);\n          closeAllFloatingPanels();\n        });\n        grid.appendChild(sw);\n      });\n      const reset = document.createElement('button');\n      reset.className = 'color-reset';\n      reset.textContent = type === 'text' ? 'Reset text color' : 'Reset highlight';\n      reset.addEventListener('click', () => {\n        if (type === 'text') resetTextColor();\n        else resetHighlightColor();\n        closeAllFloatingPanels();\n      });\n      wrap.appendChild(grid);\n      wrap.appendChild(reset);\n      return wrap;\n    }\n\n    function insertHTML(html) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('insertHTML', false, html);\n      persistState();\n      refreshTOCLinks();\n    }\n\n    function insertColumns(type) {\n      const map = {\n        equal2: 'columns equal-2',\n        equal3: 'columns equal-3',\n        narrowWide: 'columns narrow-wide',\n        wideNarrow: 'columns wide-narrow'\n      };\n      const cls = map[type];\n      if (!cls) return;\n      const count = type === 'equal3' ? 3 : 2;\n      const cols = Array.from({ length: count }).map(() => '<div class=\"column-block\" contenteditable=\"true\"><p><br></p></div>').join('');\n      insertHTML(`<div class=\"${cls}\">${cols}</div><p><br></p>`);\n    }\n\n    function insertTextBox() {\n      insertHTML('<div class=\"text-box\" contenteditable=\"true\"><p><br></p></div><p><br></p>');\n    }\n\n    function insertDivider() {\n      insertHTML('<hr class=\"divider-line\"><p><br></p>');\n    }\n\n    function closestBlock() {\n      const sel = window.getSelection();\n      if (!sel || sel.rangeCount === 0) return null;\n      let node = sel.anchorNode;\n      if (!node) return null;\n      if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;\n      return node && node.closest ? node.closest('p, blockquote, li, h1, h2, h3, h4, .text-box, .column-block') : null;\n    }\n\n    function setLineSpacing(value) {\n      const block = closestBlock();\n      if (!block) return;\n      block.style.lineHeight = value;\n      persistState();\n    }\n\n    function toggleHangingIndent() {\n      const block = closestBlock();\n      if (!block || /^(H1|H2|H3|H4)$/.test(block.tagName)) return;\n      block.classList.toggle('hanging-indent');\n      persistState();\n    }\n\n    function placeCaretAtStart(node) {\n      if (!node) return;\n      const range = document.createRange();\n      range.selectNodeContents(node);\n      range.collapse(true);\n      const sel = window.getSelection();\n      sel.removeAllRanges();\n      sel.addRange(range);\n      state.lastSelectionRange = range.cloneRange();\n      if (node.focus) node.focus();\n    }\n\n    function getClosestColumnsAncestor() {\n      const sel = window.getSelection();\n      if (!sel || sel.rangeCount === 0) return null;\n      let node = sel.anchorNode;\n      if (!node) return null;\n      if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;\n      return node && node.closest ? node.closest('.columns') : null;\n    }\n\n    function insertSectionBreak() {\n      restoreSelection();\n      els.editor.focus();\n      const columns = getClosestColumnsAncestor();\n      if (columns && columns.parentNode) {\n        const wrapper = document.createElement('div');\n        wrapper.className = 'section-break';\n        const p = document.createElement('p');\n        p.innerHTML = '<br>';\n        wrapper.appendChild(p);\n        columns.parentNode.insertBefore(wrapper, columns.nextSibling);\n        placeCaretAtStart(p);\n      } else {\n        insertHTML('<div class=\"section-break\"><p><br></p></div>');\n      }\n      persistState();\n      requestAnimationFrame(renderNoteMarkers);\n    }\n\n    function sanitizePastedHTML(html) {\n      const parser = new DOMParser();\n      const doc = parser.parseFromString(html
