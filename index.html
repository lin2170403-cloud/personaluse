    const fin=h('input',{cn:'fi',type:'file',accept:'image/png,image/*'});
    fin.addEventListener('change',async e=>{
      const file=e.target.files?.[0];if(!file)return;
      const r=new FileReader();
      r.onload=()=>{F.image=r.result; softRefresh();};
      r.readAsDataURL(file);
    });
    fld.appendChild(fin);
    body.appendChild(fld);
  }

  if(mode==='expiry'){
    body.appendChild(mff('購買時間','purchasedAt','datetime-local'));
    body.appendChild(h('div',{cn:'frow'},mff('數量（可跳過）','totalQty','number'),mff('單位','unit','text','盒/瓶/個')));

      mfs('方式','expiryType',[['date','保質日期'],['days','保鮮天數']]),

    body.appendChild(mff('上次完成時間','lastDoneAt','datetime-local'));

      body.appendChild(h('div',{cn:'frow'},mff('循環 T（天）','cycleDays','number'),mff('限制量 X','limitX','number'),mff('提醒量 Y','remindY','number')));

  if(mode==='expiry'){
    const eIso=compExp(F.purchasedAt,F.expiryType,F.expiryType==='date'?F.expiryDate:F.expiryDays);
    const info=exS({expiryDate:eIso,warningDate:F.warningDate||new Date().toISOString(),totalQty:F.totalQty?Number(F.totalQty):null,usedQty:0},S.now);
    pvInfo.appendChild(h('span',{cn:'c-'+info.st,st:{fontSize:'11px'}},'剩餘 '+info.left+' 天'));
  }else if(mode==='cycle'){
    const info=cyS({lastDoneAt:F.lastDoneAt||new Date().toISOString(),cycleX:Number(F.cycleX||0),remindY:Number(F.remindY||0),warnZ:Number(F.warnZ||0),periodUnit:F.periodUnit||'days'},S.now);

function findMainDayIntervalContaining(date){
  const d=new Date(date);
  if(Number.isNaN(d.getTime())) return null;
  const wakes=getMainWakeLogsSorted();
  const sleeps=getMainSleepLogsSorted();
  for(let i=wakes.length-1;i>=0;i--){
    const wake=wakes[i];
    if(wake>d) continue;
    const end=sleeps.find(s=>s>wake);
    if(!end || d<end) return {start:new Date(wake), end:end?new Date(end):null};
  }
  return null;
}

function isMainWakeLog(entry){return entry?.category==='wake' && entry?.payload?.mode!=='nap'}
function isMainSleepLog(entry){return entry?.category==='sleep' && entry?.payload?.mode!=='nap'}
function getMainWakeLogsSorted(){
  return (S?.logs||[]).filter(isMainWakeLog).map(l=>new Date(l.createdAt)).filter(d=>!Number.isNaN(d.getTime())).sort((a,b)=>a-b)
}
function getMainSleepLogsSorted(){
  return (S?.logs||[]).filter(isMainSleepLog).map(l=>new Date(l.createdAt)).filter(d=>!Number.isNaN(d.getTime())).sort((a,b)=>a-b)
}
function currentActiveLogicalDayKey(){
  const now=new Date();
  const wakes=getMainWakeLogsSorted();
  const sleeps=getMainSleepLogsSorted();
  let active=null;
  for(const wake of wakes){
    if(wake>now) break;
    const sleep=sleeps.find(s=>s>wake);
    if(!sleep || now<sleep) active=wake;
  }
  return active?calendarDayKey(active):logLogicalDayKey(now);
}
function findOwningWakeForDate(input){
  const d=new Date(input);
  if(Number.isNaN(d.getTime())) return null;
  const logs=(S?.logs||[])
    .filter(l=>isMainWakeLog(l)||isMainSleepLog(l))
    .map(l=>({type:isMainWakeLog(l)?'wake':'sleep', at:new Date(l.createdAt)}))
    .filter(x=>!Number.isNaN(x.at.getTime()))
    .sort((a,b)=>a.at-b.at);
  let activeWake=null;
  for(const item of logs){
    if(item.at>d) break;
    if(item.type==='wake') activeWake=item.at;
    else if(item.type==='sleep'){
      if(item.at.getTime()===d.getTime()) return activeWake;
      activeWake=null;
    }
  }
  return activeWake;
}
function logLogicalDayKey(input){
  const d=new Date(input);
  if(Number.isNaN(d.getTime())) return '';
  const owningWake=findOwningWakeForDate(d);
  if(owningWake) return calendarDayKey(owningWake);
  const o=new Date(d);
  if(o.getHours()<DEFAULT_LOGICAL_DAY_START_HOUR) o.setDate(o.getDate()-1);
  return localDayKeyFromDate(o);
}
function logicalDayKey(input){ return logLogicalDayKey(input); }
function getDayBounds(day){
  const key=typeof day==='string'?day:calendarDayKey(day);
  const wakes=getMainWakeLogsSorted();
  const sleeps=getMainSleepLogsSorted();
  const wake=wakes.find(w=>calendarDayKey(w)===key);
  if(wake){
    const sleep=sleeps.find(s=>s>wake);
    return {start:new Date(wake), end:sleep?new Date(sleep):new Date(wake.getTime()+30*60*60*1000)};
  }
  const fallbackStart=new Date(key+'T00:00:00');
  fallbackStart.setHours(DEFAULT_LOGICAL_DAY_START_HOUR,0,0,0);
  return {start:fallbackStart,end:new Date(fallbackStart.getTime()+24*60*60*1000)};
}
function logicalDayStart(day){ return getDayBounds(day).start; }
function logicalDayEnd(day){ return getDayBounds(day).end; }
function logsForLogicalDay(day){
  const seen=new Set();
  return (S.logs||[])
    .filter(l=>logLogicalDayKey(l.createdAt)===day)
    .filter(l=>{
      const key=[l.category,new Date(l.createdAt).toISOString(),JSON.stringify(l.payload||{})].join('|');

}

function getStreakDaysForCategory(category){
  const dayKeys=[...new Set((S.logs||[]).filter(l=>l.category===category).map(l=>logLogicalDayKey(l.createdAt)).filter(Boolean))].sort().reverse();
  if(!dayKeys.length) return 0;
  let count=0;
  const cursor=new Date(dayKeys[0]+'T12:00:00');
  for(const key of dayKeys){
    if(calendarDayKey(cursor)!==key) break;
    count++;
    cursor.setDate(cursor.getDate()-1);
  }
  return count;
}
function getDaysSinceLastCategory(category){
  const keys=[...new Set((S.logs||[]).filter(l=>l.category===category).map(l=>logLogicalDayKey(l.createdAt)).filter(Boolean))].sort();
  if(!keys.length) return 999;
  const last=keys[keys.length-1];
  const a=new Date(currentActiveLogicalDayKey()+'T12:00:00');
  const b=new Date(last+'T12:00:00');
  return Math.max(0,Math.round((a-b)/86400000));
}
function plannerMetricColor(kind,val,target){
  if(kind==='water') return val<800?'var(--red)':(val<target?'var(--orange)':'var(--green)');
  if(kind==='expense') return val<2000?'var(--green)':(val<target?'var(--orange)':'var(--red)');
  if(kind==='fiber') return val<15?'var(--red)':(val<target?'var(--orange)':'var(--green)');
  if(kind==='sugar') return val>25?'var(--red)':(val>20?'var(--orange)':'var(--green)');
  return val>=target?'var(--green)':'var(--orange)';
}
function buildHomeMetrics(day){
  const logs=logsForLogicalDay(day);
  const weightDrink=l=>{
    const t=l.payload?.type||''; const amt=Number(l.payload?.amount||0);
    if(/純飲用水/.test(t)) return amt;
    if(/無糖清茶/.test(t)) return amt*0.95;
    if(/果汁|軟飲|咖啡|奶茶/.test(t)) return amt*0.7;
    if(/酒精/.test(t)) return 0;
    return amt;
  };
  const sugarDrink=l=>{
    const t=l.payload?.type||''; const amt=Number(l.payload?.amount||0);
    if(/果汁|軟飲/.test(t)) return amt*0.10;
    if(/咖啡|奶茶/.test(t)) return amt*0.20;
    return 0;
  };
  const focusSeries=buildFocusHeatSeries(84);
  const focusRec=focusSeries.find(x=>x.key===day);
  const out={water:0,expense:0,cal:0,pro:0,fib:0,sugar:0,focusMin:focusRec?focusRec.mins:0};
  logs.forEach(l=>{
    if(l.category==='drink'){ out.water+=weightDrink(l); out.sugar+=sugarDrink(l); }
    if(l.category==='expense') out.expense+=Number(l.payload?.amount||0);
    if(l.category==='meal'){
      out.cal+=Number(l.payload?.calories||0);
      out.pro+=Number(l.payload?.protein||0);
      out.fib+=Number(l.payload?.fiber||0);
      out.sugar+=Number(l.payload?.sugar||0);
    }
  });
  return out;
}
function buildFocusHeatSeries(days=84){
  const map={};
  (Array.isArray(S.workspace.workSessions)?S.workspace.workSessions:[]).forEach(sess=>{
    const start=safeDate(sess.startAt||sess.startedAt||sess.at); if(!start) return;
    const end=safeDate(sess.endAt||sess.endedAt)||start;
    const mins=Math.max(1,Math.round((end-start)/60000));
    const key=logLogicalDayKey(start); if(!key) return; map[key]=(map[key]||0)+mins;
  });
  Object.values(S.workspace.files||{}).forEach(file=>{
    (Array.isArray(file?.focusSessions)?file.focusSessions:[]).forEach(sess=>{
      const start=safeDate(sess.startAt||sess.startedAt||sess.at); if(!start) return;
      const end=safeDate(sess.endAt||sess.endedAt)||start;
      const mins=Math.max(1,Math.round((end-start)/60000));
      const key=logLogicalDayKey(start); if(!key) return; map[key]=(map[key]||0)+mins;
    });
  });
  const out=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()-i);
    const key=calendarDayKey(d); const mins=Math.round(map[key]||0);
    let level=0; if(mins>=180) level=4; else if(mins>=120) level=3; else if(mins>=60) level=2; else if(mins>0) level=1;
    out.push({key,mins,level});
  }
  return out;
}

}

function getAllStepsWithDates(){
  const out=[];
  (S.workspace.projects||[]).forEach(proj=>{
    (proj.children||[]).forEach(ch=>{
      (ch.steps||[]).forEach(stp=>{
        if(!stp.time) return;
        const d=safeDate(stp.time); if(!d) return;
        out.push({kind:'step',date:d,dateKey:calendarDayKey(d),title:stp.name,sub:ch.name+' · '+proj.name,time:fmtT(d),raw:stp,child:ch,project:proj,done:!!stp.done,fileId:stp.fileId||null});
      });
    });
  });
  return out;
}
function getCalendarItemsForDay(day){
  const items=[];
  getAllStepsWithDates().filter(s=>s.dateKey===day).forEach(s=>items.push(s));
  getCalendarEvents().filter(e=>calendarDayKey(e.at)===day).forEach(e=>{
    const d=safeDate(e.at);
    items.push({kind:'event',date:d,dateKey:day,title:e.title,sub:e.note||'',time:d?fmtT(d):'',raw:e});
  });
  items.sort((a,b)=>(a.date||0)-(b.date||0));
  return items;
}
function getCalendarDayFlags(y,m){
  const flags={};
  getAllStepsWithDates().forEach(s=>{
    const d=s.date; if(d.getFullYear()===y&&d.getMonth()===m) flags[s.dateKey]={...(flags[s.dateKey]||{}),step:true,overdue:!s.done&&d<new Date()};
  });
  getCalendarEvents().forEach(e=>{
    const d=safeDate(e.at); if(!d||d.getFullYear()!==y||d.getMonth()!==m) return;
    const k=calendarDayKey(d); flags[k]={...(flags[k]||{}),event:true};
  });
  return flags;
}

ummary-head-actions {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n    .summary-mode-switch {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      padding: 4px 6px;\n      border: 1px solid #ececec;\n      border-radius: 999px;\n      background: rgba(255,255,255,0.92);\n    }\n    .summary-mode-btn {\n      width: 16px;\n      height: 16px;\n      border-radius: 999px;\n      border: 1px solid #cfcfcf;\n      background: #111;\n      cursor: pointer;\n      opacity: 0.35;\n      transition: 0.15s ease;\n      padding: 0;\n      flex: 0 0 auto;\n    }\n    .summary-mode-btn.highlight-mode {\n      border-radius: 4px;\n      background: #FFF3BF;\n    }\n    .summary-mode-btn.active {\n      opacity: 1;\n      transform: scale(1.06);\n      box-shadow: 0 0 0 2px rgba(17,17,17,0.08);\n    }\n    .summary-list {\n      gap: 0;\n    }\n    .summary-filter-strip {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 8px;\n      margin-bottom: 12px;\n    }\n    .summary-filter-swatch {\n      width: 18px;\n      height: 18px;\n      border: 1px solid rgba(0,0,0,0.08);\n      cursor: pointer;\n      transition: 0.15s ease;\n      padding: 0;\n      flex: 0 0 auto;\n      background-clip: padding-box;\n    }\n    .summary-filter-swatch.text-swatch { border-radius: 999px; }\n    .summary-filter-swatch.highlight-swatch { border-radius: 4px; }\n    .summary-filter-swatch.active {\n      transform: scale(1.08);\n      box-shadow: 0 0 0 2px rgba(17,17,17,0.08);\n    }\n    .summary-entry {\n      padding: 10px 0;\n      font-size: 13px;\n      line-height: 1.72;\n      color: #333;\n      word-break: break-word;\n    }\n    .summary-divider {\n      border: 0;\n      border-top: 1px solid #efefef;\n      margin: 0;\n    }\n    .note-markers-layer {\n      position:absolute;\n      left: 10px;\n      top: 0;\n      width: max(16px, calc(var(--editor-side-padding) - 14px));\n      min-height: 100%;\n      pointer-events: none;\n    }\n    .note-marker {\n      position:absolute;\n      left: 0;\n      width: 0;\n      height: 0;\n      border-top: 6px solid transparent;\n      border-bottom: 6px solid transparent;\n      border-left: 10px solid #7f7f7f;\n      cursor: pointer;\n      pointer-events: auto;\n      opacity: 0.82;\n    }\n    .note-marker:hover { opacity: 1; }\n    .note-tooltip {\n      position:absolute;\n      left: 16px;\n      top: -10px;\n      min-width: 200px;\n      max-width: 300px;\n      padding: 10px 12px;\n      border-radius: 12px;\n      background: rgba(255,255,255,0.98);\n      border: 1px solid #e8e8e8;\n      box-shadow: 0 12px 30px rgba(0,0,0,0.08);\n      font-size: 12px;\n      line-height: 1.7;\n      color: #444;\n      display:none;\n      white-space: pre-wrap;\n    }\n    .note-tooltip-context {\n      color: #777;\n      font-size: 11px;\n      margin-bottom: 6px;\n      padding-bottom: 6px;\n      border-bottom: 1px solid #efefef;\n    }\n    .note-marker:hover .note-tooltip { display:block; }\n\n    @media (max-width: 760px) {\n      .title-input { width: 36%; min-width: 120px; }\n      .top-btn, .toolbar-btn { padding: 0 6px; font-size: 11px; }\n      .toolbar { padding: 6px 6px; gap: 4px; }\n      .editor-scroll { padding: 6px 6px 12px 6px; }\n      .palette-grid { grid-template-columns: repeat(8, minmax(0, 1fr)); }\n      .highlight-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }\n      .insert-list { grid-template-columns: 1fr; }\n      .columns.equal-3 { grid-template-columns: 1fr; }\n      .columns.equal-2,\n      .columns.narrow-wide,\n      .columns.wide-narrow { grid-template-columns: 1fr; }\n      .timer-anchor { right: 6px; }\n    }\n  </style>\n</head>\n<body>\n  <div class=\"app\">\n    <section id=\"homeScreen\" class=\"home-screen\">\n      <div class=\"home-inner\">\n        <div class=\"home-title\">Text Workspace</div>\n        <div class=\"home-subtitle\">minimal writing entry</div>\n        <button id=\"enterEditorBtn\" class=\"enter-btn\">進入編輯器</button>\n      </div>\n    </section>\n\n    <section id=\"editorScreen\" class=\"editor-screen hidden\">\n      <div class=\"topbar\">\n        <input id=\"titleInput\" class=\"title-input\" placeholder=\"Untitled\" />\n        <div class=\"topbar-actions\">\n          <button id=\"toggleToolbarBtn\" class=\"top-btn\" title=\"打開/收起工具欄\">工具欄</button>\n          <button id=\"wordCountBtn\" class=\"top-btn\" title=\"字數統計\">字數</button>\n          <button id=\"pauseResumeBtn\" class=\"top-btn\" title=\"暫停/恢復工作\">暫停</button>\n          <button id=\"exitEditorBtn\" class=\"top-btn\" title=\"退出編輯器\">退出</button>\n        </div>\n      </div>\n\n      <div id=\"toolbar\" class=\"toolbar\">\n        <div class=\"toolbar-group\">\n          <button class=\"toolbar-btn\" data-command=\"formatBlock\" data-value=\"H1\">H1</button>\n          <button class=\"toolbar-btn\" data-command=\"formatBlock\" data-value=\"H2\">H2</button>\n          <button class=\"toolbar-btn\" data-command=\"formatBlock\" data-value=\"H3\">H3</button>\n          <button class=\"toolbar-btn\" data-action=\"miniText\">mini</button>\n          <button class=\"toolbar-btn\" data-action=\"bodyText\">body</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button id=\"fontIncreaseBtn\" class=\"toolbar-btn\">A+</button>\n          <button id=\"fontDecreaseBtn\" class=\"toolbar-btn\">A−</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button id=\"textColorBtn\" class=\"toolbar-btn\">字色</button>\n          <button id=\"highlightBtn\" class=\"toolbar-btn\">高亮</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button class=\"toolbar-btn\" data-command=\"bold\">B</button>\n          <button class=\"toolbar-btn\" data-command=\"italic\">I</button>\n          <button class=\"toolbar-btn\" data-command=\"underline\">U</button>\n          <button class=\"toolbar-btn\" data-command=\"strikeThrough\">S</button>\n          <button class=\"toolbar-btn\" data-command=\"superscript\">X²</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button class=\"toolbar-btn\" data-command=\"justifyLeft\">左</button>\n          <button class=\"toolbar-btn\" data-command=\"justifyCenter\">中</button>\n          <button class=\"toolbar-btn\" data-command=\"justifyRight\">右</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button id=\"lineSpacingBtn\" class=\"toolbar-btn\">間距</button>\n          <button id=\"hangingIndentBtn\" class=\"toolbar-btn\">懸掛</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button class=\"toolbar-btn\" data-command=\"insertUnorderedList\">• 列表</button>\n          <button class=\"toolbar-btn\" data-command=\"insertOrderedList\">1. 列表</button>\n          <button class=\"toolbar-btn\" data-command=\"indent\">→</button>\n          <button class=\"toolbar-btn\" data-command=\"outdent\">←</button>\n          <button class=\"toolbar-btn\" data-command=\"formatBlock\" data-value=\"BLOCKQUOTE\">引用</button>\n        </div>\n\n        <div class=\"toolbar-group\">\n          <button id=\"insertMenuBtn\" class=\"toolbar-btn\">插入</button>\n          <button id=\"tocBtn\" class=\"toolbar-btn\">目錄</button>\n          <button id=\"summaryBtn\" class=\"toolbar-btn\">摘要</button>\n          <button id=\"noteBtn\" class=\"toolbar-btn\">筆記</button>\n          <button id=\"dividerBtn\" class=\"toolbar-btn\">分隔線</button>\n          <button id=\"sectionBtn\" class=\"toolbar-btn\">Section</button>\n          <button id=\"exportWordBtn\" class=\"toolbar-btn\">導出Word</button>\n        </div>\n      </div>\n\n      <div class=\"editor-shell\">\n        <div class=\"timer-anchor\" id=\"timerAnchor\">\n          <div class=\"mini-timer\" aria-label=\"展開計時器\"></div>\n          <div class=\"timer-panel\">\n            <div class=\"timer-row\">\n              <span>工作計時</span>\n              <span id=\"timerStateText\">進行中</span>\n            </div>\n            <div id=\"timerValue\" class=\"timer-value\">00:00:00</div>\n            <div class=\"timer-meta\">\n              <span>中斷 <strong id=\"interruptCountText\">0</strong></span>\n              <span>本次 <strong id=\"sessionCountText\">1</strong></span>\n            </div>\n          </div>\n        </div>\n\n        <div id=\"statsBadge\" class=\"stats-badge hidden\"></div>\n\n        <aside id=\"tocFloatCard\" class=\"toc-float-card hidden\">\n          <div class=\"toc-float-head\">\n            <div class=\"toc-float-label\">Contents</div>\n            <button id=\"tocCloseBtn\" class=\"close-x\" type=\"button\">×</button>\n          </div>\n          <div id=\"tocFloatList\" class=\"toc-list\"></div>\n        </aside>\n\n        <aside id=\"summaryFloatCard\" class=\"toc-float-card hidden summary-float-card\">\n          <div class=\"toc-float-head summary-head\">\n            <div class=\"toc-float-label\">Summary</div>\n            <div class=\"summary-head-actions\">\n              <div id=\"summaryModeSwitch\" class=\"summary-mode-switch\" aria-label=\"切換摘要模式\">\n                <button id=\"summaryTextModeBtn\" class=\"summary-mode-btn\" type=\"button\" data-type=\"text\" title=\"字色\"></button>\n                <button id=\"summaryHighlightModeBtn\" class=\"summary-mode-btn highlight-mode\" type=\"button\" data-type=\"highlight\" title=\"高亮\"></button>\n              </div>\n              <button id=\"summaryCloseBtn\" class=\"close-x\" type=\"button\">×</button>\n            </div>\n          </div>\n          <div id=\"summaryFloatList\" class=\"toc-list summary-list\"></div>\n        </aside>\n\n        <div class=\"editor-scroll\" id=\"editorScroll\">\n          <div id=\"noteMarkersLayer\" class=\"note-markers-layer\"></div>\n          <div id=\"editor\" class=\"editor\" contenteditable=\"true\" data-placeholder=\"開始輸入……\"></div>\n        </div>\n      </div>\n    </section>\n  </div>\n\n  <div id=\"overlayRoot\"></div>\n  <div id=\"floatingRoot\"></div>\n\n  <script>\n    const STORAGE_KEY = 'minimal_text_editor_workspace_v2';\n\n    const state = {\n      isEditorOpen: false,\n      toolbarVisible: true,\n      isPaused: false,\n      startAt: null,\n      accumulatedMs: 0,\n      activeInterval: null,\n      interruptCount: 0,\n      sessionCount: 1,\n      lastStopReason: null,\n      lastSummary: null,\n      pendingResumePrompt: false,\n      exitRequested: false,\n      beforeUnloadHandled: false,\n      currentFontSize: 18,\n      lastSelectionRange: null,\n      tocVisible: false,\n      summaryVisible: false,\n      summaryFilterType: 'text',\n      summaryFilterKey: null,\n      notes: []\n    };\n\n    const els = {\n      homeScreen: document.getElementById('homeScreen'),\n      editorScreen: document.getElementById('editorScreen'),\n      enterEditorBtn: document.getElementById('enterEditorBtn'),\n      toggleToolbarBtn: document.getElementById('toggleToolbarBtn'),\n      wordCountBtn: document.getElementById('wordCountBtn'),\n      pauseResumeBtn: document.getElementById('pauseResumeBtn'),\n      exitEditorBtn: document.getElementById('exitEditorBtn'),\n      toolbar: document.getElementById('toolbar'),\n      editor: document.getElementById('editor'),\n      editorScroll: document.getElementById('editorScroll'),\n      titleInput: document.getElementById('titleInput'),\n      fontIncreaseBtn: document.getElementById('fontIncreaseBtn'),\n      fontDecreaseBtn: document.getElementById('fontDecreaseBtn'),\n      textColorBtn: document.getElementById('textColorBtn'),\n      highlightBtn: document.getElementById('highlightBtn'),\n      lineSpacingBtn: document.getElementById('lineSpacingBtn'),\n      hangingIndentBtn: document.getElementById('hangingIndentBtn'),\n      insertMenuBtn: document.getElementById('insertMenuBtn'),\n      tocBtn: document.getElementById('tocBtn'),\n      summaryBtn: document.getElementById('summaryBtn'),\n      noteBtn: document.getElementById('noteBtn'),\n      dividerBtn: document.getElementById('dividerBtn'),\n      sectionBtn: document.getElementById('sectionBtn'),\n      exportWordBtn: document.getElementById('exportWordBtn'),\n      timerAnchor: document.getElementById('timerAnchor'),\n      timerValue: document.getElementById('timerValue'),\n      timerStateText: document.getElementById('timerStateText'),\n      interruptCountText: document.getElementById('interruptCountText'),\n      sessionCountText: document.getElementById('sessionCountText'),\n      statsBadge: document.getElementById('statsBadge'),\n      tocFloatCard: document.getElementById('tocFloatCard'),\n      tocFloatList: document.getElementById('tocFloatList'),\n      tocCloseBtn: document.getElementById('tocCloseBtn'),\n      summaryFloatCard: document.getElementById('summaryFloatCard'),\n      summaryFloatList: document.getElementById('summaryFloatList'),\n      summaryCloseBtn: document.getElementById('summaryCloseBtn'),\n      summaryTextModeBtn: document.getElementById('summaryTextModeBtn'),\n      summaryHighlightModeBtn: document.getElementById('summaryHighlightModeBtn'),\n      noteMarkersLayer: document.getElementById('noteMarkersLayer'),\n      overlayRoot: document.getElementById('overlayRoot'),\n      floatingRoot: document.getElementById('floatingRoot')\n    };\n\n    const textColors = [\n      '#111111','#434343','#666666','#8A8A8A','#B0B0B0',\n      '#E03E3E','#F08C00','#E2B203','#2F9E44','#0B7285',\n      '#1971C2','#5F3DC4','#9C36B5','#C2255C','#8D6E63',\n      '#FF6B6B','#FFA94D','#FFD43B','#69DB7C','#38D9A9',\n      '#4DABF7','#748FFC','#B197FC','#F783AC','#A1887F',\n      '#7F1D1D','#9A3412','#854D0E','#166534','#155E75',\n      '#1D4ED8','#3730A3','#7E22CE','#BE185D','#6D4C41',\n      '#FCE8E6','#FBF1C7','#FFF3BF','#E6FCF5','#E3FAFC',\n      '#E7F5FF','#EDF2FF','#F3F0FF','#FFF0F6','#F8F9FA',\n      '#D32F2F','#E8590C','#C0A000','#2B8A3E','#0C8599'\n    ].slice(0,50);\n\n    const highlightColors = [\n      '#FFF3BF','#FFE066','#FFD8A8','#FFC9C9','#FFD6E7',\n      '#F3D9FA','#E5DBFF','#D0EBFF','#C5F6FA','#C3FAE8',\n      '#D3F9D8','#E9FAC8','#FFF9DB','#F1F3F5','#E9ECEF',\n      '#FFE8CC','#FFD43B','#FCC2D7','#B2F2BB','#A5D8FF'\n    ];\n\n    function saveSelection() {\n      const sel = window.getSelection();\n      if (sel && sel.rangeCount > 0) state.lastSelectionRange = sel.getRangeAt(0).cloneRange();\n    }\n\n    function restoreSelection() {\n      if (!state.lastSelectionRange) return;\n      const sel = window.getSelection();\n      sel.removeAllRanges();\n      sel.addRange(state.lastSelectionRange);\n    }\n\n    function clamp(n, min, max) {\n      return Math.max(min, Math.min(max, n));\n    }\n\n    function formatMs(ms) {\n      const total = Math.floor(ms / 1000);\n      const h = Math.floor(total / 3600).toString().padStart(2, '0');\n      const m = Math.floor((total % 3600) / 60).toString().padStart(2, '0');\n      const s = (total % 60).toString().padStart(2, '0');\n      return `${h}:${m}:${s}`;\n    }\n\n    function getLiveElapsedMs() {\n      if (state.isPaused || !state.startAt) return state.accumulatedMs;\n      return state.accumulatedMs + (Date.now() - state.startAt);\n    }\n\n    function updateTimerUI() {\n      const liveMs = getLiveElapsedMs();\n      els.timerValue.textContent = formatMs(liveMs);\n      els.timerStateText.textContent = state.isPaused ? '已暫停' : '進行中';\n      els.interruptCountText.textContent = String(state.interruptCount);\n      els.sessionCountText.textContent = state.isPaused ? '暫停' : '專注';\n      els.pauseResumeBtn.textContent = state.isPaused ? '恢復' : '暫停';\n      els.pauseResumeBtn.classList.toggle('active', state.isPaused);\n      if (IS_EMBEDDED) {\n        const currentSecond = Math.floor(liveMs / 1000);\n        if (state._lastBridgeSyncSecond !== currentSecond) {\n          state._lastBridgeSyncSecond = currentSecond;\n          notifyParent('autosave', { payload: bridgePayload() });\n        }\n      }\n    }\n\n    function startTimer(fresh = false) {\n      if (fresh) {\n        state.accumulatedMs = 0;\n        state.interruptCount = 0;\n        state.sessionCount = 1;\n      }\n      state.isPaused = false;\n      state.startAt = Date.now();\n      clearInterval(state.activeInterval);\n      state.activeInterval = setInterval(updateTimerUI, 1000);\n      updateTimerUI();\n    }\n\n    function pauseTimer(reason = 'manual') {\n      if (state.isPaused) return;\n      state.accumulatedMs = getLiveElapsedMs();\n      state.isPaused = true;\n      state.startAt = null;\n      state.interruptCount += 1;\n      state.lastStopReason = reason;\n      clearInterval(state.activeInterval);\n      updateTimerUI();\n      persistState();\n    }\n\n    function resumeTimer() {\n      if (!state.isPaused) return;\n      state.isPaused = false;\n      state.startAt = Date.now();\n      state.sessionCount += 1;\n      clearInterval(state.activeInterval);\n      state.activeInterval = setInterval(updateTimerUI, 1000);\n      updateTimerUI();\n      persistState();\n    }\n\n    function finalizeWork(reason = 'exit') {\n      const totalMs = getLiveElapsedMs();\n      clearInterval(state.activeInterval);\n      state.activeInterval = null;\n      const summary = {\n        totalMs,\n        interruptCount: state.interruptCount,\n        sessionCount: 1,\n        reason,\n        endedAt: new Date().toISOString()\n      };\n      state.lastSummary = summary;\n      state.isPaused = true;\n      state.startAt = null;\n      persistState();\n      return summary;\n    }\n\n    function getEditorText() {\n      return els.editor.innerText || '';\n    }\n\n    function getStats() {\n      const text = getEditorText().replace(/\\n+/g, ' ').trim();\n      const chars = text.length;\n      const words = text ? text.split(/\\s+/).filter(Boolean).length : 0;\n      const paragraphs = els.editor.querySelectorAll('p, h1, h2, h3, blockquote, li').length;\n      return { chars, words, paragraphs };\n    }\n\n    function showStatsBadge() {\n      const { chars, words, paragraphs } = getStats();\n      const interruptRate = getLiveElapsedMs() > 0 ? (state.interruptCount / Math.max(getLiveElapsedMs() / 3600000, 0.25)).toFixed(1) : '0.0';\n      els.statsBadge.innerHTML = `字數：${chars}<br>Words：${words}<br>段落：${paragraphs}`;\n      els.statsBadge.classList.remove('hidden');\n      setTimeout(() => els.statsBadge.classList.add('hidden'), 2600);\n    }\n\n    function persistState() {\n      const payload = {\n        title: els.titleInput.value,\n        content: els.editor.innerHTML,\n        toolbarVisible: state.toolbarVisible,\n        isPaused: state.isPaused,\n        accumulatedMs: getLiveElapsedMs(),\n        interruptCount: state.interruptCount,\n        sessionCount: 1,\n        currentFontSize: state.currentFontSize,\n        tocVisible: state.tocVisible,\n        summaryVisible: state.summaryVisible,\n        summaryFilterType: state.summaryFilterType,\n        summaryFilterKey: state.summaryFilterKey,\n        notes: state.notes,\n        wasInEditor: state.isEditorOpen,\n        pendingResumePrompt: state.isEditorOpen,\n        lastSummary: state.lastSummary\n      };\n      if (!IS_EMBEDDED) localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));\n    }\n\n    function loadState() {\n      if (IS_EMBEDDED) return null;\n      try {\n        const raw = localStorage.getItem(STORAGE_KEY);\n        if (!raw) return null;\n        return JSON.parse(raw);\n      } catch {\n        return null;\n      }\n    }\n\n    function applyLoadedState(data) {\n      if (!data) return;\n      els.titleInput.value = data.title || '';\n      els.editor.innerHTML = data.content || '';\n      state.toolbarVisible = data.toolbarVisible !== false;\n      els.toolbar.classList.toggle('hidden', !state.toolbarVisible);\n      state.currentFontSize = clamp(data.currentFontSize || 18, 12, 42);\n      document.documentElement.style.setProperty('--editor-font-size', `${state.currentFontSize}px`);\n      state.accumulatedMs = data.accumulatedMs || 0;\n      state.interruptCount = data.interruptCount || 0;\n      state.sessionCount = 1;\n      state.isPaused = true;\n      state.lastSummary = data.lastSummary || null;\n      state.pendingResumePrompt = !!data.pendingResumePrompt;\n      state.tocVisible = !!data.tocVisible;\n      state.summaryVisible = !!data.summaryVisible;\n      state.summaryFilterType = data.summaryFilterType || 'text';\n      state.summaryFilterKey = data.summaryFilterKey || null;\n      state.notes = Array.isArray(data.notes) ? data.notes : [];\n      syncTOCVisibility();\n      syncSummaryVisibility();\n      requestAnimationFrame(renderNoteMarkers);\n      syncSummaryVisibility();\n      requestAnimationFrame(renderNoteMarkers);\n      updateTimerUI();\n    }\n\n    function clearResumePromptFlag() {\n      if (IS_EMBEDDED) return;\n      const data = loadState();\n      if (!data) return;\n      data.pendingResumePrompt = false;\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));\n    }\n\n    function openEditor() {\n      state.isEditorOpen = true;\n      state.beforeUnloadHandled = false;\n      els.homeScreen.classList.add('hidden');\n      els.editorScreen.classList.remove('hidden');\n      els.toolbar.classList.toggle('hidden', !state.toolbarVisible);\n      document.documentElement.style.setProperty('--editor-font-size', `${state.currentFontSize}px`);\n      updateTimerUI();\n      setTimeout(() => els.editor.focus(), 20);\n    }\n\n    function closeEditorToHome() {\n      state.isEditorOpen = false;\n      els.editorScreen.classList.add('hidden');\n      els.homeScreen.classList.remove('hidden');\n      persistState();\n    }\n\n    function showDialog({ title, text, actions = [] }) {\n      document.body.classList.add('modal-open');\n      const overlay = document.createElement('div');\n      overlay.className = 'overlay';\n      const dialog = document.createElement('div');\n      dialog.className = 'dialog';\n      dialog.innerHTML = `\n        <div class=\"dialog-title\">${title}</div>\n        <div class=\"dialog-text\">${text}</div>\n        <div class=\"dialog-actions\"></div>\n      `;\n      const actionsWrap = dialog.querySelector('.dialog-actions');\n      actions.forEach(action => {\n        const btn = document.createElement('button');\n        btn.className = `dialog-btn ${action.primary ? 'primary' : ''}`;\n        btn.textContent = action.label;\n        btn.addEventListener('click', () => {\n          overlay.remove();\n          if (!document.querySelector('.overlay')) document.body.classList.remove('modal-open');\n          action.onClick && action.onClick();\n        });\n        actionsWrap.appendChild(btn);\n      });\n      overlay.appendChild(dialog);\n      els.overlayRoot.appendChild(overlay);\n    }\n\n    function closeAllFloatingPanels() {\n      els.floatingRoot.innerHTML = '';\n      document.querySelectorAll('.toolbar-btn.active').forEach(btn => btn.classList.remove('active'));\n    }\n\n    function showFloatingPanel(anchor, title, innerNode) {\n      closeAllFloatingPanels();\n      const rect = anchor.getBoundingClientRect();\n      const panel = document.createElement('div');\n      panel.className = 'floating-panel';\n      panel.style.top = `${rect.bottom + 8}px`;\n      panel.style.left = `${Math.max(8, rect.right - 280)}px`;\n      const header = document.createElement('div');\n      header.className = 'floating-title';\n      header.innerHTML = `<span>${title}</span>`;\n      const closeBtn = document.createElement('button');\n      closeBtn.className = 'close-x';\n      closeBtn.textContent = '×';\n      closeBtn.addEventListener('click', closeAllFloatingPanels);\n      header.appendChild(closeBtn);\n      panel.appendChild(header);\n      panel.appendChild(innerNode);\n      els.floatingRoot.appendChild(panel);\n      anchor.classList.add('active');\n      return panel;\n    }\n\n    function exec(command, value = null) {\n      restoreSelection();\n      els.editor.focus();\n      if (command === 'formatBlock') {\n        document.execCommand(command, false, value);\n      } else {\n        document.execCommand(command, false, value);\n      }\n      saveSelection();\n      persistState();\n      refreshTOCLinks();\n    }\n\n    function applyTextColor(color) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('styleWithCSS', false, true);\n      document.execCommand('foreColor', false, color);\n      persistState();\n    }\n\n    function resetTextColor() {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('removeFormat', false);\n      persistState();\n    }\n\n    function applyHighlightColor(color) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('styleWithCSS', false, true);\n      document.execCommand('hiliteColor', false, color);\n      persistState();\n    }\n\n    function resetHighlightColor() {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('styleWithCSS', false, true);\n      document.execCommand('hiliteColor', false, 'transparent');\n      persistState();\n    }\n\n    function buildColorPanel(type) {\n      const wrap = document.createElement('div');\n      const grid = document.createElement('div');\n      grid.className = type === 'text' ? 'palette-grid' : 'highlight-grid';\n      const list = type === 'text' ? textColors : highlightColors;\n      list.forEach(color => {\n        const sw = document.createElement('button');\n        sw.className = 'swatch';\n        sw.style.background = color;\n        sw.title = color;\n        sw.addEventListener('click', () => {\n          if (type === 'text') applyTextColor(color);\n          else applyHighlightColor(color);\n          closeAllFloatingPanels();\n        });\n        grid.appendChild(sw);\n      });\n      const reset = document.createElement('button');\n      reset.className = 'color-reset';\n      reset.textContent = type === 'text' ? 'Reset text color' : 'Reset highlight';\n      reset.addEventListener('click', () => {\n        if (type === 'text') resetTextColor();\n        else resetHighlightColor();\n        closeAllFloatingPanels();\n      });\n      wrap.appendChild(grid);\n      wrap.appendChild(reset);\n      return wrap;\n    }\n\n    function insertHTML(html) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('insertHTML', false, html);\n      persistState();\n      refreshTOCLinks();\n    }\n\n    function insertColumns(type) {\n      const map = {\n        equal2: 'columns equal-2',\n        equal3: 'columns equal-3',\n        narrowWide: 'columns narrow-wide',\n        wideNarrow: 'columns wide-narrow'\n      };\n      const cls = map[type];\n      if (!cls) return;\n      const count = type === 'equal3' ? 3 : 2;\n      const cols = Array.from({ length: count }).map(() => '<div class=\"column-block\" contenteditable=\"true\"><p><br></p></div>').join('');\n      insertHTML(`<div class=\"${cls}\">${cols}</div><p><br></p>`);\n    }\n\n    function insertTextBox() {\n      insertHTML('<div class=\"text-box\" contenteditable=\"true\"><p><br></p></div><p><br></p>');\n    }\n\n    function insertDivider() {\n      insertHTML('<hr class=\"divider-line\"><p><br></p>');\n    }\n\n    function closestBlock() {\n      const sel = window.getSelection();\n      if (!sel || sel.rangeCount === 0) return null;\n      let node = sel.anchorNode;\n      if (!node) return null;\n      if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;\n      return node && node.closest ? node.closest('p, blockquote, li, h1, h2, h3, h4, .text-box, .column-block') : null;\n    }\n\n    function setLineSpacing(value) {\n      const block = closestBlock();\n      if (!block) return;\n      block.style.lineHeight = value;\n      persistState();\n    }\n\n    function toggleHangingIndent() {\n      const block = closestBlock();\n      if (!block || /^(H1|H2|H3|H4)$/.test(block.tagName)) return;\n      block.classList.toggle('hanging-indent');\n      persistState();\n    }\n\n    function placeCaretAtStart(node) {\n      if (!node) return;\n      const range = document.createRange();\n      range.selectNodeContents(node);\n      range.collapse(true);\n      const sel = window.getSelection();\n      sel.removeAllRanges();\n      sel.addRange(range);\n      state.lastSelectionRange = range.cloneRange();\n      if (node.focus) node.focus();\n    }\n\n    function getClosestColumnsAncestor() {\n      const sel = window.getSelection();\n      if (!sel || sel.rangeCount === 0) return null;\n      let node = sel.anchorNode;\n      if (!node) return null;\n      if (node.nodeType === Node.TEXT_NODE) node = node.parentNode;\n      return node && node.closest ? node.closest('.columns') : null;\n    }\n\n    function insertSectionBreak() {\n      restoreSelection();\n      els.editor.focus();\n      const columns = getClosestColumnsAncestor();\n      if (columns && columns.parentNode) {\n        const wrapper = document.createElement('div');\n        wrapper.className = 'section-break';\n        const p = document.createElement('p');\n        p.innerHTML = '<br>';\n        wrapper.appendChild(p);\n        columns.parentNode.insertBefore(wrapper, columns.nextSibling);\n        placeCaretAtStart(p);\n      } else {\n        insertHTML('<div class=\"section-break\"><p><br></p></div>');\n      }\n      persistState();\n      requestAnimationFrame(renderNoteMarkers);\n    }\n\n    function sanitizePastedHTML(html) {\n      const parser = new DOMParser();\n      const doc = parser.parseFromString(html, 'text/html');\n      doc.querySelectorAll('script, style, meta, link, o\\:p').forEach(el => el.remove());\n      doc.querySelectorAll('*').forEach(el => {\n        [...el.attributes].forEach(attr => {\n          const name = attr.name.toLowerCase();\n          if (name === 'style' || name === 'class' || name.startsWith('on') || name === 'id' || name === 'lang' || name.startsWith('data-')) el.removeAttribute(attr.name);\n        });\n      });\n      return doc.body.innerHTML\n        .replace(/<span[^>]*>/gi, '')\n        .replace(/<\\/span>/gi, '')\n        .replace(/<font[^>]*>/gi, '')\n        .replace(/<\\/font>/gi, '');\n    }\n\n    function insertFragmentAtSelection(fragment) {\n      const sel = window.getSelection();\n      if (!sel || sel.rangeCount === 0) return;\n      const range = sel.getRangeAt(0);\n      range.deleteContents();\n      const lastNode = fragment.lastChild;\n      range.insertNode(fragment);\n      if (lastNode) {\n        const newRange = document.createRange();\n        newRange.setStartAfter(lastNode);\n        newRange.collapse(true);\n        sel.removeAllRanges();\n        sel.addRange(newRange);\n        state.lastSelectionRange = newRange.cloneRange();\n      }\n    }\n\n    function handlePaste(e) {\n      const cd = e.clipboardData || window.clipboardData;\n      if (!cd) return;\n      const html = cd.getData('text/html');\n      const text = cd.getData('text/plain');\n      if (!html && !text) return;\n      e.preventDefault();\n      restoreSelection();\n      els.editor.focus();\n      if (html) {\n        const cleaned = sanitizePastedHTML(html);\n        const tpl = document.createElement('template');\n        tpl.innerHTML = cleaned;\n        insertFragmentAtSelection(tpl.content.cloneNode(true));\n      } else {\n        const frag = document.createDocumentFragment();\n        const lines = text.replaceAll('\\r\\n', '\\n').replaceAll('\\r', '\\n').split('\\n');\n        lines.forEach((line, idx) => {\n          if (idx > 0) frag.appendChild(document.createElement('br'));\n          frag.appendChild(document.createTextNode(line));\n        });\n        insertFragmentAtSelection(frag);\n      }\n      saveSelection();\n      persistState();\n      refreshTOCLinks();\n      requestAnimationFrame(renderNoteMarkers);\n    }\n\n        function buildLineSpacingPanel() {\n      const wrap = document.createElement('div');\n      wrap.className = 'insert-list';\n      [['1.2', '1.2'], ['1.4', '1.4'], ['1.6', '1.6'], ['1.8', '1.8'], ['2.0', '2'], ['預設', '']].forEach(([label, value]) => {\n        const btn = document.createElement('button');\n        btn.className = 'insert-choice';\n        btn.textContent = label;\n        btn.addEventListener('click', () => {\n          const block = closestBlock();\n          if (!block) return;\n          if (value) block.style.lineHeight = value; else block.style.removeProperty('line-height');\n          persistState();\n          closeAllFloatingPanels();\n        });\n        wrap.appendChild(btn);\n      });\n      return wrap;\n    }\n\n    function ensureSectionOutsideColumns() {\n      els.editor.querySelectorAll('.section-break').forEach(brk => {\n        const parent = brk.parentElement;\n        if (parent && parent.classList && parent.classList.contains('columns')) {\n          parent.parentNode.insertBefore(brk, parent.nextSibling);\n        }\n      });\n    }\n\n    function ensureHeadingIds() {\n      const headings = els.editor.querySelectorAll('h1, h2, h3');\n      headings.forEach((h, i) => {\n        if (!h.id) h.id = `heading-${i + 1}`;\n      });\n      return headings;\n    }\n\n    function buildTOCItemsMarkup() {\n      const headings = ensureHeadingIds();\n      return Array.from(headings).map(h => {\n        const lv = h.tagName.replace('H', '');\n        const text = (h.textContent || '').trim() || `Heading ${lv}`;\n        return `<a class=\"toc-item level-${lv}\" data-target=\"${h.id}\">${text}</a>`;\n      }).join('');\n    }\n\n    function renderTOCPanel() {\n      const items = buildTOCItemsMarkup();\n      els.tocFloatList.innerHTML = items || '<div class=\"toc-float-empty\">還沒有標題。先建立 H1–H3 標題，這裡就會自動顯示。</div>';\n      bindTOCClicks();\n    }\n\n    function syncTOCVisibility() {\n      els.tocFloatCard.classList.toggle('hidden', !state.tocVisible);\n      els.tocBtn.classList.toggle('active', state.tocVisible);\n      if (state.tocVisible) renderTOCPanel();\n    }\n\n    function toggleTOCPanel(force) {\n      state.tocVisible = typeof force === 'boolean' ? force : !state.tocVisible;\n      if (state.tocVisible) state.summaryVisible = false;\n      syncTOCVisibility();\n      syncSummaryVisibility();\n      requestAnimationFrame(renderNoteMarkers);\n      syncSummaryVisibility();\n      persistState();\n    }\n\n    function refreshTOCLinks() {\n      ensureHeadingIds();\n      if (state.tocVisible) renderTOCPanel();\n    }\n\n    function bindTOCClicks() {\n      document.querySelectorAll('#tocFloatList .toc-item').forEach(item => {\n        item.onclick = () => {\n          const id = item.getAttribute('data-target');\n          const target = document.getElementById(id);\n          if (target) {\n            target.scrollIntoView({ behavior: 'smooth', block: 'center' });\n            saveSelection();\n          }\n        };\n      });\n    }\n\n\n    function getBlockTextContent(block) {\n      return (block?.innerText || block?.textContent || '').replace(/\\s+/g, ' ').trim();\n    }\n\n    function getSelectionOffsetWithinBlock(block) {\n      const sel = window.getSelection();\n      if (!sel || !sel.rangeCount || !block) return 0;\n      const range = sel.getRangeAt(0).cloneRange();\n      const preRange = document.createRange();\n      preRange.selectNodeContents(block);\n      preRange.setEnd(range.startContainer, range.startOffset);\n      return (preRange.toString() || '').length;\n    }\n\n    function buildContextPreview(text, offset) {\n      const source = String(text || '').replace(/\\s+/g, ' ').trim();\n      if (!source) return '';\n      const pos = Math.max(0, Math.min(offset || 0, source.length));\n      const start = Math.max(0, pos - 24);\n      const end = Math.min(source.length, pos + 24);\n      const prefix = start > 0 ? '…' : '';\n      const suffix = end < source.length ? '…' : '';\n      return prefix + source.slice(start, end) + suffix;\n    }\n\n    function ensureBlockId(block) {\n      if (!block) return null;\n      if (!block.dataset.blockId) block.dataset.blockId = 'block-' + Math.random().toString(36).slice(2, 10);\n      return block.dataset.blockId;\n    }\n\n    function getNoteAnchorBlock() {\n      const range = getSelectionRange();\n      const block = range ? getClosestBlock(range.startContainer) : null;\n      return block || els.editor.querySelector('p, h1, h2, h3, h4, blockquote, li');\n    }\n\n    function promptAddNote() {\n      saveSelection();\n      let block = getNoteAnchorBlock();\n      if (!block) {\n        const p = document.createElement('p');\n        p.innerHTML = '<br>';\n        els.editor.appendChild(p);\n        block = p;\n      }\n      ensureBlockId(block);\n      const offset = getSelectionOffsetWithinBlock(block);\n      const contextText = buildContextPreview(getBlockTextContent(block), offset);\n      showNoteDialog(block.dataset.blockId, '', { offset, contextText });\n    }\n\n    function showNoteDialog(noteOrBlockId, initialText, options = {}) {\n      const existingNote = typeof noteOrBlockId === 'object' ? noteOrBlockId : null;\n      const blockId = existingNote ? existingNote.blockId : noteOrBlockId;\n      const noteObj = existingNote || null;\n      const block = els.editor.querySelector('[data-block-id=\"' + CSS.escape(blockId) + '\"]');\n      const contextText = options.contextText || noteObj?.context || buildContextPreview(getBlockTextContent(block), noteObj?.offset || 0);\n\n      document.body.classList.add('modal-open');\n      const overlay = document.createElement('div');\n      overlay.className = 'overlay';\n      const dialog = document.createElement('div');\n      dialog.className = 'dialog';\n      dialog.innerHTML = `\n        <div class=\"dialog-title\">${noteObj ? '編輯筆記' : '插入筆記'}</div>\n        <div class=\"dialog-text\" style=\"margin-bottom:10px;\">這則筆記會掛在對應插入位置左側的小三角上。</div>\n        <div style=\"font-size:12px; color:#777; line-height:1.7; border:1px solid #efefef; border-radius:12px; padding:10px 12px; margin-bottom:10px; background:#fafafa;\">${contextText ? '前後文：' + escapeHtml(contextText) : '前後文：—'}</div>\n        <textarea id=\"noteTextarea\" style=\"width:100%; min-height:140px; resize:vertical; border:1px solid #e6e6e6; border-radius:12px; padding:12px; font:inherit; line-height:1.7;\"></textarea>\n        <div class=\"dialog-actions\" style=\"justify-content:space-between;\">\n          <div>${noteObj ? '<button class=\"dialog-btn\" data-act=\"delete\">刪除</button>' : ''}</div>\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"dialog-btn\" data-act=\"cancel\">取消</button>\n            <button class=\"dialog-btn primary\" data-act=\"save\">保存</button>\n          </div>\n        </div>\n      `;\n      overlay.appendChild(dialog);\n      els.overlayRoot.appendChild(overlay);\n      const ta = dialog.querySelector('#noteTextarea');\n      ta.value = initialText || '';\n      ta.focus();\n      const close = () => { overlay.remove(); if (!document.querySelector('.overlay')) document.body.classList.remove('modal-open'); };\n      dialog.querySelector('[data-act=\"cancel\"]').onclick = close;\n      const del = dialog.querySelector('[data-act=\"delete\"]');\n      if (del) del.onclick = () => {\n        state.notes = state.notes.filter(n => n.id !== noteObj.id);\n        persistState();\n        renderNoteMarkers();\n        close();\n      };\n      dialog.querySelector('[data-act=\"save\"]').onclick = () => {\n        const textValue = ta.value.trim();\n        if (textValue) {\n          if (noteObj) {\n            noteObj.text = textValue;\n            noteObj.context = contextText;\n          } else {\n            state.notes.push({\n              id: 'note-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),\n              blockId,\n              text: textValue,\n              offset: options.offset || 0,\n              context: contextText\n            });\n          }\n          persistState();\n          renderNoteMarkers();\n        }\n        close();\n      };\n    }\n\n    function renderNoteMarkers() {\n      if (!els.noteMarkersLayer) return;\n      els.noteMarkersLayer.innerHTML = '';\n      state.notes = state.notes.filter(note => els.editor.querySelector('[data-block-id=\"' + CSS.escape(note.blockId) + '\"]'));\n      const grouped = new Map();\n      state.notes.forEach(note => {\n        if (!grouped.has(note.blockId)) grouped.set(note.blockId, []);\n        grouped.get(note.blockId).push(note);\n      });\n      grouped.forEach((notes, blockId) => {\n        const block = els.editor.querySelector('[data-block-id=\"' + CSS.escape(blockId) + '\"]');\n        if (!block) return;\n        const blockText = getBlockTextContent(block);\n        const blockHeight = Math.max(block.offsetHeight || 0, 18);\n        notes.sort((a,b) => (a.offset || 0) - (b.offset || 0));\n        notes.forEach((note, idx) => {\n          const marker = document.createElement('div');\n          marker.className = 'note-marker';\n          const ratio = blockText.length ? Math.min(1, Math.max(0, (note.offset || 0) / Math.max(blockText.length, 1))) : 0;\n          const posY = Math.round((block.offsetTop - 2) + ratio * Math.max(0, blockHeight - 14));\n          marker.style.top = (posY + idx * 2) + 'px';\n          marker.style.left = (-16 - (idx % 2) * 8) + 'px';\n          marker.title = '查看筆記';\n          const tip = document.createElement('div');\n          tip.className = 'note-tooltip';\n          tip.innerHTML = `<div class=\"note-tooltip-context\">${note.context ? '前後文：' + escapeHtml(note.context) : '前後文：—'}</div><div>${escapeHtml(note.text).replace(/\\n/g,'<br>')}</div>`;\n          marker.appendChild(tip);\n          marker.addEventListener('click', (e) => {\n            e.stopPropagation();\n            showNoteDialog(note, note.text);\n          });\n          els.noteMarkersLayer.appendChild(marker);\n        });\n      });\n      persistState();\n    }\n\n    function collectSummaryItems() {\n      const textBuckets = new Map();\n      const highlightBuckets = new Map();\n      const pushBucket = (map, key, value) => {\n        if (!key || !value) return;\n        if (!map.has(key)) map.set(key, []);\n        const arr = map.get(key);\n        if (!arr.includes(value) && arr.length < 80) arr.push(value);\n      };\n      els.editor.querySelectorAll('*').forEach(el => {\n        const value = (el.textContent || '').trim();\n        if (!value) return;\n        const color = (el.style && el.style.color || '').trim();\n        const bg = (el.style && (el.style.backgroundColor || el.style.background) || '').trim();\n        if (color) pushBucket(textBuckets, color, value);\n        if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)') pushBucket(highlightBuckets, bg, value);\n      });\n      return { textBuckets, highlightBuckets };\n    }\n\n    function renderSummaryPanel() {\n      const { textBuckets, highlightBuckets } = collectSummaryItems();\n      const availableMap = state.summaryFilterType === 'highlight' ? highlightBuckets : textBuckets;\n      if (!availableMap.size) {\n        if (state.summaryFilterType === 'text' && highlightBuckets.size) state.summaryFilterType = 'highlight';\n        else if (state.summaryFilterType === 'highlight' && textBuckets.size) state.summaryFilterType = 'text';\n      }\n      const currentMap = state.summaryFilterType === 'highlight' ? highlightBuckets : textBuckets;\n      if (!state.summaryFilterKey || !currentMap.has(state.summaryFilterKey)) {\n        state.summaryFilterKey = Array.from(currentMap.keys())[0] || null;\n      }\n\n      els.summaryTextModeBtn.classList.toggle('active', state.summaryFilterType === 'text');\n      els.summaryHighlightModeBtn.classList.toggle('active', state.summaryFilterType === 'highlight');\n\n      const swatchClass = state.summaryFilterType === 'highlight' ? 'summary-filter-swatch highlight-swatch' : 'summary-filter-swatch text-swatch';\n      const swatches = Array.from(currentMap.keys()).map(key => {\n        const active = state.summaryFilterKey === key ? ' active' : '';\n        return `<button class=\"${swatchClass}${active}\" data-key=\"${escapeHtml(key)}\" style=\"background:${key}\" title=\"${escapeHtml(key)}\"></button>`;\n      }).join('');\n\n      const items = state.summaryFilterKey && currentMap.get(state.summaryFilterKey) ? currentMap.get(state.summaryFilterKey) : [];\n      const entries = items.length\n        ? items.map((t, i) => `<div class=\"summary-entry\">${escapeHtml(t)}</div>${i < items.length - 1 ? '<hr class=\"summary-divider\">' : ''}`).join('')\n        : '<div class=\"toc-float-empty\">還沒有可分類內容。</div>';\n\n      els.summaryFloatList.innerHTML = `<div class=\"summary-filter-strip\">${swatches || '<div class=\"toc-float-empty\">—</div>'}</div>${entries}`;\n      els.summaryFloatList.querySelectorAll('.summary-filter-swatch').forEach(btn => {\n        btn.onclick = () => {\n          state.summaryFilterKey = btn.getAttribute('data-key');\n          renderSummaryPanel();\n          persistState();\n        };\n      });\n    }\n\n    function syncSummaryVisibility() {\n      els.summaryFloatCard.classList.toggle('hidden', !state.summaryVisible);\n      els.summaryBtn.classList.toggle('active', state.summaryVisible);\n      if (state.summaryVisible) renderSummaryPanel();\n    }\n\n    function toggleSummaryPanel(force) {\n      state.summaryVisible = typeof force === 'boolean' ? force : !state.summaryVisible;\n      syncSummaryVisibility();\n      persistState();\n    }\n\n    function buildInsertPanel() {\n      const wrap = document.createElement('div');\n      wrap.className = 'insert-list';\n      const actions = [\n        ['2列平均分列', () => insertColumns('equal2')],\n        ['3列平均分列', () => insertColumns('equal3')],\n        ['左窄右寬', () => insertColumns('narrowWide')],\n        ['左寬右窄', () => insertColumns('wideNarrow')],\n        ['文本框', insertTextBox]\n      ];\n      actions.forEach(([label, fn]) => {\n        const btn = document.createElement('button');\n        btn.className = 'insert-choice';\n        btn.textContent = label;\n        btn.addEventListener('click', () => {\n          fn();\n          closeAllFloatingPanels();\n        });\n        wrap.appendChild(btn);\n      });\n      return wrap;\n    }\n\n    function getSelectionRange() {\n      const sel = window.getSelection();\n      if (!sel || sel.rangeCount === 0) return null;\n      return sel.getRangeAt(0);\n    }\n\n    function getClosestBlock(node) {\n      let current = node && node.nodeType === 1 ? node : node?.parentElement;\n      while (current && current !== els.editor) {\n        const tag = current.tagName;\n        if (['P', 'H1', 'H2', 'H3', 'H4', 'BLOCKQUOTE', 'LI'].includes(tag)) return current;\n        current = current.parentElement;\n      }\n      return null;\n    }\n\n    function setCurrentBlockTextStyle(mode) {\n      restoreSelection();\n      els.editor.focus();\n      document.execCommand('formatBlock', false, 'P');\n      const range = getSelectionRange();\n      const block = range ? getClosestBlock(range.startContainer) : null;\n      if (block) {\n        block.classList.remove('mini-text');\n        if (mode === 'mini') block.classList.add('mini-text');\n      }\n      saveSelection();\n      persistState();\n      refreshTOCLinks();\n    }\n\n    function getFontSizeTarget(range) {\n      if (!range) return null;\n      let node = range.startContainer;\n      if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;\n      if (!node || !node.closest) return null;\n      return node.closest('p, blockquote, li, h1, h2, h3, .mini-text, .body-text, .text-box, .column-block');\n    }\n\n    function changeFontSize(delta) {\n      restoreSelection();\n      els.editor.focus();\n      const range = getSelectionRange();\n      if (range && !range.collapsed) {\n        const parent = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentElement;\n        const base = parseFloat(window.getComputedStyle(parent).fontSize) || state.currentFontSize;\n        const next = clamp(base + delta, 10, 72);\n        const fragment = range.extractContents();\n        const span = document.createElement('span');\n        span.style.fontSize = `${next}px`;\n        span.appendChild(fragment);\n        range.insertNode(span);\n        const sel = window.getSelection();\n        sel.removeAllRanges();\n        const newRange = document.createRange();\n        newRange.selectNodeContents(span);\n        sel.addRange(newRange);\n        state.lastSelectionRange = newRange.cloneRange();\n      } else {\n        const target = getFontSizeTarget(range);\n        if (target && !target.classList.contains('columns')) {\n          const base = parseFloat(window.getComputedStyle(target).fontSize) || state.currentFontSize;\n          target.style.fontSize = `${clamp(base + delta, 10, 72)}px`;\n        } else {\n          state.currentFontSize = clamp(state.currentFontSize + delta, 10, 72);\n          document.documentElement.style.setProperty('--editor-font-size', `${state.currentFontSize}px`);\n        }\n      }\n      persistState();\n    }\n\n    function adjustBlockIndent(delta) {\n      restoreSelection();\n      els.editor.focus();\n      const block = closestBlock();\n      if (!block) return;\n      if (block.closest('.columns')) {\n        const current = parseFloat(block.dataset.indentLevel || '0') || 0;\n        const next = Math.max(0, Math.min(12, current + delta));\n        block.dataset.indentLevel = String(next);\n        block.style.marginLeft = next ? `${next * 2}em` : '';\n      } else {\n        const current = parseFloat(block.dataset.indentLevel || '0') || 0;\n        const next = Math.max(0, Math.min(12, current + delta));\n        block.dataset.indentLevel = String(next);\n        block.style.marginLeft = next ? `${next * 2}em` : '';\n      }\n      persistState();\n    }\n\n    function toggleBlockquote() {\n      restoreSelection();\n      els.editor.focus();\n      const block = closestBlock();\n      if (!block) return;\n      if (block.tagName === 'BLOCKQUOTE') {\n        document.execCommand('formatBlock', false, 'P');\n      } else {\n        document.execCommand('formatBlock', false, 'BLOCKQUOTE');\n      }\n      saveSelection();\n      persistState();\n      refreshTOCLinks();\n    }\n\n    function handleToolbarCommand(btn) {\n      const action = btn.dataset.action;\n      if (action === 'miniText') {\n        setCurrentBlockTextStyle('mini');\n        return;\n      }\n      if (action === 'bodyText') {\n        setCurrentBlockTextStyle('body');\n        return;\n      }\n      const cmd = btn.dataset.command;\n      const value = btn.dataset.value || null;\n      if (!cmd) return;\n      if (cmd === 'indent') {\n        adjustBlockIndent(1);\n        return;\n      }\n      if (cmd === 'outdent') {\n        adjustBlockIndent(-1);\n        return;\n      }\n      if (cmd === 'formatBlock' && value === 'BLOCKQUOTE') {\n        toggleBlockquote();\n        return;\n      }\n      exec(cmd, value);\n    }\n\n    function handleEnterResumeFlow() {\n      const data = loadState();\n      if (!data) {\n        state.currentFontSize = 18;\n        openEditor();\n        startTimer(true);\n        persistState();\n        return;\n      }\n\n      applyLoadedState(data);\n      openEditor();\n\n      if (data.pendingResumePrompt) {\n        showDialog({\n          title: '繼續上次工作？',\n          text: `檢測到上次在編輯器中斷。\n\n已累計工作時間：${formatMs(data.accumulatedMs || 0)}\n中斷次數：${data.interruptCount || 0}`,\n          actions: [\n            {\n              label: '重新開始',\n              onClick: () => {\n                clearResumePromptFlag();\n                state.accumulatedMs = 0;\n                state.interruptCount = 0;\n                state.sessionCount = 1;\n                state.lastSummary = null;\n                startTimer(true);\n                persistState();\n              }\n            },\n            {\n              label: '查看上次總結',\n              onClick: () => {\n                clearResumePromptFlag();\n                if (data.accumulatedMs != null) {\n                  showDialog({\n                    title: '上次工作總結',\n                    text: `工作時間：${formatMs(data.accumulatedMs || 0)}\\n中斷次數：${data.interruptCount || 0}`,\n                    actions: [\n                      {\n                        label: '繼續工作',\n                        primary: true,\n                        onClick: () => {\n                          resumeTimer();\n                          persistState();\n                        }\n                      }\n                    ]\n                  });\n                } else {\n                  resumeTimer();\n                }\n              }\n            },\n            {\n              label: '繼續工作',\n              primary: true,\n              onClick: () => {\n                clearResumePromptFlag();\n                resumeTimer();\n              }\n            }\n          ]\n        });\n      } else {\n        startTimer(false);\n        persistState();\n      }\n    }\n\n    function handleExitEditor() {\n      finalizeWork('exit');\n      closeEditorToHome();\n    }\n\n    function handlePauseResume() {\n      if (state.isPaused) resumeTimer();\n      else pauseTimer('manual');\n    }\n\n    function sanitizeFileName(name) {\n      return (name || 'document').replace(/[\\\\/:*?\"<>|]+/g, '_').trim() || 'document';\n    }\n\n    function escapeHtml(str) {\n      return String(str || '')\n        .replace(/&/g, '&amp;')\n        .replace(/</g, '&lt;')\n        .replace(/>/g, '&gt;')\n        .replace(/\"/g, '&quot;');\n    }\n\n    function getColumnTemplateInfo(node) {\n      if (node.classList.contains('equal-3')) {\n        return ['33.33%', '33.33%', '33.34%'];\n      }\n      if (node.classList.contains('narrow-wide')) {\n        return ['37.5%', '62.5%'];\n      }\n      if (node.classList.contains('wide-narrow')) {\n        return ['62.5%', '37.5%'];\n      }\n      return ['50%', '50%'];\n    }\n\n    function convertColumnsForWord(root) {\n      root.querySelectorAll('.columns').forEach(columns => {\n        const widths = getColumnTemplateInfo(columns);\n        const blocks = Array.from(columns.querySelectorAll(':scope > .column-block'));\n        const table = document.createElement('table');\n        table.setAttribute('role', 'presentation');\n        table.style.width = '100%';\n        table.style.borderCollapse = 'separate';\n        table.style.borderSpacing = '12pt 0';\n        table.style.tableLayout = 'fixed';\n        table.style.margin = '0.45em 0';\n\n        const tbody = document.createElement('tbody');\n        const row = document.createElement('tr');\n\n        blocks.forEach((block, index) => {\n          const td = document.createElement('td');\n          td.style.verticalAlign = 'top';\n          td.style.width = widths[index] || `${(100 / Math.max(blocks.length, 1)).toFixed(2)}%`;\n          td.style.padding = '0';\n          td.style.border = 'none';\n          td.innerHTML = block.innerHTML || '<p>&nbsp;</p>';\n          row.appendChild(td);\n        });\n\n        tbody.appendChild(row);\n        table.appendChild(tbody);\n        columns.replaceWith(table);\n      });\n    }\n\n    function buildExportRoot() {\n      const exportRoot = els.editor.cloneNode(true);\n      exportRoot.removeAttribute('contenteditable');\n      exportRoot.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));\n      exportRoot.querySelectorAll('.section-break').forEach(el => {\n        const frag = document.createDocumentFragment();\n        while (el.firstChild) frag.appendChild(el.firstChild);\n        el.replaceWith(frag);\n      });\n      convertColumnsForWord(exportRoot);\n\n      if (state.notes && state.notes.length) {\n        const notePairs = state.notes\n          .map(note => {\n            const block = exportRoot.querySelector(`[data-block-id=\"${note.blockId}\"]`);\n            return block ? { note, block } : null;\n          })\n          .filter(Boolean);\n\n        if (notePairs.length) {\n          const noteSection = document.createElement('div');\n          noteSection.style.marginTop = '24pt';\n          noteSection.innerHTML = '<h2>筆記</h2>';\n          const list = document.createElement('ol');\n          list.style.paddingLeft = '22px';\n          notePairs.forEach(({ note, block }, i) => {\n            const marker = document.createElement('sup');\n            marker.textContent = `[註${i + 1}]`;\n            marker.style.color = '#666';\n            marker.style.fontSize = '0.75em';\n            marker.style.marginLeft = '4px';\n            block.appendChild(marker);\n\n            const item = document.createElement('li');\n            item.style.margin = '0 0 8pt 0';\n            item.innerHTML = `<div>${escapeHtml(note.text).replace(/\\n/g, '<br>')}</div>`;\n            list.appendChild(item);\n          });\n          noteSection.appendChild(list);\n          exportRoot.appendChild(noteSection);\n        }\n      }\n      return exportRoot;\n    }\n\n    function buildWordExportHtml() {\n      const exportRoot = buildExportRoot();\n      const title = els.titleInput.value.trim() || 'Untitled';\n      return `<!DOCTYPE html>\n<html xmlns:o=\"urn:schemas-microsoft-com:office:office\"\n      xmlns:w=\"urn:schemas-microsoft-com:office:word\"\n      xmlns=\"http://www.w3.org/TR/REC-html40\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"ProgId\" content=\"Word.Document\">\n<meta name=\"Generator\" content=\"Minimal Text Editor\">\n<!--[if gte mso 9]>\n<xml>\n  <w:WordDocument>\n    <w:View>Print</w:View>\n    <w:Zoom>100</w:Zoom>\n    <w:DoNotOptimizeForBrowser/>\n  </w:WordDocument>\n</xml>\n<![endif]-->\n<style>\n  @page { size: A4; margin: 20mm 18mm 20mm 18mm; }\n  body {\n    font-family: \"Times New Roman\", \"Noto Serif SC\", \"Source Han Serif SC\", \"Songti SC\", \"SimSun\", \"MS Mincho\", serif;\n    color: #111;\n    line-height: 1.8;\n    font-size: ${state.currentFontSize || 18}px;\n  }\n  h1, h2, h3, h4 { font-weight: 650; line-height: 1.35; margin: 0.6em 0 0.4em; }\n  h1 { font-size: 2em; }\n  h2 { font-size: 1.6em; }\n  h3 { font-size: 1.25em; }\n  h4 { font-size: 1em; }\n  p, blockquote, ul, ol, table { margin: 0.45em 0; }\n  ul, ol { padding-left: 1.8em; }\n  blockquote {\n    margin-left: 0;\n    padding: 0.2em 0 0.2em 0.9em;\n    border-left: 2px solid #d7d7d7;\n    color: #555;\n  }\n  .mini-text { font-size: 0.82em; line-height: 1.65; color: #444; }\n  .hanging-indent { padding-left: 2em; text-indent: -2em; }\n  .text-box { border: 1px solid #e6e6e6; padding: 12px; border-radius: 4px; }\n  .divider-line { border: none; border-top: 1px solid #e5e5e5; height: 0; }\n  table { page-break-inside: avoid; }\n  td p:first-child, td h1:first-child, td h2:first-child, td h3:first-child, td h4:first-child, td blockquote:first-child { margin-top: 0; }\n</style>\n<title>${escapeHtml(title)}</title>\n</head>\n<body>\n  <h1>${escapeHtml(title)}</h1>\n  ${exportRoot.innerHTML}\n</body>\n</html>`;\n    }\n\n    function exportToWord() {\n      const htmlContent = buildWordExportHtml();\n      const blob = new Blob(['\\ufeff', htmlContent], { type: 'application/msword' });\n      const url = URL.createObjectURL(blob);\n      const link = document.createElement('a');\n      link.href = url;\n      link.download = `${sanitizeFileName(els.titleInput.value.trim() || 'document')}.doc`;\n      document.body.appendChild(link);\n      link.click();\n      link.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 1000);\n    }\n\n\n    function onBeforeUnload() {\n      if (IS_EMBEDDED) return;\n      if (!state.isEditorOpen || state.beforeUnloadHandled) return;\n      state.beforeUnloadHandled = true;\n      if (!state.isPaused) pauseTimer('close-page');\n      const payload = {\n        title: els.titleInput.value,\n        content: els.editor.innerHTML,\n        toolbarVisible: state.toolbarVisible,\n        isPaused: true,\n        accumulatedMs: state.accumulatedMs,\n        interruptCount: state.interruptCount,\n        sessionCount: 1,\n        currentFontSize: state.currentFontSize,\n        tocVisible: state.tocVisible,\n        summaryVisible: state.summaryVisible,\n        summaryFilterType: state.summaryFilterType,\n        summaryFilterKey: state.summaryFilterKey,\n        notes: state.notes,\n        wasInEditor: true,\n        pendingResumePrompt: true,\n        lastSummary: {\n          totalMs: state.accumulatedMs,\n          interruptCount: state.interruptCount,\n          sessionCount: 1,\n          reason: 'close-page',\n          endedAt: new Date().toISOString()\n        }\n      };\n      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));\n    }\n\n    function initEvents() {\n      els.enterEditorBtn.addEventListener('click', handleEnterResumeFlow);\n\n      els.toggleToolbarBtn.addEventListener('click', () => {\n        state.toolbarVisible = !state.toolbarVisible;\n        els.toolbar.classList.toggle('hidden', !state.toolbarVisible);\n        persistState();\n      });\n\n      els.wordCountBtn.addEventListener('click', showStatsBadge);\n      els.pauseResumeBtn.addEventListener('click', handlePauseResume);\n      els.exitEditorBtn.addEventListener('click', handleExitEditor);\n\n      els.fontIncreaseBtn.addEventListener('click', () => changeFontSize(1));\n\n      els.fontDecreaseBtn.addEventListener('click', () => changeFontSize(-1));\n\n      els.textColorBtn.addEventListener('click', (e) => {\n        saveSelection();\n        showFloatingPanel(e.currentTarget, 'Text Color', bu (function(){
